<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <style>
    :root {
      --primary: #e50914;
      --dark: #000000;
      --light: #f5f5f5;
      --gray-text: #888;
      --dark-gray: #1a1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      background-color: var(--dark);
      color: var(--light);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh; overflow: hidden;
    }

    .main-container {
      display: flex; width: 100%; height: 100vh; flex-direction: row;
    }

    .video-wrapper {
      flex: 1; position: relative; background: #000;
      display: flex; flex-direction: column; min-width: 0;
    }

    .video-container {
      width: 100%; height: 100%; background: #000; position: relative;
    }

    .video-container iframe,
    .video-container video,
    .video-container div[id^="rumble_"] {
      width: 100%; height: 100%; border: none;
    }

    .series-sidebar {
      width: 320px; background: var(--dark-gray);
      display: none; flex-direction: column;
      border-left: 1px solid #333;
      height: 100vh; overflow: hidden;
    }

    .series-sidebar.visible { display: flex; }

    .sidebar-header {
      padding: 1rem; background: rgba(0,0,0,0.5);
      border-bottom: 1px solid #333;
    }

    .series-title {
      font-size: 1.2rem; color: var(--primary);
      font-weight: bold; margin: 0;
    }

    .season-tabs {
      display: flex; gap: 0.5rem; padding: 1rem;
      overflow-x: auto; flex-wrap: nowrap;
      border-bottom: 1px solid #333;
      background: rgba(0,0,0,0.3);
    }

    .season-tab {
      background: #333; color: white; border: none;
      padding: 0.4rem 0.8rem; border-radius: 4px;
      cursor: pointer; font-size: 0.8rem;
      transition: all 0.3s; white-space: nowrap;
    }

    .season-tab.active { background: var(--primary); }

    .episodes-list {
      flex: 1; overflow-y: auto; padding: 0.5rem;
      -webkit-overflow-scrolling: touch;
    }

    .episode-item {
      background: #2a2a2a; border-radius: 8px;
      padding: 0.8rem; margin-bottom: 0.5rem;
      cursor: pointer; transition: all 0.3s;
      display: flex; align-items: center; gap: 0.8rem;
    }

    .episode-item:hover {
      background: var(--primary); transform: translateX(-3px);
    }

    .episode-item.active {
      background: var(--primary); border-left: 3px solid #ff6b6b;
    }

    .episode-number {
      font-size: 0.9rem; font-weight: bold;
      background: rgba(0,0,0,0.5); padding: 0.2rem 0.5rem;
      border-radius: 4px; min-width: 50px; text-align: center;
    }

    .episode-info { flex: 1; }

    .episode-title {
      font-size: 0.8rem; color: #ccc;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .episode-item:hover .episode-title { color: #fff; }

    .playing-indicator {
      display: flex; gap: 2px; align-items: center; justify-content: center;
    }

    .playing-indicator span {
      width: 3px; height: 8px; background: white;
      border-radius: 1px; animation: wave 1s infinite ease-in-out;
    }

    .playing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .playing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 16px; }
    }

    .loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8); display: flex;
      justify-content: center; align-items: center; z-index: 10;
    }

    .loading-spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid var(--primary);
      border-radius: 50%; width: 40px; height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-button {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      background-color: var(--primary); color: white;
      border: none; text-decoration: none;
      transition: all 0.3s ease;
    }

    .back-button:hover {
      background-color: #f40612; color: white;
    }

    .toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.9); color: white;
      padding: 0.8rem 1.5rem; border-radius: 8px;
      z-index: 1000; transition: transform 0.3s ease;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .episodes-list::-webkit-scrollbar { width: 6px; }
    .episodes-list::-webkit-scrollbar-track { background: var(--dark-gray); }
    .episodes-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
    .season-tabs::-webkit-scrollbar { height: 4px; }
    .season-tabs::-webkit-scrollbar-track { background: var(--dark-gray); }
    .season-tabs::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    @media (max-width: 768px) {
      .main-container { flex-direction: column; }
      .video-wrapper { height: 50vh; }
      .series-sidebar { width: 100%; height: 50vh; }
      .back-button { top: 10px; left: 10px; font-size: 0.8rem; }
      .back-button span:last-child { display: none; }
      .back-button .icon { margin: 0; }
    }
  </style>
</head>

<body>
  <a href="#" class="button back-button is-rounded" id="back-button">
    <span class="icon"><i class="fas fa-arrow-left"></i></span>
    <span>BACK</span>
  </a>

  <!-- REMOVED: Ad container & social bar -->

  <div class="main-container">
    <div class="video-wrapper">
      <div class="video-container" id="video-container">
        <div class="loading-overlay" id="loading-overlay">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>

    <div class="series-sidebar" id="series-sidebar">
      <div class="sidebar-header">
        <h2 class="series-title" id="series-title">Episodes</h2>
      </div>
      <div class="season-tabs" id="season-tabs"></div>
      <div class="episodes-list" id="episodes-list"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import {
      getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    const RUMBLE_CHANNEL_ID = 'u4m9tqz';

    // Firebase configs
    const firebaseConfig1 = {
      apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k",
      authDomain: "kinaflix.firebaseapp.com",
      projectId: "kinaflix",
      storageBucket: "kinaflix.appspot.com",
      messagingSenderId: "318239806217",
      appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8"
    };

    const firebaseConfig2 = {
      apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk",
      authDomain: "cullo-movies-6813f.firebaseapp.com",
      projectId: "cullo-movies-6813f",
      messagingSenderId: "12310118231",
      appId: "1:12310118231:web:34682f354027fd19758812"
    };

    // Initialize Firebase ONCE
    const app1 = initializeApp(firebaseConfig1, "kinaflix");
    const app2 = initializeApp(firebaseConfig2, "cullo");
    const db1 = getFirestore(app1);
    const db2 = getFirestore(app2);

    function getDb(source) {
      return source === 'cullo' ? db2 : db1;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text; return div.innerHTML;
    }

    function detectVideoType(url) {
      if (!url) return 'unknown';
      const u = url.toLowerCase();
      if (u.includes('drive.google.com') || u.includes('gdrive')) return 'googledrive';
      if (u.includes('rumble.com')) return 'rumble';
      if (u.includes('archive.org') || u.includes('ia800') || u.includes('ia600')) return 'archive';
      if (u.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return 'direct';
      return 'unknown';
    }

    function extractGoogleDriveId(url) {
      const patterns = [/\/d\/([a-zA-Z0-9_-]+)/, /id=([a-zA-Z0-9_-]+)/, /file\/d\/([a-zA-Z0-9_-]+)/];
      for (const p of patterns) { const m = url.match(p); if (m && m[1]) return m[1]; }
      return null;
    }

    function extractRumbleId(url) {
      const patterns = [/rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/, /v([a-zA-Z0-9]+)/, /video\/([a-zA-Z0-9_-]+)/];
      for (const p of patterns) { const m = url.match(p); if (m && m[1]) return m[1]; }
      return null;
    }

    function extractArchiveIdentifier(url) {
      const m1 = url.match(/\/items\/([^\/]+)\//); if (m1 && m1[1]) return m1[1];
      const m2 = url.match(/\/details\/([^\/?#]+)/); if (m2 && m2[1]) return m2[1];
      const m3 = url.match(/\/download\/([^\/?#]+)/); if (m3 && m3[1]) return m3[1];
      return null;
    }

    function getArchiveDirectUrl(url) {
      if (url.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return url;
      const id = extractArchiveIdentifier(url);
      return id ? `https://archive.org/download/${id}/${id}.mp4` : null;
    }

    // === PLAYER INITIALIZERS ===
    async function initArchivePlayer(videoUrl, loadingOverlay) {
      const container = document.getElementById('video-container');
      const directUrl = getArchiveDirectUrl(videoUrl);
      if (directUrl) {
        container.innerHTML = `<video controls autoplay style="width:100%;height:100%;background:#000;"><source src="${directUrl}" type="video/mp4"></video>`;
        const video = container.querySelector('video');
        if (video && loadingOverlay) {
          video.addEventListener('canplay', () => loadingOverlay.style.display = 'none');
          video.addEventListener('error', () => loadingOverlay.style.display = 'none');
          setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 8000);
        }
      } else {
        const id = extractArchiveIdentifier(videoUrl);
        if (id) container.innerHTML = `<iframe src="https://archive.org/embed/${id}" frameborder="0" allowfullscreen style="width:100%;height:100%;"></iframe>`;
        else container.innerHTML = `<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;color:#e50914;"><i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:20px;"></i><p>Unable to play this video.</p></div>`;
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 3000);
      }
    }

    async function initRumblePlayer(videoId, loadingOverlay) {
      const divId = `rumble_${videoId}`;
      const container = document.getElementById('video-container');
      container.innerHTML = `<div id="${divId}" style="width:100%;height:100%;"></div>`;
      !function(r,u,m,b,l,e){r._Rumble=b;r[b]||(r[b]=function(){(r[b]._=r[b]._||[]).push(arguments);if(r[b]._.length==1){l=u.createElement(m),e=u.getElementsByTagName(m)[0],l.async=1,l.src="https://rumble.com/embedJS/"+RUMBLE_CHANNEL_ID+(arguments[1].video?'.'+arguments[1].video:'')+"/?url="+encodeURIComponent(location.href)+"&args="+encodeURIComponent(JSON.stringify([].slice.apply(arguments))),e.parentNode.insertBefore(l,e)}})}(window,document,"script","Rumble");
      Rumble("play",{video:videoId,div:divId});
      setTimeout(()=>{if(loadingOverlay)loadingOverlay.style.display='none';},5000);
    }

    async function initGoogleDrivePlayer(fileId, loadingOverlay) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<iframe src="https://drive.google.com/file/d/${fileId}/preview" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
      setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
    }

    async function initDirectVideoPlayer(videoUrl, loadingOverlay) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<video controls autoplay style="width:100%;height:100%;background:#000;"><source src="${videoUrl}" type="video/mp4"></video>`;
      const video = container.querySelector('video');
      if (video && loadingOverlay) {
        video.addEventListener('canplay', () => loadingOverlay.style.display = 'none');
        video.addEventListener('error', () => loadingOverlay.style.display = 'none');
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 8000);
      }
    }

    // === SERIES DATA ===
    let seriesEpisodes = [], seasonsList = [], currentSeason = 1;
    let currentMovieId = null, currentSource = null, currentEpisodePlaying = null;

    async function loadSeriesData(movieId, source) {
      try {
        const db = getDb(source);

        // === KINAFLIX SERIES (seriesId) ===
        if (source === 'kinaflix') {
          const movieDoc = await getDoc(doc(db, 'movies', movieId));
          const movieData = movieDoc.data();

          if (movieData && movieData.seriesId) {
            const seriesQuery = query(
              collection(db, 'movies'),
              where('seriesId', '==', movieData.seriesId),
              orderBy('releaseYear', 'asc')
            );
            const seriesSnap = await getDocs(seriesQuery);

            seriesEpisodes = [];
            seasonsList = [];
            let epNum = 1;

            seriesSnap.docs.forEach(docSnap => {
              const epData = docSnap.data();
              const seasonYear = epData.releaseYear || 1;
              if (!seasonsList.includes(seasonYear)) seasonsList.push(seasonYear);
              seriesEpisodes.push({
                id: docSnap.id,
                season: seasonYear,
                number: epNum,
                title: epData.title || `Episode ${epNum}`,
                videoUrl: epData.googleDriveLink || epData.videoUrl || '',
                source: 'kinaflix'
              });
              epNum++;
            });

            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0) currentSeason = seasonsList[0];

            // Get series name
            let seriesName = '';
            try {
              const seriesDoc = await getDoc(doc(db, 'series', movieData.seriesId));
              if (seriesDoc.exists()) seriesName = seriesDoc.data().name;
            } catch (e) { }

            document.getElementById('series-title').textContent = seriesName || movieData.title || 'Series';
            return true;
          }
        }

        // === CULLO SERIES (seasons array) ===
        if (source === 'cullo') {
          // Try movies collection first
          let movieDoc = await getDoc(doc(db, 'movies', movieId));
          if (movieDoc.exists()) {
            const data = movieDoc.data();
            if (data.seasons && Array.isArray(data.seasons) && data.seasons.length > 0) {
              return buildCulloSeries(data);
            }
          }
          // Try series collection
          const seriesDoc = await getDoc(doc(db, 'series', movieId));
          if (seriesDoc.exists()) {
            const data = seriesDoc.data();
            return buildCulloSeries(data);
          }
        }

        return false;
      } catch (error) {
        console.error('Error loading series:', error);
        return false;
      }
    }

    function buildCulloSeries(data) {
      seriesEpisodes = [];
      seasonsList = [];

      data.seasons.forEach((season, idx) => {
        const snum = season.number || idx + 1;
        if (!seasonsList.includes(snum)) seasonsList.push(snum);
        (season.episodes || []).forEach(ep => {
          seriesEpisodes.push({
            id: ep.id || `${currentMovieId}_s${snum}_e${ep.number}`,
            season: snum,
            number: ep.number || '?',
            title: ep.title || `Episode ${ep.number}`,
            videoUrl: ep.videoUrl || '',
            source: 'cullo'
          });
        });
      });

      seasonsList.sort((a, b) => a - b);
      if (seasonsList.length > 0) currentSeason = seasonsList[0];
      document.getElementById('series-title').textContent = data.title || 'Series';
      return true;
    }

    // === RENDER EPISODES ===
    function renderEpisodes() {
      const seasonEpisodes = seriesEpisodes.filter(ep => ep.season === currentSeason);
      const seasonTabsDiv = document.getElementById('season-tabs');
      const episodesListDiv = document.getElementById('episodes-list');

      seasonTabsDiv.innerHTML = seasonsList.map(s =>
        `<button class="season-tab ${s === currentSeason ? 'active' : ''}" data-season="${s}">${currentSource === 'kinaflix' ? s : 'Season ' + s}</button>`
      ).join('');

      if (seasonEpisodes.length === 0) {
        episodesListDiv.innerHTML = '<div style="text-align:center;padding:2rem;color:#666;">No episodes available.</div>';
      } else {
        episodesListDiv.innerHTML = seasonEpisodes.map(ep => {
          const isActive = currentEpisodePlaying && currentEpisodePlaying.id === ep.id;
          return `<div class="episode-item ${isActive ? 'active' : ''}" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
            <div class="episode-number">${isActive ? '<div class="playing-indicator"><span></span><span></span><span></span></div>' : 'Ep ' + ep.number}</div>
            <div class="episode-info"><div class="episode-title">${escapeHtml(ep.title)}</div></div>
          </div>`;
        }).join('');
      }

      // Season tab listeners
      document.querySelectorAll('.season-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentSeason = parseInt(tab.dataset.season);
          renderEpisodes();
        });
      });

      // Episode item listeners
      document.querySelectorAll('.episode-item').forEach(item => {
        item.addEventListener('click', async () => {
          const ep = JSON.parse(item.dataset.episode);
          if (!ep.videoUrl || ep.videoUrl.trim() === '') {
            showToast('Coming soon!');
            return;
          }
          currentEpisodePlaying = ep;
          renderEpisodes();
          showToast(`Loading: ${ep.title}`);
          await loadAndPlayVideo(ep.videoUrl);
          // Update URL without reload
          const newUrl = `${window.location.pathname}?movieId=${ep.id}&source=${ep.source}`;
          window.history.pushState({}, '', newUrl);
        });
      });
    }

    // === LOAD AND PLAY ===
    async function loadAndPlayVideo(streamingLink) {
      const loadingOverlay = document.getElementById('loading-overlay');
      if (loadingOverlay) loadingOverlay.style.display = 'flex';

      const decodedLink = decodeURIComponent(streamingLink);
      const videoType = detectVideoType(decodedLink);

      if (videoType === 'googledrive') {
        const fileId = extractGoogleDriveId(decodedLink);
        if (fileId) await initGoogleDrivePlayer(fileId, loadingOverlay);
      } else if (videoType === 'rumble') {
        const videoId = extractRumbleId(decodedLink);
        if (videoId) await initRumblePlayer(videoId, loadingOverlay);
      } else if (videoType === 'archive') {
        await initArchivePlayer(decodedLink, loadingOverlay);
      } else if (videoType === 'direct') {
        await initDirectVideoPlayer(decodedLink, loadingOverlay);
      } else {
        const container = document.getElementById('video-container');
        container.innerHTML = `<iframe src="${decodedLink}" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
      }
    }

    // === MAIN INIT ===
    const initPlayer = async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('movieId');
        let streamingLink = urlParams.get('streamingLink');
        currentSource = urlParams.get('source') || 'kinaflix';
        currentMovieId = movieId;

        if (!movieId && !streamingLink) {
          throw new Error("Invalid movie ID or streaming link");
        }

        // FIXED: Back button with proper query
        const backButton = document.getElementById('back-button');
        if (backButton && movieId) {
          backButton.href = `see.html?id=${movieId}&source=${currentSource}`;
        } else if (backButton) {
          backButton.href = 'index.html';
        }

        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'flex';

        const seriesSidebar = document.getElementById('series-sidebar');

        // Check for series
        const isSeries = await loadSeriesData(movieId, currentSource);

        if (isSeries && seriesEpisodes.length > 0) {
          seriesSidebar.classList.add('visible');
          renderEpisodes();

          const currentEp = seriesEpisodes.find(ep => ep.id === movieId);
          if (currentEp) {
            currentEpisodePlaying = currentEp;
            renderEpisodes();
            if (currentEp.videoUrl) {
              await loadAndPlayVideo(currentEp.videoUrl);
            } else if (streamingLink) {
              await loadAndPlayVideo(streamingLink);
            }
          } else if (streamingLink) {
            await loadAndPlayVideo(streamingLink);
          } else {
            const firstSeason = seasonsList[0];
            const firstEp = seriesEpisodes.find(ep => ep.season === firstSeason);
            if (firstEp && firstEp.videoUrl) {
              currentEpisodePlaying = firstEp;
              renderEpisodes();
              await loadAndPlayVideo(firstEp.videoUrl);
            } else {
              throw new Error("No video available for this series");
            }
          }
        } else {
          seriesSidebar.classList.remove('visible');

          // Regular movie - load from DB if no streamingLink
          if (!streamingLink && movieId) {
            const db = getDb(currentSource);
            const movieDoc = await getDoc(doc(db, 'movies', movieId));
            if (movieDoc.exists()) {
              const data = movieDoc.data();
              streamingLink = data.googleDriveLink || data.videoUrl || data.streamingLink;
              document.title = `${data.title || 'Watching'} | KINAFLIX`;
            }
            // Fallback to Cullo if not found
            if (!streamingLink && currentSource === 'kinaflix') {
              try {
                const culloDoc = await getDoc(doc(db2, 'movies', movieId));
                if (culloDoc.exists()) {
                  const data = culloDoc.data();
                  streamingLink = data.videoUrl || data.googleDriveLink || data.streamingLink;
                  if (data.title) document.title = `${data.title} | KINAFLIX`;
                }
              } catch (e) { }
            }
          }

          if (!streamingLink) throw new Error("No streaming link available");
          await loadAndPlayVideo(streamingLink);
        }

        if (!document.title.includes('|')) {
          document.title = 'Watching | KINAFLIX';
        }

      } catch (error) {
        console.error('Error:', error);
        const container = document.getElementById('video-container');
        container.innerHTML = `<div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;color:#e50914;text-align:center;padding:2rem;"><h1>⚠️ Error</h1><p>${error.message}</p><a href="index.html" style="background:#e50914;color:white;padding:0.5rem 1rem;border-radius:4px;text-decoration:none;margin-top:1rem;">Go Back</a></div>`;
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'none';
      }
    };

    if (document.readyState === 'complete') {
      initPlayer();
    } else {
      document.addEventListener('DOMContentLoaded', initPlayer);
    }
  </script>
</body>

</html>
