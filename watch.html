  <script type="module">

    // ==========================================
    // MODULE 1: NETWORK MONITOR
    // ==========================================
    class NetworkMonitor {
      constructor() {
        this.bandwidth = null;
        this.connectionType = 'unknown';
        this.listeners = [];
        this.testUrl = 'https://www.google.com/images/phd/px.gif';
        this.isMonitoring = false;
      }

      async measureBandwidth() {
        const startTime = performance.now();
        try {
          const response = await fetch(this.testUrl + '?t=' + Date.now(), {
            cache: 'no-store',
            mode: 'no-cors'
          });
          const endTime = performance.now();
          const duration = (endTime - startTime) / 1000;
          const sizeInBits = 100 * 8; // ~100 bytes test file
          this.bandwidth = (sizeInBits / duration) / 1000000; // Mbps
        } catch (e) {
          this.bandwidth = 0.5; // Assume slow on error
        }
        this.detectConnectionType();
        this.notifyListeners();
        return this.bandwidth;
      }

      detectConnectionType() {
        if (navigator.connection) {
          const conn = navigator.connection;
          if (conn.effectiveType === 'slow-2g' || conn.effectiveType === '2g') {
            this.connectionType = 'slow';
          } else if (conn.effectiveType === '3g') {
            this.connectionType = 'medium';
          } else if (conn.downlink > 5) {
            this.connectionType = 'fast';
          } else {
            this.connectionType = 'medium';
          }
        } else if (this.bandwidth < 1) {
          this.connectionType = 'slow';
        } else if (this.bandwidth < 5) {
          this.connectionType = 'medium';
        } else {
          this.connectionType = 'fast';
        }
      }

      getConnectionType() {
        return this.connectionType;
      }

      onSpeedChange(callback) {
        this.listeners.push(callback);
      }

      notifyListeners() {
        this.listeners.forEach(cb => cb({
          bandwidth: this.bandwidth,
          connectionType: this.connectionType
        }));
      }

      startMonitoring(intervalMs = 30000) {
        if (this.isMonitoring) return;
        this.isMonitoring = true;
        this.measureBandwidth();
        this.interval = setInterval(() => this.measureBandwidth(), intervalMs);
      }

      stopMonitoring() {
        this.isMonitoring = false;
        if (this.interval) clearInterval(this.interval);
      }
    }

    // ==========================================
    // MODULE 2: ADAPTIVE BUFFER MANAGER
    // ==========================================
    class AdaptiveBufferManager {
      constructor(videoElement) {
        this.video = videoElement;
        this.stallCount = 0;
        this.lastStallTime = 0;
        this.isStalled = false;
      }

      getBufferHealth() {
        if (!this.video) return 0;
        const buffered = this.video.buffered;
        const currentTime = this.video.currentTime;
        if (buffered.length === 0) return 0;

        let bufferedEnd = 0;
        for (let i = 0; i < buffered.length; i++) {
          if (currentTime >= buffered.start(i) && currentTime <= buffered.end(i)) {
            bufferedEnd = buffered.end(i);
            break;
          }
        }
        const bufferSeconds = Math.max(0, bufferedEnd - currentTime);
        return bufferSeconds;
      }

      getBufferPercentage(optimalBuffer = 30) {
        const health = this.getBufferHealth();
        return Math.min(100, Math.round((health / optimalBuffer) * 100));
      }

      predictStall() {
        const buffer = this.getBufferHealth();
        const playbackRate = this.video?.playbackRate || 1;
        const effectiveBuffer = buffer / playbackRate;
        if (effectiveBuffer < 3) return 0.9;
        if (effectiveBuffer < 8) return 0.5;
        if (effectiveBuffer < 15) return 0.2;
        return 0.05;
      }

      onStall() {
        this.stallCount++;
        this.lastStallTime = Date.now();
        this.isStalled = true;
      }

      onRecover() {
        this.isStalled = false;
      }

      shouldDegradeQuality() {
        return this.stallCount >= 3;
      }

      resetStallCounter() {
        if (Date.now() - this.lastStallTime > 60000) {
          this.stallCount = 0;
        }
      }
    }

      getAvailableQualities(url) {
        // Check for quality variants in URL pattern
        const qualities = [];
        const basePatterns = [
          { suffix: '_4k.mp4', quality: '2160p' },
          { suffix: '_1080p.mp4', quality: '1080p' },
          { suffix: '_720p.mp4', quality: '720p' },
          { suffix: '_480p.mp4', quality: '480p' },
          { suffix: '_360p.mp4', quality: '360p' },
          { suffix: '_240p.mp4', quality: '240p' },
        ];

        if (url.includes('archive.org')) {
          // Archive.org often has multiple qualities
          const base = url.replace(/\.(mp4|webm)$/i, '');
          qualities.push(
            { url: url, quality: '720p' },
            { url: base + '.mp4', quality: '480p' }
          );
        }

        return qualities;
      }

      selectOptimalQuality(bandwidth) {
        if (this.manualOverride) return this.currentQuality;
        if (bandwidth >= 10) return '1080p';
        if (bandwidth >= 5) return '720p';
        if (bandwidth >= 2) return '480p';
        if (bandwidth >= 0.5) return '360p';
        return '240p';

        this.currentQuality = quality;
        this.manualOverride = quality !== 'auto';

    // ==========================================
    // MODULE 4: MULTI-SOURCE MANAGER
    // ==========================================
    class MultiSourceManager {
      constructor() {
        this.sources = [];
        this.currentSourceIndex = 0;
        this.retryCount = 0;
        this.maxRetries = 3;
        this.circuitOpen = false;
      }

      addSource(url, type, quality = '720p') {
        this.sources.push({ url, type, quality, failed: false });
      }

      getCurrentSource() {
        if (this.sources.length === 0) return null;
        return this.sources[this.currentSourceIndex];
      }

      getNextAvailableSource() {
        for (let i = this.currentSourceIndex + 1; i < this.sources.length; i++) {
          if (!this.sources[i].failed) return this.sources[i];
        }
        return null;
      }

      async testSourceAvailability(url) {
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 3000);
          const response = await fetch(url, {
            method: 'HEAD',
            signal: controller.signal,
            cache: 'no-store'
          });
          clearTimeout(timeout);
          return response.ok;
        } catch (e) {
          return false;
        }
      }

      markCurrentFailed() {
        if (this.sources[this.currentSourceIndex]) {
          this.sources[this.currentSourceIndex].failed = true;
        }
        this.retryCount++;
        if (this.retryCount >= this.maxRetries) {
          this.circuitOpen = true;
        }
      }

      switchToNextSource() {
        const next = this.getNextAvailableSource();
        if (next) {
          this.currentSourceIndex = this.sources.indexOf(next);
          return next;
        }
        return null;
      }

      resetCircuit() {
        this.retryCount = 0;
        this.circuitOpen = false;
        this.sources.forEach(s => s.failed = false);
      }
    }

            abrEwmaFastLive: 3,
            abrEwmaSlowLive: 9,
            abrEwmaFastVoD: 3,
            abrEwmaSlowVoD: 9,
            abrEwmaDefaultEstimate: 500000,
            abrBandWidthFactor: 0.95,
            abrBandWidthUpFactor: 0.7,
            abrMaxWithRealBitrate: true,
            maxStarvationDelay: 4,
            maxLoadingDelay: 4,
            manifestLoadPolicy: {
              default: {
                maxTimeToFirstByteMs: 10000,
                maxLoadTimeMs: 20000,
                timeoutRetry: { maxNumRetry: 2, retryDelayMs: 1000, maxRetryDelayMs: 8000 }
              }
            }
          });

          hls.loadSource(url);
          hls.attachMedia(video);
          
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            qualitySelector.hlsLevels = hls.levels;
            resolve(hls);
          });

          hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
            const level = hls.levels[data.level];
            if (level) {
              const height = level.height;
              const quality = height >= 1080 ? '1080p' : height >= 720 ? '720p' : height >= 480 ? '480p' : '360p';
              updateQualityUI(quality);
            }
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
              switch (data.type) {
                case Hls.ErrorTypes.NETWORK_ERROR:
                  hls.startLoad();
                  break;
                case Hls.ErrorTypes.MEDIA_ERROR:
                  hls.recoverMediaError();
                  break;
                default:
                  reject(new Error('Fatal HLS error'));
                  break;
              }
            }
          });

          currentHls = hls;
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url;
          resolve(null);
        } else {
          reject(new Error('HLS not supported'));
        }
      });
    }

    // ===== DIRECT PLAYER WITH ADAPTIVE BUFFERING =====
    function setupDirectPlayer(video, url) {
      return new Promise((resolve) => {
        video.src = url;
        video.load();
        resolve(null);
      });
    }

    // ===== MAIN PLAYER INITIALIZATION =====
    async function initAdaptivePlayer(streamingLink) {
      const container = document.getElementById('video-container');
      const loadingOverlay = document.getElementById('loading-overlay');
      const loadingText = document.getElementById('loading-text');
      const loadingSpeed = document.getElementById('loading-speed');

      // Remove old video element
      const oldVideo = container.querySelector('video');
      if (oldVideo) oldVideo.remove();

      // Create fresh video element
      const video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.style.cssText = 'width:100%;height:100%;background:#000;';
      video.setAttribute('playsinline', '');
      container.appendChild(video);

      // Initialize buffer manager
      bufferManager = new AdaptiveBufferManager(video);

      // Start network monitoring
      loadingText.textContent = 'Testing connection speed...';
      await networkMonitor.measureBandwidth();
      loadingSpeed.textContent = `${Math.round(networkMonitor.bandwidth * 10) / 10} Mbps detected`;
      updateNetworkUI({
        bandwidth: networkMonitor.bandwidth,
        connectionType: networkMonitor.connectionType
      });

      // Select optimal quality
      const optimalQuality = qualitySelector.selectOptimalQuality(networkMonitor.bandwidth);
      updateQualityUI(qualitySelector.currentQuality);

      loadingText.textContent = 'Loading video...';

      try {
        // Try HLS first for adaptive streaming
        if (streamingLink.includes('.m3u8') || streamingLink.includes('hls')) {
          await setupHlsPlayer(video, streamingLink);
        } else {
          // Direct playback with adaptive monitoring
          await setupDirectPlayer(video, streamingLink);
        }

        // Buffer monitoring
        const bufferInterval = setInterval(() => {
          if (!bufferManager) return;
          
          const bufferHealth = bufferManager.getBufferHealth();
          const bufferPercent = bufferManager.getBufferPercentage();
          const stallProb = bufferManager.predictStall();

          updateBufferUI(bufferPercent);

          if (stallProb > 0.5 && bufferManager.shouldDegradeQuality()) {
            showReduceQualityButton();
          }

          if (bufferHealth < 2 && !video.paused) {
            bufferManager.onStall();
            showToast('Buffering...', 1500);
          }

          if (bufferHealth > 10) {
            bufferManager.onRecover();
            hideReduceQualityButton();
            bufferManager.resetStallCounter();
          }
        }, 2000);

        // Video event listeners
        video.addEventListener('waiting', () => {
          loadingOverlay.style.display = 'flex';
          loadingText.textContent = 'Buffering...';
        });

        video.addEventListener('playing', () => {
          loadingOverlay.style.display = 'none';
          hideReduceQualityButton();
        });

        video.addEventListener('canplay', () => {
          loadingOverlay.style.display = 'none';
        });

        video.addEventListener('error', async (e) => {
          console.error('Video error:', e);
          multiSourceManager.markCurrentFailed();
          const nextSource = multiSourceManager.switchToNextSource();
          if (nextSource) {
            showToast('Switching to alternative source...', 2000);
            video.src = nextSource.url;
            video.load();
          }
        });

        // Start periodic bandwidth monitoring
        networkMonitor.startMonitoring(15000);

        return video;
      } catch (error) {
        console.error('Player error:', error);
        loadingText.textContent = 'Error loading video. Retrying...';
        throw error;
      }
    }

    // ===== VIDEO TYPE DETECTION =====
    function detectVideoType(url) {
      if (!url) return 'unknown';
      const u = url.toLowerCase();
      if (u.includes('.m3u8') || u.includes('hls')) return 'hls';
      if (u.includes('drive.google.com') || u.includes('gdrive')) return 'googledrive';
      if (u.includes('rumble.com')) return 'rumble';
      if (u.includes('archive.org') || u.includes('ia800')) return 'archive';
      if (u.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return 'direct';
      return 'unknown';
    }

    function extractGoogleDriveId(url) {
      const patterns = [/\/d\/([a-zA-Z0-9_-]+)/, /id=([a-zA-Z0-9_-]+)/, /file\/d\/([a-zA-Z0-9_-]+)/];
      for (const p of patterns) { const m = url.match(p); if (m && m[1]) return m[1]; }
      return null;
    }

    function extractRumbleId(url) {
      const patterns = [/rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/, /v([a-zA-Z0-9]+)/, /video\/([a-zA-Z0-9_-]+)/];
      for (const p of patterns) { const m = url.match(p); if (m && m[1]) return m[1]; }
      return null;
    }

    function extractArchiveIdentifier(url) {
      const m1 = url.match(/\/items\/([^\/]+)\//); if (m1 && m1[1]) return m1[1];
      const m2 = url.match(/\/details\/([^\/?#]+)/); if (m2 && m2[1]) return m2[1];
      return null;
    }

    function getArchiveDirectUrl(url) {
      if (url.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return url;
      const id = extractArchiveIdentifier(url);
      return id ? `https://archive.org/download/${id}/${id}.mp4` : null;
    }

    // ===== SPECIAL PLAYERS =====
    async function initArchivePlayer(videoUrl, loadingOverlay) {
      const directUrl = getArchiveDirectUrl(videoUrl);
      if (directUrl) {
        return await initAdaptivePlayer(directUrl);
      }
      const container = document.getElementById('video-container');
      const id = extractArchiveIdentifier(videoUrl);
      container.innerHTML = `<iframe src="https://archive.org/embed/${id}" frameborder="0" allowfullscreen style="width:100%;height:100%;"></iframe>`;
      setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 3000);
      return null;
    }

    async function initGoogleDrivePlayer(fileId, loadingOverlay) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<iframe src="https://drive.google.com/file/d/${fileId}/preview" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
      setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
      return null;
    }

    async function initRumblePlayer(videoId, loadingOverlay) {
      const divId = `rumble_${videoId}`;
      const container = document.getElementById('video-container');
      container.innerHTML = `<div id="${divId}" style="width:100%;height:100%;"></div>`;
      !function(r,u,m,b,l,e){r._Rumble=b;r[b]||(r[b]=function(){(r[b]._=r[b]._||[]).push(arguments);if(r[b]._.length==1){l=u.createElement(m),e=u.getElementsByTagName(m)[0],l.async=1,l.src="https://rumble.com/embedJS/"+RUMBLE_CHANNEL_ID+(arguments[1].video?'.'+arguments[1].video:'')+"/?url="+encodeURIComponent(location.href)+"&args="+encodeURIComponent(JSON.stringify([].slice.apply(arguments))),e.parentNode.insertBefore(l,e)}})}(window,document,"script","Rumble");
      Rumble("play",{video:videoId,div:divId});
      setTimeout(()=>{if(loadingOverlay)loadingOverlay.style.display='none';},5000);
      return null;
    }

    // ===== QUALITY MENU HANDLER =====
    document.getElementById('quality-badge').addEventListener('click', () => {
      document.getElementById('quality-menu').classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      const menu = document.getElementById('quality-menu');
      const badge = document.getElementById('quality-badge');
      if (!menu.contains(e.target) && !badge.contains(e.target)) {
        menu.classList.remove('open');
      }
    });

    document.querySelectorAll('.quality-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const quality = opt.dataset.quality;
        qualitySelector.setQuality(quality);
        updateQualityUI(quality);
        document.getElementById('quality-menu').classList.remove('open');
        showToast(`Quality set to ${quality === 'auto' ? 'Auto' : quality}`, 2000);
      });
    });

    // ===== NETWORK SPEED CHANGE HANDLER =====
    networkMonitor.onSpeedChange((data) => {
      updateNetworkUI(data);
      if (qualitySelector.currentQuality === 'auto') {
        const optimal = qualitySelector.selectOptimalQuality(data.bandwidth);
        updateQualityUI('auto');
      }
    });

    // ===== LOAD AND PLAY =====
    async function loadAndPlayVideo(streamingLink) {
      const loadingOverlay = document.getElementById('loading-overlay');
      if (loadingOverlay) loadingOverlay.style.display = 'flex';

      const decodedLink = decodeURIComponent(streamingLink);
      const videoType = detectVideoType(decodedLink);

      try {
        if (videoType === 'hls' || videoType === 'direct') {
          await initAdaptivePlayer(decodedLink);
        } else if (videoType === 'archive') {
          await initArchivePlayer(decodedLink, loadingOverlay);
        } else if (videoType === 'googledrive') {
          const fileId = extractGoogleDriveId(decodedLink);
          if (fileId) await initGoogleDrivePlayer(fileId, loadingOverlay);
        } else if (videoType === 'rumble') {
          const videoId = extractRumbleId(decodedLink);
          if (videoId) await initRumblePlayer(videoId, loadingOverlay);
        } else {
          await initAdaptivePlayer(decodedLink);
        }
      } catch (error) {
        console.error('Playback error:', error);
        showToast('Error loading video. Please try again.', 3000);
      }

      if (loadingOverlay) loadingOverlay.style.display = 'none';
    }

    // ===== SERIES DATA (unchanged) =====
    let seriesEpisodes = [], seasonsList = [], currentSeason = 1;
    let currentMovieId = null, currentSource = null, currentEpisodePlaying = null;

    async function loadSeriesData(movieId, source) {
      try {
        const db = getDb(source);
        if (source === 'kinaflix') {
          const movieDoc = await getDoc(doc(db, 'movies', movieId));
          const movieData = movieDoc.data();
          if (movieData && movieData.seriesId) {
            const seriesQuery = query(collection(db, 'movies'), where('seriesId', '==', movieData.seriesId), orderBy('releaseYear', 'asc'));
            const seriesSnap = await getDocs(seriesQuery);
            seriesEpisodes = []; seasonsList = [];
            let epNum = 1;
            seriesSnap.docs.forEach(docSnap => {
              const epData = docSnap.data();
              const seasonYear = epData.releaseYear || 1;
              if (!seasonsList.includes(seasonYear)) seasonsList.push(seasonYear);
              seriesEpisodes.push({
                id: docSnap.id, season: seasonYear, number: epNum,
                title: epData.title || `Episode ${epNum}`,
                videoUrl: epData.googleDriveLink || epData.videoUrl || '',
                source: 'kinaflix'
              });
              epNum++;
            });
            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0) currentSeason = seasonsList[0];
            let seriesName = '';
            try { const sd = await getDoc(doc(db, 'series', movieData.seriesId)); if (sd.exists()) seriesName = sd.data().name; } catch(e) {}
            document.getElementById('series-title').textContent = seriesName || movieData.title || 'Series';
            return true;
          }
        }
        if (source === 'cullo') {
          let movieDoc = await getDoc(doc(db, 'movies', movieId));
          if (movieDoc.exists()) {
            const data = movieDoc.data();
            if (data.seasons && Array.isArray(data.seasons) && data.seasons.length > 0) {
              return buildCulloSeries(data);
            }
          }
          const seriesDoc = await getDoc(doc(db, 'series', movieId));
          if (seriesDoc.exists()) return buildCulloSeries(seriesDoc.data());
        }
        return false;
      } catch (error) { console.error('Error loading series:', error); return false; }
    }

    function buildCulloSeries(data) {
      seriesEpisodes = []; seasonsList = [];
      data.seasons.forEach((season, idx) => {
        const snum = season.number || idx + 1;
        if (!seasonsList.includes(snum)) seasonsList.push(snum);
        (season.episodes || []).forEach(ep => {
          seriesEpisodes.push({
            id: ep.id || `${currentMovieId}_s${snum}_e${ep.number}`,
            season: snum, number: ep.number || '?',
            title: ep.title || `Episode ${ep.number}`,
            videoUrl: ep.videoUrl || '', source: 'cullo'
          });
        });
      });
      seasonsList.sort((a, b) => a - b);
      if (seasonsList.length > 0) currentSeason = seasonsList[0];
      document.getElementById('series-title').textContent = data.title || 'Series';
      return true;
    }

    function renderEpisodes() {
      const seasonEpisodes = seriesEpisodes.filter(ep => ep.season === currentSeason);
      document.getElementById('season-tabs').innerHTML = seasonsList.map(s =>
        `<button class="season-tab ${s === currentSeason ? 'active' : ''}" data-season="${s}">${currentSource === 'kinaflix' ? s : 'Season ' + s}</button>`
      ).join('');
      const listDiv = document.getElementById('episodes-list');
      if (seasonEpisodes.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center;padding:2rem;color:#666;">No episodes available.</div>';
      } else {
        listDiv.innerHTML = seasonEpisodes.map(ep => {
          const isActive = currentEpisodePlaying && currentEpisodePlaying.id === ep.id;
          return `<div class="episode-item ${isActive ? 'active' : ''}" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
            <div class="episode-number">${isActive ? '<div class="playing-indicator"><span></span><span></span><span></span></div>' : 'Ep ' + ep.number}</div>
            <div class="episode-info"><div class="episode-title">${escapeHtml(ep.title)}</div></div>
          </div>`;
        }).join('');
      }
      document.querySelectorAll('.season-tab').forEach(tab => {
        tab.addEventListener('click', () => { currentSeason = parseInt(tab.dataset.season); renderEpisodes(); });
      });
      document.querySelectorAll('.episode-item').forEach(item => {
        item.addEventListener('click', async () => {
          const ep = JSON.parse(item.dataset.episode);
          if (!ep.videoUrl || ep.videoUrl.trim() === '') { showToast('Coming soon!'); return; }
          currentEpisodePlaying = ep; renderEpisodes();
          showToast(`Loading: ${ep.title}`);
          await loadAndPlayVideo(ep.videoUrl);
          window.history.pushState({}, '', `${window.location.pathname}?movieId=${ep.id}&source=${ep.source}`);
        });
      });
    }

    // ===== MAIN INIT =====
    const initPlayer = async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('movieId');
        let streamingLink = urlParams.get('streamingLink');
        currentSource = urlParams.get('source') || 'kinaflix';
        currentMovieId = movieId;

        if (!movieId && !streamingLink) throw new Error("Invalid movie ID or streaming link");

        const backButton = document.getElementById('back-button');
        if (backButton && movieId) backButton.href = `see.html?id=${movieId}&source=${currentSource}`;
        else if (backButton) backButton.href = 'index.html';

        const seriesSidebar = document.getElementById('series-sidebar');
        const isSeries = await loadSeriesData(movieId, currentSource);

        if (isSeries && seriesEpisodes.length > 0) {
          seriesSidebar.classList.add('visible'); renderEpisodes();
          const currentEp = seriesEpisodes.find(ep => ep.id === movieId);
          if (currentEp) {
            currentEpisodePlaying = currentEp; renderEpisodes();
            if (currentEp.videoUrl) await loadAndPlayVideo(currentEp.videoUrl);
            else if (streamingLink) await loadAndPlayVideo(streamingLink);
          } else if (streamingLink) {
            await loadAndPlayVideo(streamingLink);
          } else {
            const firstEp = seriesEpisodes.find(ep => ep.season === seasonsList[0]);
            if (firstEp && firstEp.videoUrl) { currentEpisodePlaying = firstEp; renderEpisodes(); await loadAndPlayVideo(firstEp.videoUrl); }
            else throw new Error("No video available");
          }
        } else {
          seriesSidebar.classList.remove('visible');
          if (!streamingLink && movieId) {
            const db = getDb(currentSource);
            const movieDoc = await getDoc(doc(db, 'movies', movieId));
            if (movieDoc.exists()) {
              const data = movieDoc.data();
              streamingLink = data.googleDriveLink || data.videoUrl || data.streamingLink;
              document.title = `${data.title || 'Watching'} | KINAFLIX`;
            }
            if (!streamingLink && currentSource === 'kinaflix') {
              try {
                const culloDoc = await getDoc(doc(db2, 'movies', movieId));
                if (culloDoc.exists()) {
                  const data = culloDoc.data();
                  streamingLink = data.videoUrl || data.googleDriveLink || data.streamingLink;
                  if (data.title) document.title = `${data.title} | KINAFLIX`;
                }
              } catch(e) {}
            }
          }
          if (!streamingLink) throw new Error("No streaming link available");
          await loadAndPlayVideo(streamingLink);
        }

        if (!document.title.includes('|')) document.title = 'Watching | KINAFLIX';
      } catch (error) {
        console.error('Error:', error);
        const container = document.getElementById('video-container');
        container.innerHTML = `<div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;color:#e50914;text-align:center;padding:2rem;"><h1>⚠️ Error</h1><p>${error.message}</p><a href="index.html" style="background:#e50914;color:white;padding:0.5rem 1rem;border-radius:4px;text-decoration:none;margin-top:1rem;">Go Back</a></div>`;
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'none';
      }
    };

    if (document.readyState === 'complete') initPlayer();
    else document.addEventListener('DOMContentLoaded', initPlayer);
  </script>
