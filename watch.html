  <style>
    :root {
      --primary: #e50914;
      --dark: #000000;
      --light: #f5f5f5;
      --gray-text: #888;
      --dark-gray: #1a1a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dark);
      color: var(--light);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* Main layout: video + series sidebar */
    .main-container {
      display: flex;
      width: 100%;
      height: 100vh;
      flex-direction: row;
    }

    /* Video container - takes remaining space */
    .video-wrapper {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .video-container {
      width: 100%;
      height: 100%;
      background: #000;
      position: relative;
    }

    .video-container iframe,
    .video-container video,
    .video-container div[id^="rumble_"] {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Series Episodes Sidebar - RIGHT SIDE */
    .series-sidebar {
      width: 320px;
      background: var(--dark-gray);
      display: none;
      flex-direction: column;
      border-left: 1px solid #333;
      height: 100vh;
      overflow: hidden;
    }

    .series-sidebar.visible {
      display: flex;
    }

    .sidebar-header {
      padding: 1rem;
      background: rgba(0, 0, 0, 0.5);
      border-bottom: 1px solid #333;
    }

    .series-title {
      font-size: 1.2rem;
      color: var(--primary);
      font-weight: bold;
      margin: 0;
    }

    .season-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      flex-wrap: nowrap;
      border-bottom: 1px solid #333;
      background: rgba(0, 0, 0, 0.3);
    }

    .season-tab {
      background: #333;
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .season-tab.active {
      background: var(--primary);
    }

    .episodes-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }

    .episode-item {
      background: #2a2a2a;
      border-radius: 8px;
      padding: 0.8rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .episode-item:hover {
      background: var(--primary);
      transform: translateX(-3px);
    }

    .episode-item.active {
      background: var(--primary);
      border-left: 3px solid #ff6b6b;
    }

    .episode-number {
      font-size: 0.9rem;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      min-width: 50px;
      text-align: center;
    }

    .episode-info {
      flex: 1;
    }

    .episode-title {
      font-size: 0.8rem;
      color: #ccc;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .episode-item:hover .episode-title {
      color: #fff;
    }

    .playing-indicator {
      display: flex;
      gap: 2px;
      align-items: center;
      justify-content: center;
    }

    .playing-indicator span {
      width: 3px;
      height: 8px;
      background: white;
      border-radius: 1px;
      animation: wave 1s infinite ease-in-out;
    }

    .playing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .playing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 16px; }
    }

    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background-color: var(--primary);
      color: white;
      border: none;
      transition: all 0.3s ease;
      cursor: pointer;
      font-weight: bold;
    }

    .back-button:hover {
      background-color: #f40612;
      color: white;
      transform: scale(1.05);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      z-index: 1000;
      transition: transform 0.3s ease;
      pointer-events: none;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbar styling */
    .episodes-list::-webkit-scrollbar {
      width: 6px;
    }
    .episodes-list::-webkit-scrollbar-track {
      background: var(--dark-gray);
    }
    .episodes-list::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }
    .season-tabs::-webkit-scrollbar {
      height: 4px;
    }
    .season-tabs::-webkit-scrollbar-track {
      background: var(--dark-gray);
    }
    .season-tabs::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    /* Mobile responsive - well flexed */
    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }
      .video-wrapper {
        height: 50vh;
        min-height: 300px;
      }
      .series-sidebar {
        width: 100%;
        height: 50vh;
        min-height: 300px;
      }
      .back-button {
        top: 10px;
        left: 10px;
        font-size: 0.8rem;
        padding: 0.3rem 0.8rem;
      }
      .back-button span:last-child {
        display: inline-block;
      }
      .toast {
        font-size: 0.8rem;
        white-space: normal;
        text-align: center;
        max-width: 90%;
      }
    }

    /* Tablet responsive */
    @media (min-width: 769px) and (max-width: 1024px) {
      .series-sidebar {
        width: 280px;
      }
      .episode-number {
        min-width: 45px;
        font-size: 0.8rem;
      }
      .episode-title {
        font-size: 0.75rem;
      }
    }

    /* Desktop large screens */
    @media (min-width: 1440px) {
      .series-sidebar {
        width: 360px;
      }
      .episode-number {
        min-width: 55px;
        font-size: 1rem;
      }
      .episode-title {
        font-size: 0.9rem;
      }
    }

    /* Error container styling */
    .error-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #000;
      color: #e50914;
      text-align: center;
      padding: 2rem;
      z-index: 20;
    }
    .error-container h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .error-container p {
      margin-bottom: 1.5rem;
      color: #ccc;
    }
    .error-container a {
      background: #e50914;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .error-container a:hover {
      background: #f40612;
      transform: scale(1.05);
    }
  </style>
</head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
    import {
      getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy
    } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js";

    // Configuration
    const RUMBLE_CHANNEL_ID = 'u4m9tqz';

    // Firebase configs
    const firebaseConfig1 = {
      apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k",
      authDomain: "kinaflix.firebaseapp.com",
      projectId: "kinaflix",
      storageBucket: "kinaflix.appspot.com",
      messagingSenderId: "318239806217",
      appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8"
    };

    const firebaseConfig2 = {
      apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk",
      authDomain: "cullo-movies-6813f.firebaseapp.com",
      projectId: "cullo-movies-6813f",
      messagingSenderId: "12310118231",
      appId: "1:12310118231:web:34682f354027fd19758812"
    };

    // Initialize apps
    const app1 = initializeApp(firebaseConfig1, "kinaflix");
    const db1 = getFirestore(app1);
    const app2 = initializeApp(firebaseConfig2, "cullo");
    const db2 = getFirestore(app2);

    // Toast function
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Video type detection
    function detectVideoType(url) {
      if (!url) return 'unknown';
      const urlLower = url.toLowerCase();
      if (urlLower.includes('drive.google.com') || urlLower.includes('gdrive')) return 'googledrive';
      if (urlLower.includes('rumble.com')) return 'rumble';
      if (urlLower.includes('archive.org') || urlLower.includes('ia800') || urlLower.includes('ia600')) return 'archive';
      if (urlLower.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return 'direct';
      return 'unknown';
    }

    function extractGoogleDriveId(url) {
      const patterns = [/\/d\/([a-zA-Z0-9_-]+)/, /id=([a-zA-Z0-9_-]+)/, /file\/d\/([a-zA-Z0-9_-]+)/];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }
      return null;
    }

    function extractRumbleId(url) {
      const patterns = [/rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/, /v([a-zA-Z0-9]+)/, /video\/([a-zA-Z0-9_-]+)/];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }
      return null;
    }

    function extractArchiveIdentifier(url) {
      const directMatch = url.match(/\/items\/([^\/]+)\//);
      if (directMatch && directMatch[1]) return directMatch[1];
      const detailsMatch = url.match(/\/details\/([^\/?#]+)/);
      if (detailsMatch && detailsMatch[1]) return detailsMatch[1];
      const downloadMatch = url.match(/\/download\/([^\/?#]+)/);
      if (downloadMatch && downloadMatch[1]) return downloadMatch[1];
      return null;
    }

    function getArchiveDirectUrl(url) {
      if (url.match(/\.(mp4|webm|mkv|mov|avi)$/i)) return url;
      const identifier = extractArchiveIdentifier(url);
      if (identifier) return `https://archive.org/download/${identifier}/${identifier}.mp4`;
      return null;
    }

    // Player initializers
    async function initArchivePlayer(videoUrl, loadingOverlay) {
      const container = document.getElementById('video-container');
      const directUrl = getArchiveDirectUrl(videoUrl);
      if (directUrl) {
        container.innerHTML = `<video controls autoplay style="width:100%;height:100%;background:#000;"><source src="${directUrl}" type="video/mp4"><p>Your browser doesn't support HTML5 video.</p></video>`;
        const video = container.querySelector('video');
        if (video && loadingOverlay) {
          video.addEventListener('canplay', () => loadingOverlay.style.display = 'none');
          video.addEventListener('loadeddata', () => loadingOverlay.style.display = 'none');
          video.addEventListener('error', () => loadingOverlay.style.display = 'none');
          setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 8000);
        }
      } else {
        const identifier = extractArchiveIdentifier(videoUrl);
        if (identifier) {
          container.innerHTML = `<iframe src="https://archive.org/embed/${identifier}" frameborder="0" allowfullscreen style="width:100%;height:100%;"></iframe>`;
        } else {
          container.innerHTML = `<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;color:#e50914;"><i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:20px;"></i><p>Unable to play this video.</p></div>`;
        }
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 3000);
      }
    }

    async function initRumblePlayer(videoId, loadingOverlay) {
      const divId = `rumble_${videoId}`;
      const container = document.getElementById('video-container');
      container.innerHTML = `<div id="${divId}" style="width:100%;height:100%;"></div>`;
      
      // Load Rumble embed script
      !function (r, u, m, b, l, e) {
        r._Rumble = b;
        r[b] || (r[b] = function () {
          (r[b]._ = r[b]._ || []).push(arguments);
          if (r[b]._.length == 1) {
            l = u.createElement(m),
            e = u.getElementsByTagName(m)[0],
            l.async = 1,
            l.src = "https://rumble.com/embedJS/" + RUMBLE_CHANNEL_ID +
            (arguments[1].video ? '.' + arguments[1].video : '') +
            "/?url=" + encodeURIComponent(location.href) +
            "&args=" + encodeURIComponent(JSON.stringify([].slice.apply(arguments))),
            e.parentNode.insertBefore(l, e)
          }
        })
      }(window, document, "script", "Rumble");
      
      Rumble("play", { video: videoId, div: divId });
      setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
    }

    async function initGoogleDrivePlayer(fileId, loadingOverlay) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<iframe src="https://drive.google.com/file/d/${fileId}/preview" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
      setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
    }

    async function initDirectVideoPlayer(videoUrl, loadingOverlay) {
      const container = document.getElementById('video-container');
      container.innerHTML = `<video controls autoplay style="width:100%;height:100%;background:#000;"><source src="${videoUrl}" type="video/mp4"></video>`;
      const video = container.querySelector('video');
      if (video && loadingOverlay) {
        video.addEventListener('canplay', () => loadingOverlay.style.display = 'none');
        video.addEventListener('loadeddata', () => loadingOverlay.style.display = 'none');
        video.addEventListener('error', () => loadingOverlay.style.display = 'none');
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 8000);
      }
    }

    // Series data storage
    let seriesEpisodes = [];
    let seasonsList = [];
    let currentSeason = 1;
    let currentMovieId = null;
    let currentSource = null;
    let currentEpisodePlaying = null;
    let currentSeriesTitle = '';

    // Load series data from BOTH databases
    async function loadSeriesData(movieId, source) {
      try {
        seriesEpisodes = [];
        seasonsList = [];
        
        // FIRST: Check in Kinaflix (db1) - handles seriesId structure
        const kinaflixDoc = await getDoc(doc(db1, 'movies', movieId));
        const kinaflixData = kinaflixDoc.data();
        
        if (kinaflixData && kinaflixData.seriesId) {
          console.log('✓ Series found in Kinaflix with seriesId:', kinaflixData.seriesId);
          
          // Get all episodes in this series
          const seriesQuery = query(collection(db1, 'movies'), where('seriesId', '==', kinaflixData.seriesId), orderBy('releaseYear', 'asc'));
          const seriesSnap = await getDocs(seriesQuery);
          
          let epNum = 1;
          seriesSnap.docs.forEach(docSnap => {
            const epData = docSnap.data();
            const seasonYear = epData.releaseYear || 1;
            if (!seasonsList.includes(seasonYear)) seasonsList.push(seasonYear);
            seriesEpisodes.push({
              id: docSnap.id,
              season: seasonYear,
              number: epNum,
              title: epData.title || `Episode ${epNum}`,
              videoUrl: epData.googleDriveLink || epData.videoUrl || '',
              source: 'kinaflix'
            });
            epNum++;
          });
          
          // Get series name
          try {
            const seriesDoc = await getDoc(doc(db1, 'series', kinaflixData.seriesId));
            if (seriesDoc.exists()) currentSeriesTitle = seriesDoc.data().name;
          } catch(e) { console.log('Could not get series name'); }
          
          if (currentSeriesTitle === '') currentSeriesTitle = kinaflixData.title || 'Series';
          
          seasonsList.sort((a, b) => a - b);
          if (seasonsList.length > 0) currentSeason = seasonsList[0];
          return true;
        }
        
        // SECOND: Check in Cullo (db2) - handles seasons structure
        if (source === 'cullo') {
          const culloDoc = await getDoc(doc(db2, 'movies', movieId));
          const culloData = culloDoc.data();
          
          if (culloData && culloData.seasons && Array.isArray(culloData.seasons) && culloData.seasons.length > 0) {
            console.log('✓ Series found in Cullo with seasons structure');
            
            culloData.seasons.forEach((season, idx) => {
              const seasonNum = season.number || idx + 1;
              if (!seasonsList.includes(seasonNum)) seasonsList.push(seasonNum);
              
              if (season.episodes && Array.isArray(season.episodes)) {
                season.episodes.forEach(ep => {
                  seriesEpisodes.push({
                    id: ep.id || `${movieId}_s${seasonNum}_e${ep.number}`,
                    season: seasonNum,
                    number: ep.number || '?',
                    title: ep.title || `Episode ${ep.number || '?'}`,
                    videoUrl: ep.videoUrl || '',
                    source: 'cullo'
                  });
                });
              }
            });
            
            currentSeriesTitle = culloData.title || 'Series';
            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0) currentSeason = seasonsList[0];
            return true;
          }
          
          // Also check if it's a series in the series collection
          const culloSeriesDoc = await getDoc(doc(db2, 'series', movieId));
          const culloSeriesData = culloSeriesDoc.data();
          
          if (culloSeriesData && culloSeriesData.seasons && Array.isArray(culloSeriesData.seasons)) {
            console.log('✓ Series found in Cullo series collection');
            
            culloSeriesData.seasons.forEach((season, idx) => {
              const seasonNum = season.number || idx + 1;
              if (!seasonsList.includes(seasonNum)) seasonsList.push(seasonNum);
              
              if (season.episodes && Array.isArray(season.episodes)) {
                season.episodes.forEach(ep => {
                  seriesEpisodes.push({
                    id: ep.id || `${movieId}_s${seasonNum}_e${ep.number}`,
                    season: seasonNum,
                    number: ep.number || '?',
                    title: ep.title || `Episode ${ep.number || '?'}`,
                    videoUrl: ep.videoUrl || '',
                    source: 'cullo'
                  });
                });
              }
            });
            
            currentSeriesTitle = culloSeriesData.title || 'Series';
            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0) currentSeason = seasonsList[0];
            return true;
          }
        }
        
        // THIRD: If source is not specified, also check Cullo
        if (source !== 'cullo') {
          const culloDoc = await getDoc(doc(db2, 'movies', movieId));
          const culloData = culloDoc.data();
          
          if (culloData && culloData.seasons && Array.isArray(culloData.seasons) && culloData.seasons.length > 0) {
            console.log('✓ Series found in Cullo (auto-detected)');
            
            culloData.seasons.forEach((season, idx) => {
              const seasonNum = season.number || idx + 1;
              if (!seasonsList.includes(seasonNum)) seasonsList.push(seasonNum);
              
              if (season.episodes && Array.isArray(season.episodes)) {
                season.episodes.forEach(ep => {
                  seriesEpisodes.push({
                    id: ep.id || `${movieId}_s${seasonNum}_e${ep.number}`,
                    season: seasonNum,
                    number: ep.number || '?',
                    title: ep.title || `Episode ${ep.number || '?'}`,
                    videoUrl: ep.videoUrl || '',
                    source: 'cullo'
                  });
                });
              }
            });
            
            currentSeriesTitle = culloData.title || 'Series';
            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0) currentSeason = seasonsList[0];
            return true;
          }
        }
        
        console.log('No series data found');
        return false;
        
      } catch (error) {
        console.error('Error loading series:', error);
        return false;
      }
    }

    // Render episodes in sidebar
    function renderEpisodes() {
      const seasonEpisodes = seriesEpisodes.filter(ep => ep.season === currentSeason);
      const seasonTabsDiv = document.getElementById('season-tabs');
      const episodesListDiv = document.getElementById('episodes-list');
      
      document.getElementById('series-title').textContent = currentSeriesTitle || 'Episodes';
      
      if (seasonsList.length > 0) {
        seasonTabsDiv.innerHTML = seasonsList.map(s => 
          `<button class="season-tab ${s === currentSeason ? 'active' : ''}" data-season="${s}">Season ${s}</button>`
        ).join('');
      } else {
        seasonTabsDiv.innerHTML = '';
      }
      
      if (seasonEpisodes.length === 0) {
        episodesListDiv.innerHTML = '<div style="text-align:center;padding:2rem;color:#666;">No episodes available.</div>';
      } else {
        episodesListDiv.innerHTML = seasonEpisodes.map(ep => {
          const isActive = currentEpisodePlaying && currentEpisodePlaying.id === ep.id;
          return `<div class="episode-item ${isActive ? 'active' : ''}" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
            <div class="episode-number">${isActive ? '<div class="playing-indicator"><span></span><span></span><span></span></div>' : 'Ep ' + ep.number}</div>
            <div class="episode-info">
              <div class="episode-title">${escapeHtml(ep.title)}</div>
            </div>
          </div>`;
        }).join('');
      }
      
      // Add season tab listeners
      document.querySelectorAll('.season-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentSeason = parseInt(tab.dataset.season);
          renderEpisodes();
        });
      });
      
      // Add episode item listeners
      document.querySelectorAll('.episode-item').forEach(item => {
        item.addEventListener('click', async () => {
          const ep = JSON.parse(item.dataset.episode);
          if (!ep.videoUrl || ep.videoUrl.trim() === '') {
            showToast('Coming soon!');
            return;
          }
          currentEpisodePlaying = ep;
          renderEpisodes();
          showToast(`Loading: ${ep.title}`);
          await loadAndPlayVideo(ep.videoUrl);
          
          // Update URL without reload
          const newUrl = `${window.location.pathname}?movieId=${ep.id}&source=${ep.source}`;
          window.history.pushState({}, '', newUrl);
        });
      });
    }

    // Load and play video
    async function loadAndPlayVideo(streamingLink) {
      const loadingOverlay = document.getElementById('loading-overlay');
      if (loadingOverlay) loadingOverlay.style.display = 'flex';
      
      const decodedLink = decodeURIComponent(streamingLink);
      const videoType = detectVideoType(decodedLink);
      
      if (videoType === 'googledrive') {
        const fileId = extractGoogleDriveId(decodedLink);
        if (fileId) await initGoogleDrivePlayer(fileId, loadingOverlay);
      } else if (videoType === 'rumble') {
        const videoId = extractRumbleId(decodedLink);
        if (videoId) await initRumblePlayer(videoId, loadingOverlay);
      } else if (videoType === 'archive') {
        await initArchivePlayer(decodedLink, loadingOverlay);
      } else if (videoType === 'direct') {
        await initDirectVideoPlayer(decodedLink, loadingOverlay);
      } else {
        const container = document.getElementById('video-container');
        container.innerHTML = `<iframe src="${decodedLink}" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 5000);
      }
    }

    // Load movie data from Firestore
    async function loadMovieData(movieId, source) {
      try {
        if (source === 'cullo') {
          const docSnap = await getDoc(doc(db2, 'movies', movieId));
          if (docSnap.exists()) {
            const data = docSnap.data();
            return {
              title: data.title,
              googleDriveLink: data.videoUrl || data.googleDriveLink,
              streamingLink: data.videoUrl || data.googleDriveLink,
              videoUrl: data.videoUrl
            };
          }
        } else {
          const docSnap = await getDoc(doc(db1, 'movies', movieId));
          if (docSnap.exists()) {
            const data = docSnap.data();
            return {
              title: data.title,
              googleDriveLink: data.googleDriveLink || data.videoUrl,
              streamingLink: data.googleDriveLink || data.videoUrl,
              videoUrl: data.videoUrl,
              seriesId: data.seriesId
            };
          }
        }
        return null;
      } catch (error) {
        console.error('Error loading movie:', error);
        return null;
      }
    }

    // Main player initialization
    const initPlayer = async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('movieId');
        let streamingLink = urlParams.get('streamingLink');
        currentSource = urlParams.get('source') || 'kinaflix';
        currentMovieId = movieId;
        
        if (!movieId && !streamingLink) {
          throw new Error("Invalid movie ID or streaming link");
        }
        
        // Set up back button with correct query parameters
        const backButton = document.getElementById('back-button');
        if (backButton && movieId) {
          backButton.href = `see.html?id=${movieId}&source=${currentSource}`;
        } else if (backButton) {
          backButton.href = 'index.html';
        }
        
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'flex';
        
        const seriesSidebar = document.getElementById('series-sidebar');
        
        // Check if this is a series (check both databases)
        const isSeries = await loadSeriesData(movieId, currentSource);
        
        if (isSeries && seriesEpisodes.length > 0) {
          console.log('✓ Series detected, showing sidebar with', seriesEpisodes.length, 'episodes');
          // Show sidebar for series
          seriesSidebar.classList.add('visible');
          renderEpisodes();
          
          // Find current episode playing (the one matching the movieId)
          const currentEp = seriesEpisodes.find(ep => ep.id === movieId);
          if (currentEp) {
            currentEpisodePlaying = currentEp;
            renderEpisodes();
            if (currentEp.videoUrl) {
              await loadAndPlayVideo(currentEp.videoUrl);
            } else if (streamingLink) {
              await loadAndPlayVideo(streamingLink);
            }
          } else if (streamingLink) {
            await loadAndPlayVideo(streamingLink);
          } else {
            // Play first episode
            const firstSeason = seasonsList[0];
            const firstEp = seriesEpisodes.find(ep => ep.season === firstSeason);
            if (firstEp && firstEp.videoUrl) {
              currentEpisodePlaying = firstEp;
              renderEpisodes();
              await loadAndPlayVideo(firstEp.videoUrl);
            } else {
              throw new Error("No video available for this series");
            }
          }
        } else {
          console.log('✓ Regular movie detected, hiding sidebar');
          // Hide sidebar for regular movies
          seriesSidebar.classList.remove('visible');
          
          // Regular movie
          if (!streamingLink && movieId) {
            const movieData = await loadMovieData(movieId, currentSource);
            streamingLink = movieData?.googleDriveLink || movieData?.streamingLink || movieData?.videoUrl;
          }
          
          if (!streamingLink) throw new Error("No streaming link available");
          await loadAndPlayVideo(streamingLink);
        }
        
        // Set page title
        if (movieId) {
          try {
            const movieData = await loadMovieData(movieId, currentSource);
            if (movieData && movieData.title) document.title = `${movieData.title} | KINAFLIX`;
          } catch(e) {}
        }
        
      } catch (error) {
        console.error('Error:', error);
        const container = document.getElementById('video-container');
        container.innerHTML = `<div class="error-container"><h1><i class="fas fa-exclamation-triangle"></i> Error</h1><p>${error.message}</p><a href="index.html"><i class="fas fa-home"></i> Go Back Home</a></div>`;
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) loadingOverlay.style.display = 'none';
      }
    };
    
    if (document.readyState === 'complete') {
      initPlayer();
    } else {
      document.addEventListener('DOMContentLoaded', initPlayer);
    }
  </script>
  <script type="module" src="/js/appcheck.js"></script>
</body>
