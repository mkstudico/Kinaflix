  <style>
    :root {
      --primary: #e50914;
      --ad-primary: #4285f4;
      --dark: #000000;
      --light: #f5f5f5;
      --gray-text: #888;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dark);
      color: var(--light);
      height: 100vh;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background-color: var(--primary);
      color: white;
      border: none;
      transition: all 0.3s ease;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .video-container iframe,
    .video-container video,
    .video-container div[id^="rumble_"] {
      width: 100%;
      height: 100%;
      border: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .ad-notification {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      height: 50px;
      background: rgba(0, 0, 0, 0.8);
      border-left: 3px solid var(--ad-primary);
      display: flex;
      align-items: center;
      padding: 0 10px;
      z-index: 200;
      animation: slideIn 0.3s ease-out;
      overflow: hidden;
      cursor: pointer;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
      }

      to {
        transform: translateX(0);
      }
    }

    .ad-notification img {
      height: 40px;
      width: 40px;
      object-fit: cover;
      margin-right: 10px;
      border-radius: 4px;
    }

    .ad-notification-content {
      flex: 1;

      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ad-notification-title {
      font-size: 12px;
      font-weight: bold;
      color: white;
      margin-bottom: 2px;
    }

    .ad-notification-description {
      font-size: 10px;
      color: var(--gray-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

    .ad-notification-close {
      background: none;

    /* Social bar container */

      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 60;
      pointer-events: none;
    }

    .social-bar-container > * {
      pointer-events: auto;
    }

<body>
  <a href="#" class="button back-button is-rounded" id="back-button">

  </a>

  <!-- Ad Container for Google Ads -->

  <!-- Social Bar (Ad Unit 4) -->
  <div class="social-bar-container" id="social-bar">
    <script src="https://pl29119196.profitablecpmratenetwork.com/b8/29/4d/b8294df1d7e2c4bdf1c663d5c0ec4f4b.js"></script>
  </div>

  <div class="video-container" id="video-container">

  <script type="module">
    // Configuration
    const RUMBLE_CHANNEL_ID = 'u4m9tqz';

    // SmartLink replacement for Play/Download buttons
    const SMARTLINK_URL = 'https://www.profitablecpmratenetwork.com/p4f0vdtub?key=48b231bfea0e962b42040882e5dd904d';

    // Function to apply SmartLink to buttons
    function applySmartLinkToButtons() {
      // Wait for DOM to be ready
      setTimeout(() => {
        // Find all potential play/download buttons
        const buttons = document.querySelectorAll('a, button, [role="button"]');
        buttons.forEach(button => {
          const text = button.textContent?.toLowerCase() || '';
          const href = button.getAttribute('href') || '';
          
          // Check if it's a play or download button
          if (text.includes('play') || text.includes('download') || 
              text.includes('watch') || text.includes('stream') ||
              href.includes('play') || href.includes('download')) {
            
            // Store original functionality if needed
            if (!button.hasAttribute('data-smartlink-applied')) {
              button.setAttribute('data-smartlink-applied', 'true');
              
              // Override click behavior
              button.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                // Open SmartLink in new tab
                window.open(SMARTLINK_URL, '_blank');
                
                // Optionally trigger original action after delay
                setTimeout(() => {
                  if (button.tagName === 'A' && button.href && !button.href.includes('profitablecpmratenetwork')) {
                    window.location.href = button.href;
                  }
                }, 100);
              }, true);
            }
          }
        });
      }, 2000);
    }

    // Function to detect video type from URL
    function detectVideoType(url) {
      if (!url) return 'unknown';
      const urlLower = url.toLowerCase();
      if (urlLower.includes('drive.google.com') || urlLower.includes('gdrive')) {
        return 'googledrive';
      }
      if (urlLower.includes('rumble.com')) {
        return 'rumble';
      }
      if (urlLower.includes('archive.org') || urlLower.includes('ia800') || urlLower.includes('ia600') || urlLower.match(/\.archive\.org/)) {
        return 'archive';
      }
      if (urlLower.match(/\.(mp4|webm|mkv|mov|avi)$/i)) {
        return 'direct';
      }
      return 'unknown';
    }

    // Function to extract Google Drive file ID
    function extractGoogleDriveId(url) {
      const patterns = [
        /\/d\/([a-zA-Z0-9_-]+)/,
        /id=([a-zA-Z0-9_-]+)/,
        /file\/d\/([a-zA-Z0-9_-]+)/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }
      return null;
    }

    // Function to extract Rumble video ID
    function extractRumbleId(url) {
      const patterns = [
        /rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/,
        /v([a-zA-Z0-9]+)/,
        /video\/([a-zA-Z0-9_-]+)/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }
      return null;
    }

    // Function to extract Internet Archive identifier from various URL formats
    function extractArchiveIdentifier(url) {
      // For direct file URLs like: https://ia600100.us.archive.org/35/items/genius-c-junior-giti/Genius_C_Junior_Giti.mp4
      const directMatch = url.match(/\/items\/([^\/]+)\//);
      if (directMatch && directMatch[1]) return directMatch[1];

      // For details page URLs: https://archive.org/details/identifier
      const detailsMatch = url.match(/\/details\/([^\/?#]+)/);
      if (detailsMatch && detailsMatch[1]) return detailsMatch[1];

      // For download URLs
      const downloadMatch = url.match(/\/download\/([^\/?#]+)/);
      if (downloadMatch && downloadMatch[1]) return downloadMatch[1];

      return null;
    }

    // Function to get direct video URL from Internet Archive (handles the URL directly)
    function getArchiveDirectUrl(url) {
      // If it's already a direct MP4 link, use it as is
      if (url.match(/\.(mp4|webm|mkv|mov|avi)$/i)) {
        return url;
      }

      const identifier = extractArchiveIdentifier(url);
      if (identifier) {
        return `https://archive.org/download/${identifier}/${identifier}.mp4`;
      }
      return null;
    }

    // FIXED: Enhanced Internet Archive Player - handles both direct MP4 and details pages
    function initArchivePlayer(videoUrl, loadingOverlay) {
      return new Promise((resolve) => {
        const container = document.getElementById('video-container');
        const directUrl = getArchiveDirectUrl(videoUrl);

        if (directUrl) {
          console.log('✓ Movie loaded: Playing Internet Archive video');
          container.innerHTML = `
            <video 
              controls 
              autoplay 
              style="width:100%;height:100%;background:#000;">
              <source src="${directUrl}" type="video/mp4">
              <p>Your browser doesn't support HTML5 video. <a href="${directUrl}" target="_blank">Download the video</a></p>
            </video>
          `;

          const video = container.querySelector('video');
          if (video && loadingOverlay) {
            video.addEventListener('canplay', () => {
              loadingOverlay.style.display = 'none';
              resolve();
            });
            video.addEventListener('loadeddata', () => {
              loadingOverlay.style.display = 'none';
              resolve();
            });
            video.addEventListener('error', () => {
              console.log('Error loading direct video, trying embed fallback');
              // Fallback to embed player
              const identifier = extractArchiveIdentifier(videoUrl);
              if (identifier) {
                container.innerHTML = `
                  <iframe 
                    src="https://archive.org/embed/${identifier}" 
                    frameborder="0" 
                    allowfullscreen
                    style="width:100%;height:100%;">
                  </iframe>
                `;
              }
              loadingOverlay.style.display = 'none';
              resolve();
            });
            // Timeout fallback
            setTimeout(() => {
              if (loadingOverlay.style.display !== 'none') {
                loadingOverlay.style.display = 'none';
                resolve();
              }
            }, 8000);
          }
        } else {
          // Fallback to embed player
          const identifier = extractArchiveIdentifier(videoUrl);
          if (identifier) {
            console.log('✓ Movie loaded: Using Archive.org embed player');
            container.innerHTML = `
              <iframe 
                src="https://archive.org/embed/${identifier}" 
                frameborder="0" 
                allowfullscreen
                style="width:100%;height:100%;">
              </iframe>
            `;
          } else {
            container.innerHTML = `
              <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;color:#e50914;">
                <i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:20px;"></i>
                <p>Unable to play this Internet Archive video.</p>
                <a href="${videoUrl}" target="_blank" style="color:#e50914;margin-top:10px;">Open directly</a>
              </div>
            `;
          }
          setTimeout(() => {
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            resolve();
          }, 3000);
        }
      });
    }

    // Function to initialize Rumble player
    function initRumblePlayer(videoId, loadingOverlay) {
      return new Promise((resolve) => {
        const divId = `rumble_${videoId}`;
        const container = document.getElementById('video-container');
        container.innerHTML = `<div id="${divId}" style="width:100%;height:100%;"></div>`;

        // Load Rumble embed script
        !function (r, u, m, b, l, e) {
          r._Rumble = b;
          r[b] || (r[b] = function () {
            (r[b]._ = r[b]._ || []).push(arguments);
            if (r[b]._.length == 1) {
              l = u.createElement(m),
                e = u.getElementsByTagName(m)[0],
                l.async = 1,
                l.src = "https://rumble.com/embedJS/" + RUMBLE_CHANNEL_ID +
                (arguments[1].video ? '.' + arguments[1].video : '') +
                "/?url=" + encodeURIComponent(location.href) +
                "&args=" + encodeURIComponent(JSON.stringify([].slice.apply(arguments))),
                e.parentNode.insertBefore(l, e)
            }
          })
        }(window, document, "script", "Rumble");

        // Initialize Rumble player
        Rumble("play", { video: videoId, div: divId });

        setTimeout(() => {
          if (loadingOverlay) {
            loadingOverlay.style.display = 'none';
          }
          resolve();
        }, 5000);
      });
    }

    // Function to initialize Google Drive player
    function initGoogleDrivePlayer(fileId, loadingOverlay) {
      return new Promise((resolve) => {
        const container = document.getElementById('video-container');
        container.innerHTML = `
          <iframe 
            src="https://drive.google.com/file/d/${fileId}/preview" 
            frameborder="0" 
            allow="autoplay; fullscreen; encrypted-media" 
            allowfullscreen>
          </iframe>
        `;

        const iframe = container.querySelector('iframe');
        if (iframe && loadingOverlay) {
          iframe.onload = () => {
            loadingOverlay.style.display = 'none';
            resolve();
          };
          setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
              loadingOverlay.style.display = 'none';
              resolve();
            }
          }, 8000);
        } else {
          setTimeout(() => {
            loadingOverlay.style.display = 'none';
            resolve();
          }, 3000);
        }
      });
    }

    // Function to initialize direct video file
    function initDirectVideoPlayer(videoUrl, loadingOverlay) {
      return new Promise((resolve) => {
        const container = document.getElementById('video-container');
        console.log('✓ Movie loaded: Playing direct video');
        container.innerHTML = `
          <video 
            controls 
            autoplay 
            style="width:100%;height:100%;background:#000;">
            <source src="${videoUrl}" type="video/mp4">
            <p>Your browser doesn't support HTML5 video.</p>
          </video>
        `;

        const video = container.querySelector('video');
        if (video && loadingOverlay) {
          video.addEventListener('canplay', () => {
            loadingOverlay.style.display = 'none';
            resolve();
          });
          video.addEventListener('loadeddata', () => {
            loadingOverlay.style.display = 'none';
            resolve();
          });
          video.addEventListener('error', () => {
            loadingOverlay.style.display = 'none';
            resolve();
          });
          setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
              loadingOverlay.style.display = 'none';
              resolve();
            }
          }, 8000);
        } else {
          setTimeout(() => {
            loadingOverlay.style.display = 'none';
            resolve();
          }, 3000);
        }
      });
    }

    // Core player functionality
    const initPlayer = async () => {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('movieId');
        let streamingLink = urlParams.get('streamingLink');

        if (!movieId && !streamingLink) {
          throw new Error("Invalid movie ID or streaming link");
        }

        // Update back button href
        const backButton = document.getElementById('back-button');
        if (backButton && movieId) {
          backButton.href = `see.html?id=${movieId}`;
        } else if (backButton) {
          backButton.href = 'index.html';
        }

        // Show loading immediately
        const loadingOverlay = document.getElementById('loading-overlay');
        if (loadingOverlay) {
          loadingOverlay.style.display = 'flex';
        }

        // If streamingLink is not provided directly, load from Firestore
        if (!streamingLink && movieId) {
          const movieData = await loadMovieData(movieId);
          streamingLink = movieData.googleDriveLink || movieData.streamingLink || movieData.videoUrl;
        }

        if (!streamingLink) {
          throw new Error("No streaming link available for this movie");
        }

        // Decode the streaming link
        const decodedLink = decodeURIComponent(streamingLink);
        const videoType = detectVideoType(decodedLink);

        // Initialize video player based on link type
        if (videoType === 'googledrive') {
          const fileId = extractGoogleDriveId(decodedLink);
          if (!fileId) throw new Error("Invalid Google Drive link format");
          await initGoogleDrivePlayer(fileId, loadingOverlay);
        }
        else if (videoType === 'rumble') {
          const videoId = extractRumbleId(decodedLink);
          if (!videoId) throw new Error("Invalid Rumble link format");
          await initRumblePlayer(videoId, loadingOverlay);
        }
        else if (videoType === 'archive') {
          await initArchivePlayer(decodedLink, loadingOverlay);
        }
        else if (videoType === 'direct') {
          await initDirectVideoPlayer(decodedLink, loadingOverlay);
        }
        else {
          // Try to handle as generic iframe
          const container = document.getElementById('video-container');
          container.innerHTML = `
            <iframe 
              src="${decodedLink}" 
              frameborder="0" 
              allow="autoplay; fullscreen; encrypted-media" 
              allowfullscreen>
            </iframe>
          `;
          setTimeout(() => {
            if (loadingOverlay) loadingOverlay.style.display = 'none';
          }, 5000);
        }

        // Set page title if movieId exists
        if (movieId) {
          try {
            const movieData = await loadMovieData(movieId);
            document.title = `${movieData.title} | KINAFLIX`;
          } catch (e) {
            document.title = `Watching | KINAFLIX`;
          }
        } else {
          document.title = `Watching | KINAFLIX`;
        }

        // Apply SmartLink to buttons after player loads
        applySmartLinkToButtons();

      } catch (error) {
        showError(error.message);
      }
    };

    // Load movie data from Firestore (both databases)
    const loadMovieData = async (movieId) => {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js');
      const { getFirestore, doc, getDoc } = await import('https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js');

      // Primary Firebase config (Kinaflix)
      const firebaseConfig1 = {
        apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k",
        authDomain: "kinaflix.firebaseapp.com",
        projectId: "kinaflix",
        storageBucket: "kinaflix.appspot.com",
        messagingSenderId: "318239806217",
        appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8"
      };

      // Secondary Firebase config (CULLO Movies)
      const firebaseConfig2 = {
        apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk",
        authDomain: "cullo-movies-6813f.firebaseapp.com",
        projectId: "cullo-movies-6813f",
        messagingSenderId: "12310118231",
        appId: "1:12310118231:web:34682f354027fd19758812"
      };

      // Try to load from Kinaflix first
      const app1 = initializeApp(firebaseConfig1, "kinaflix");
      const db1 = getFirestore(app1);
      let docSnap = await getDoc(doc(db1, 'movies', movieId));

      if (docSnap.exists()) {
        return docSnap.data();
      }

      // If not found, try CULLO Movies
      try {
        const app2 = initializeApp(firebaseConfig2, "cullo");
        const db2 = getFirestore(app2);

        // Try movies collection first
        docSnap = await getDoc(doc(db2, 'movies', movieId));
        if (docSnap.exists()) {
          const data = docSnap.data();
          return {
            title: data.title,
            googleDriveLink: data.videoUrl || data.googleDriveLink,
            streamingLink: data.videoUrl || data.streamingLink,
            videoUrl: data.videoUrl
          };
        }

        // Try series collection
        docSnap = await getDoc(doc(db2, 'series', movieId));
        if (docSnap.exists()) {
          const data = docSnap.data();
          const firstSeason = data.seasons?.[0];
          const firstEpisode = firstSeason?.episodes?.[0];
          return {
            title: data.title,
            googleDriveLink: firstEpisode?.videoUrl || data.videoUrl,
            streamingLink: firstEpisode?.videoUrl || data.videoUrl,
            videoUrl: firstEpisode?.videoUrl || data.videoUrl
          };
        }
      } catch (e) {
        console.log('CULLO database not accessible:', e);
      }

      throw new Error('Movie not found in any database');
    };

    const showError = (message) => {
      const container = document.getElementById('video-container');
      container.innerHTML = `
        <div style="position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;color:#e50914;text-align:center;padding:2rem;z-index:100;">
          <h1 style="font-size:1.5rem;margin-bottom:1rem;">⚠️ Error</h1>
          <p style="margin-bottom:1.5rem;">${message}</p>
          <a href="index.html" style="background:#e50914;color:white;padding:0.5rem 1rem;border-radius:4px;text-decoration:none;">
            <span style="margin-right:0.5rem;"><i class="fas fa-arrow-left"></i></span>
            <span>Go Back</span>
          </a>
        </div>
      `;
      const loadingOverlay = document.getElementById('loading-overlay');
      if (loadingOverlay) {
        loadingOverlay.style.display = 'none';
      }
      document.title = `Error | KINAFLIX`;

      if (!document.querySelector('.fa-arrow-left')) {
        const faScript = document.createElement('script');
        faScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js';
        document.head.appendChild(faScript);
      }
    };

    if (document.readyState === 'complete') {
      initPlayer();
    } else {
      document.addEventListener('DOMContentLoaded', initPlayer);
    }
  </script>

  <script src="js/subscription-checker.js"></script>
