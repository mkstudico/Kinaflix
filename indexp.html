          <div class="poster-img-fallback" style="${poster ? 'display:none' : 'display:flex'}">${st.substring(0, 20)}</div>
          <span class="poster-badge ${tc}">${tl}</span>${su ? `<span class="poster-umu">${su}</span>` : ''}
          <div class="play-circle"><div class="play-triangle"></div></div>
        </div><div class="poster-name">${st}</div>
      </div>`;
    }

    // ===== ATTACH CLICK EVENTS =====
    function attachCardEvents(container) {
      if (!container) return;
      container.querySelectorAll('.poster-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id, s = card.dataset.source;
          if (!id) { showToast('Missing movie ID', 'error'); return; }
          window.location.href = `see.html?id=${id}&source=${s}`;
        });
      });
    }

    // ===== BUILD SECTION (with event attachment) =====
    function buildSection(title, icon, movies, maxRows, colsClass) {
      if (!movies || movies.length === 0) return '';
      const cols = colsClass === 'cols3' ? 3 : 2, maxItems = maxRows * cols;
      const deduped = dedupeParts(movies), sorted = sortByYearDesc(deduped), display = sorted.slice(0, maxItems);
      return `<section class="content-section">
        <div class="section-header"><h2 class="section-title-text"><span class="s-icon">${icon}</span> ${title}</h2></div>
        <div class="poster-grid ${colsClass}">${display.map(m => renderCard(m)).join('')}</div>
      </section>`;
    }

    // ===== BUILD HOME PAGE (FIXED: attaches events after HTML injection) =====
    function buildHomePage() {
      startLoading();
      const onlyMovies = validMovies.filter(m => m.type === 'movie');
      const seriesList = validMovies.filter(m => m.type === 'series');
      const trending = [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0));
      const latestRaw = [...onlyMovies].sort((a, b) => b.timestamp - a.timestamp);
      const latest = sortByYearDesc(latestRaw);
      
      let html = buildHero(validMovies);
      html += buildTrailers(latest);
      html += buildSection('Latest', '🆕', latest, 2, 'cols3');
      html += buildSection('Trending Now', '🔥', trending, 2, 'cols3');
      html += buildSection('Recent', '🕐', latest, 3, 'cols3');
      html += buildSection('Series', '📺', seriesList, 3, 'cols3');
      GENRES.forEach(genre => { const gm = validMovies.filter(m => m.genres && m.genres.includes(genre)); if (gm.length > 0) html += buildSection(`${genre}`, '🏷', gm, 3, 'cols3'); });
      html += buildSection('All Movies', '📋', validMovies, 999, 'cols3');
      
      document.getElementById('mainContent').innerHTML = html;
      
      // FIXED: Attach click events to ALL poster cards after injection
      document.querySelectorAll('.poster-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id, s = card.dataset.source;
          if (!id) { showToast('Missing movie ID', 'error'); return; }
          window.location.href = `see.html?id=${id}&source=${s}`;
        });
      });
      
      startHeroSlideshow(); setupHeroEvents(); finishLoading();
    }

    // ===== BUILD NON-HOME PAGE =====
    function buildNonHome(title, movies) {
      startLoading();
      const sorted = sortByYearDesc(movies), deduped = dedupeParts(sorted), shuffled = shuffle(deduped);
      document.getElementById('mainContent').innerHTML = `<h1 style="text-align:center;padding:20px 10px 8px;font-size:1.3rem;font-weight:800">${title}</h1><section class="content-section"><div class="poster-grid cols2">${shuffled.map(m => renderCard(m)).join('')}</div></section>`;
      
      // FIXED: Attach click events to ALL poster cards after injection
      document.querySelectorAll('.poster-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id, s = card.dataset.source;
          if (!id) { showToast('Missing movie ID', 'error'); return; }
          window.location.href = `see.html?id=${id}&source=${s}`;
        });
      });
      
      finishLoading();
    }

    // ===== TRAILERS =====
    function buildTrailers(latestMovies) {
      const withTrailers = latestMovies.filter(m => m.youtubeTrailerUrl);
      if (withTrailers.length === 0) return '';
      const deduped = dedupeParts(withTrailers);
      const sorted = sortByYearDesc(deduped).slice(0, 10);
      let html = '<section class="content-section"><div class="trailer-scroll">';
      for (const m of sorted) {
        let vid = ''; const u = m.youtubeTrailerUrl;
        if (u.includes('youtube.com/watch?v=')) vid = u.split('v=')[1]?.split('&')[0];
        else if (u.includes('youtu.be/')) vid = u.split('youtu.be/')[1]?.split('?')[0];
        else if (u.includes('youtube.com/embed/')) vid = u.split('embed/')[1]?.split('?')[0];
        if (!vid) continue;
        html += `<div class="trailer-card"><div class="trailer-video-wrap"><iframe src="https://www.youtube.com/embed/${vid}?rel=0&modestbranding=1" allowfullscreen loading="lazy" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe></div><div class="trailer-label">${escHtml(m.title)} <span>· ${m.year || '—'}</span></div></div>`;
      }
      return html + '</div></section>';
    }

    function buildHero(movies) {
      const candidates = movies.filter(m => m.poster && m.type === 'movie');
      const dedupedFeatured = dedupeForFeatured(candidates);
      heroMovies = sortByYearDesc(dedupedFeatured).slice(0, 8);
      if (heroMovies.length === 0) return '';
      let slides = '', dots = '';
      heroMovies.forEach((m, i) => {
        const st = escHtml(m.title), sd = escHtml((m.description || 'Watch on KINAFLIX.').substring(0, 120));
        const sg = (m.genres && m.genres.length > 0) ? escHtml(m.genres[0]) : '—', rt = m.rating ? parseFloat(m.rating).toFixed(1) : '—';
        slides += `<div class="hero-slide${i === 0 ? ' active' : ''}" data-index="${i}"><div class="hero-bg" style="${m.poster ? `background-image:url('${m.poster}')` : ''}"></div><div class="hero-gradient"></div><div class="hero-gradient-side"></div><div class="hero-info"><div class="hero-badge">▶ Featured</div><h1 class="hero-title">${st}</h1><div class="hero-meta-row"><span><span class="star-icon">★</span> ${rt}</span><span>📅 ${m.year || '—'}</span><span>🏷 ${sg}</span></div><p class="hero-desc">${sd}...</p><div class="hero-btns"><button class="btn-hero btn-play" data-id="${m.id}" data-source="${m.source}">▶ Watch</button><button class="btn-hero btn-trailer" data-trailer="${m.youtubeTrailerUrl || ''}">🎬 Trailer</button></div></div></div>`;
        dots += `<button class="hero-dot${i === 0 ? ' active' : ''}" data-index="${i}"></button>`;
      });
      return `<div class="hero-container" id="heroContainer">${slides}<div class="hero-dots">${dots}</div></div>`;
    }

    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval); if (heroMovies.length <= 1) return;
      let cur = 0; heroInterval = setInterval(() => { cur = (cur + 1) % heroMovies.length; switchSlide(cur); }, 5000);
    }
    function switchSlide(idx) {
      document.querySelectorAll('.hero-slide').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.hero-dot').forEach(d => d.classList.remove('active'));
      const sl = document.querySelector(`.hero-slide[data-index="${idx}"]`), dt = document.querySelector(`.hero-dot[data-index="${idx}"]`);
      if (sl) sl.classList.add('active'); if (dt) dt.classList.add('active');
    }
    function setupHeroEvents() {
      const c = document.getElementById('heroContainer'); if (!c) return;
      c.querySelectorAll('.hero-dot').forEach(dot => { dot.addEventListener('click', e => { e.stopPropagation(); switchSlide(parseInt(dot.dataset.index)); resetHeroTimer(); }); });
      c.querySelectorAll('.btn-play').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const id = btn.dataset.id, s = btn.dataset.source; if (!id) return; window.location.href = `see.html?id=${id}&source=${s}`; }); });
      c.querySelectorAll('.btn-trailer').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const tr = btn.dataset.trailer; if (tr && tr.length > 5) openTrailerModal(tr); }); });
    }
    function resetHeroTimer() { if (heroInterval) { clearInterval(heroInterval); } heroInterval = setInterval(() => { const cur = [...document.querySelectorAll('.hero-dot')].findIndex(d => d.classList.contains('active')); switchSlide((cur + 1) % heroMovies.length); }, 5000); }
    function openTrailerModal(url) {
      let vid = '';
      if (url.includes('youtube.com/watch?v=')) vid = url.split('v=')[1]?.split('&')[0];
      else if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split('?')[0];
      else if (url.includes('youtube.com/embed/')) vid = url.split('embed/')[1]?.split('?')[0];
      if (!vid) return;
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;cursor:pointer;';
      modal.innerHTML = `<div style="position:relative;width:95%;max-width:600px;aspect-ratio:16/9;cursor:default;" onclick="event.stopPropagation()"><button style="position:absolute;top:-30px;right:0;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;" onclick="this.closest('[style*=fixed]').remove()">✕</button><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="border-radius:8px;"></iframe></div>`;
      modal.addEventListener('click', () => modal.remove()); document.body.appendChild(modal);
    }

    // ===== NAVIGATION =====
    function navigateTo(page) {
      if (heroInterval) { clearInterval(heroInterval); heroInterval = null; }
      document.querySelectorAll('.bottom-nav-item').forEach(l => l.classList.remove('active'));
      try {
        switch (page) {
          case 'home': document.querySelector('.bottom-nav-item[data-page="home"]')?.classList.add('active'); buildHomePage(); break;
          case 'trending': document.querySelector('.bottom-nav-item[data-page="trending"]')?.classList.add('active'); buildNonHome('Trending Now', [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0))); break;
          case 'latest': document.querySelector('.bottom-nav-item[data-page="latest"]')?.classList.add('active'); buildNonHome('Latest', sortByYearDesc(validMovies.filter(m => m.type === 'movie').sort((a, b) => b.timestamp - a.timestamp))); break;
          case 'movies': document.querySelector('.bottom-nav-item[data-page="movies"]')?.classList.add('active'); buildNonHome('Movies', validMovies.filter(m => m.type === 'movie')); break;
          case 'series': document.querySelector('.bottom-nav-item[data-page="series"]')?.classList.add('active'); buildNonHome('Series', validMovies.filter(m => m.type === 'series')); break;
        }
      } catch (e) { console.error(e); showToast('Error loading page', 'error'); finishLoading(); }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== SEARCH =====
    function setupSearch() {
      const input = document.getElementById('searchInput'), clearBtn = document.getElementById('searchClear'), drop = document.getElementById('searchDrop');
      if (!input || !drop) return; let timeout;
      input.addEventListener('input', () => {
        const q = input.value.trim(); q.length > 0 ? clearBtn.classList.add('show') : clearBtn.classList.remove('show');
        if (!q) { drop.classList.remove('open'); return; }
        clearTimeout(timeout); timeout = setTimeout(() => {
          const query = q.toLowerCase();
          const results = dedupeParts(allForSearch.filter(m => (m.title && m.title.toLowerCase().includes(query)) || (m.genres && m.genres.some(g => g.toLowerCase().includes(query))) || (m.umusobanuzi && m.umusobanuzi.toLowerCase().includes(query)) || (m.year && String(m.year).includes(query)))).slice(0, 8);
          drop.innerHTML = results.length === 0 ? '<div class="search-empty">No results</div>' : results.map(m => `<div class="search-item" data-id="${m.id}" data-source="${m.source}">${m.poster ? `<img src="${m.poster}" class="search-thumb" onerror="this.style.display='none'">` : ''}<div class="search-info"><div class="search-title">${escHtml(m.title)}</div><div class="search-meta">${m.year || '—'} · ${m.type} · ★ ${m.rating ? parseFloat(m.rating).toFixed(1) : '—'}</div></div></div>`).join('');
          drop.classList.add('open');
          drop.querySelectorAll('.search-item').forEach(item => { item.addEventListener('click', () => { const id = item.dataset.id, s = item.dataset.source; drop.classList.remove('open'); input.value = ''; clearBtn.classList.remove('show'); window.location.href = `see.html?id=${id}&source=${s}`; }); });
        }, 250);
      });
      clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('show'); drop.classList.remove('open'); input.focus(); });
      document.addEventListener('click', e => { if (!document.getElementById('searchBox').contains(e.target)) drop.classList.remove('open'); });
      input.addEventListener('keydown', e => { if (e.key === 'Escape') { drop.classList.remove('open'); input.blur(); } });
    }

    function setupBottomNav() {
      document.querySelectorAll('.bottom-nav-item').forEach(item => { item.addEventListener('click', () => navigateTo(item.dataset.page)); });
      document.getElementById('logoHome').addEventListener('click', e => { e.preventDefault(); navigateTo('home'); });
    }

    async function init() {
      try {
        const cached = sessionStorage.getItem('kflix_mobile_v4'), cacheTime = sessionStorage.getItem('kflix_mobile_time_v4');
        if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 5 * 60 * 1000) { allMovies = JSON.parse(cached); }
        else { allMovies = await fetchAll(); try { sessionStorage.setItem('kflix_mobile_v4', JSON.stringify(allMovies)); sessionStorage.setItem('kflix_mobile_time_v4', Date.now().toString()); } catch (e) { } }
        validMovies = allMovies.filter(m => !hasErrors(m)); errorMovies = allMovies.filter(m => hasErrors(m));
        allForSearch = [...validMovies, ...errorMovies]; validMovies = sortByYearDesc(validMovies); errorMovies = sortByYearDesc(errorMovies);
        if (validMovies.length === 0 && errorMovies.length === 0) { document.getElementById('mainContent').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;padding:20px"><div style="font-size:3rem">🎬</div><h2 style="font-size:1rem">No Movies Found</h2><button onclick="location.reload()" style="margin-top:15px;background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:50px;cursor:pointer;font-weight:600;font-size:.8rem">Retry</button></div>'; return; }
        setupBottomNav(); setupSearch(); navigateTo('home');
      } catch (e) { console.error(e); showToast('Failed to load', 'error'); }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
