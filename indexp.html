  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

    const topBar = document.getElementById('topLoadBar');
    const startLoading = () => { topBar.classList.add('active'); topBar.classList.remove('done'); };
    const finishLoading = () => { topBar.classList.add('done'); setTimeout(() => topBar.classList.remove('active', 'done'), 400); };

    const toast = document.getElementById('toast');
    let toastTimer;
    const showToast = (msg, type = '') => { clearTimeout(toastTimer); toast.textContent = msg; toast.className = 'toast show ' + type; toastTimer = setTimeout(() => toast.classList.remove('show', 'error', 'success'), 3000); };

    const fb1 = { apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k", authDomain: "kinaflix.firebaseapp.com", projectId: "kinaflix", storageBucket: "kinaflix.appspot.com", messagingSenderId: "318239806217", appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8" };
    const fb2 = { apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk", authDomain: "cullo-movies-6813f.firebaseapp.com", projectId: "cullo-movies-6813f", messagingSenderId: "12310118231", appId: "1:12310118231:web:34682f354027fd19758812" };

    let db1, db2, db2ok = true;
    try { db1 = getFirestore(initializeApp(fb1)); } catch (e) { }
    try { db2 = getFirestore(initializeApp(fb2, "culloMovies")); } catch (e) { db2ok = false; }

    let allMovies = [], validMovies = [], errorMovies = [], allForSearch = [];
    let heroInterval = null, heroMovies = [];
    const GENRES = ['Action', 'Drama', 'Comedy', 'Horror', 'Thriller', 'Romance'];
    const umuNames = ['ROCKY', 'GITI', 'SANKARA', 'GAHEZA'];
    const rndUmu = () => umuNames[Math.floor(Math.random() * umuNames.length)];
    const CURRENT_YEAR = new Date().getFullYear();

    const shuffle = a => { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; };
    const normTitle = t => { if (!t) return ''; t = t.replace(/\s*[-–]\s*Part\s*[B-Z2-9]/gi, '').replace(/\s*Part\s*[B-Z2-9]/gi, ''); t = t.replace(/\s+[A-Z]$/, '').trim(); return t; };
    const titleBase = t => normTitle(t).toLowerCase().replace(/[^a-z0-9]/g, '');
    const escHtml = t => { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };
    const hasErrors = m => !m.year || m.year === 0 || !m.poster || m.poster.length < 8 || !m.title || m.title === 'Untitled';
    const sortByYearDesc = arr => [...arr].sort((a, b) => (b.year || 0) - (a.year || 0));
    const dedupeParts = movies => { const seen = new Map(), r = []; for (const m of movies) { const b = titleBase(m.title); if (!seen.has(b)) { seen.set(b, m); r.push(m); } } return r; };
    const dedupeForFeatured = movies => { const map = new Map(); for (const m of movies) { const base = titleBase(m.title); if (!map.has(base)) map.set(base, m); } return Array.from(map.values()); };

    // ===== FAST FETCH - Get Kinaflix first, then Cullo in background =====
    async function fetchAll() {
      const list = [];
      
      // FETCH KINAFLIX FIRST (most important)
      try {
        const s1 = await getDocs(query(collection(db1, 'movies'), orderBy('releaseYear', 'desc'), limit(50)));
        s1.docs.forEach(doc => {
          const d = doc.data();
          list.push({
            id: doc.id, source: 'kinaflix', title: d.title || 'Untitled',
            poster: d.coverImageUrl || '', genres: (Array.isArray(d.genres) ? d.genres : []).filter(g => GENRES.includes(g)),
            year: typeof d.releaseYear === 'number' ? d.releaseYear : 0,
            rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
            umusobanuzi: d.umusobanuzi || null,
            youtubeTrailerUrl: d.youtubeTrailerUrl || null,
            description: d.description || '',
            timestamp: d.dateAdded?.toDate?.() || new Date(),
            type: 'movie'
          });
        });
      } catch (e) { console.warn('Kinaflix fetch error:', e); }

      // FETCH CULLO IN BACKGROUND
      if (db2ok) {
        try {
          const s2 = await getDocs(query(collection(db2, 'movies'), limit(30)));
          s2.docs.forEach(doc => {
            const d = doc.data();
            let g = []; 
            if (Array.isArray(d.genre)) g = d.genre; 
            else if (typeof d.genre === 'string' && d.genre.trim()) g = [d.genre.trim()];
            g = g.filter(x => GENRES.includes(x));
            list.push({
              id: doc.id, source: 'cullo', title: d.title || 'Untitled',
              poster: d.posterUrl || d.thumbnailUrl || '',
              genres: g, year: d.year || d.releaseYear || 0,
              rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
              umusobanuzi: rndUmu(), youtubeTrailerUrl: null,
              description: d.description || '',
              timestamp: d.createdAt?.toDate?.() || new Date(),
              type: 'movie'
            });
          });
        } catch (e) { db2ok = false; }

        try {
          const s3 = await getDocs(query(collection(db2, 'series'), limit(10)));
          s3.docs.forEach(doc => {
            const d = doc.data();
            let g = [];
            if (Array.isArray(d.genre)) g = d.genre;
            else if (typeof d.genre === 'string' && d.genre.trim()) g = [d.genre.trim()];
            g = g.filter(x => GENRES.includes(x));
            list.push({
              id: doc.id, source: 'cullo', title: d.title || 'Untitled Series',
              poster: d.posterUrl || d.thumbnailUrl || '',
              genres: g, year: d.year || d.releaseYear || 0,
              rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
              umusobanuzi: rndUmu(), youtubeTrailerUrl: null,
              description: d.description || '',
              timestamp: d.createdAt?.toDate?.() || new Date(),
              type: 'series'
            });
          });
        } catch (e) { }
      }

      const seen = new Map(), u = [];
      for (const m of list) { if (!seen.has(m.id)) { seen.set(m.id, m); u.push(m); } }
      return u;
    }

    // ===== RENDER CARD (FAST - only essential data) =====
    function renderCard(m) {
      const poster = m.poster || '', st = escHtml(m.title);
      const tl = m.type === 'series' ? 'Series' : 'Movie', tc = m.type === 'series' ? 'series' : '';
      return `<div class="poster-card" data-id="${m.id}" data-source="${m.source}">
        <div class="poster-img-wrap">
          <img src="${poster || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22225%22><rect fill=%22%2314141e%22 width=%22150%22 height=%22225%22/><text fill=%22%23555%22 x=%2275%22 y=%22115%22 text-anchor=%22middle%22 font-size=%2210%22>No Image</text></svg>'}" 
               alt="${st}" class="poster-img" loading="lazy" 
               onload="this.classList.add('loaded')" 
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22150%22 height=%22225%22><rect fill=%22%2314141e%22 width=%22150%22 height=%22225%22/><text fill=%22%23555%22 x=%2275%22 y=%22115%22 text-anchor=%22middle%22 font-size=%2210%22>Error</text></svg>'">
          <span class="poster-badge ${tc}">${tl}</span>
        </div>
        <div class="poster-name">${st}</div>
      </div>`;
    }

    // ===== ATTACH CLICK EVENTS =====
    function attachCardEvents() {
      document.querySelectorAll('.poster-card').forEach(card => {
        if (card.dataset.bound) return;
        card.dataset.bound = '1';
        card.addEventListener('click', function(e) {
          const id = this.dataset.id, s = this.dataset.source;
          if (!id) { showToast('Error', 'error'); return; }
          window.location.href = `see.html?id=${id}&source=${s}`;
        });
      });
    }

    // ===== FAST RENDER HOME =====
    function renderHomeFast() {
      const onlyMovies = validMovies.filter(m => m.type === 'movie');
      const seriesList = validMovies.filter(m => m.type === 'series');
      const latest = sortByYearDesc(onlyMovies);
      const trending = [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0));

      let html = '';
      
      // Hero
      const heroCandidates = validMovies.filter(m => m.poster && m.type === 'movie');
      const dedupedHero = dedupeForFeatured(heroCandidates);
      heroMovies = sortByYearDesc(dedupedHero).slice(0, 5);
      
      if (heroMovies.length > 0) {
        let slides = '', dots = '';
        heroMovies.forEach((m, i) => {
          const st = escHtml(m.title), sd = escHtml((m.description || '').substring(0, 100));
          const sg = m.genres?.[0] || 'Movie', rt = m.rating ? parseFloat(m.rating).toFixed(1) : '—';
          slides += `<div class="hero-slide${i===0?' active':''}" data-index="${i}"><div class="hero-bg" style="background-image:url('${m.poster}')"></div><div class="hero-gradient"></div><div class="hero-gradient-side"></div><div class="hero-info"><div class="hero-badge">▶ Featured</div><h1 class="hero-title">${st}</h1><div class="hero-meta-row"><span><span class="star-icon">★</span>${rt}</span><span>📅${m.year||'—'}</span><span>🏷${sg}</span></div><p class="hero-desc">${sd}...</p><div class="hero-btns"><button class="btn-hero btn-play" data-id="${m.id}" data-source="${m.source}">▶ Watch</button><button class="btn-hero btn-trailer" data-trailer="${m.youtubeTrailerUrl||''}">🎬 Trailer</button></div></div></div>`;
          dots += `<button class="hero-dot${i===0?' active':''}" data-index="${i}"></button>`;
        });
        html += `<div class="hero-container" id="heroContainer">${slides}<div class="hero-dots">${dots}</div></div>`;
      }

      // Trailers from latest
      const withTrailers = latest.filter(m => m.youtubeTrailerUrl);
      if (withTrailers.length > 0) {
        const deduped = dedupeParts(withTrailers).slice(0, 8);
        html += '<section class="content-section"><div class="trailer-scroll">';
        deduped.forEach(m => {
          let vid = ''; const u = m.youtubeTrailerUrl;
          if (u.includes('youtube.com/watch?v=')) vid = u.split('v=')[1]?.split('&')[0];
          else if (u.includes('youtu.be/')) vid = u.split('youtu.be/')[1]?.split('?')[0];
          else if (u.includes('youtube.com/embed/')) vid = u.split('embed/')[1]?.split('?')[0];
          if (vid) html += `<div class="trailer-card"><div class="trailer-video-wrap"><iframe src="https://www.youtube.com/embed/${vid}?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe></div><div class="trailer-label">${escHtml(m.title)} <span>· ${m.year||'—'}</span></div></div>`;
        });
        html += '</div></section>';
      }

      // Latest section
      const latestDeduped = dedupeParts(latest).slice(0, 12);
      html += `<section class="content-section"><div class="section-header"><h2 class="section-title-text"><span class="s-icon">🆕</span> Latest</h2></div><div class="poster-grid cols3">${latestDeduped.map(m => renderCard(m)).join('')}</div></section>`;

      // Trending section
      const trendingDeduped = dedupeParts(trending).slice(0, 6);
      html += `<section class="content-section"><div class="section-header"><h2 class="section-title-text"><span class="s-icon">🔥</span> Trending</h2></div><div class="poster-grid cols3">${trendingDeduped.map(m => renderCard(m)).join('')}</div></section>`;

      // Series section
      const seriesDeduped = dedupeParts(seriesList).slice(0, 6);
      if (seriesDeduped.length > 0) {
        html += `<section class="content-section"><div class="section-header"><h2 class="section-title-text"><span class="s-icon">📺</span> Series</h2></div><div class="poster-grid cols3">${seriesDeduped.map(m => renderCard(m)).join('')}</div></section>`;
      }

      // Genre sections
      GENRES.forEach(genre => {
        const gm = validMovies.filter(m => m.genres && m.genres.includes(genre));
        if (gm.length > 0) {
          const deduped = dedupeParts(gm).slice(0, 6);
          html += `<section class="content-section"><div class="section-header"><h2 class="section-title-text"><span class="s-icon">🏷</span> ${genre}</h2></div><div class="poster-grid cols3">${deduped.map(m => renderCard(m)).join('')}</div></section>`;
        }
      });

      // All movies
      const allDeduped = dedupeParts(validMovies).slice(0, 18);
      html += `<section class="content-section"><div class="section-header"><h2 class="section-title-text"><span class="s-icon">📋</span> All Movies</h2></div><div class="poster-grid cols3">${allDeduped.map(m => renderCard(m)).join('')}</div></section>`;

      document.getElementById('mainContent').innerHTML = html;
      attachCardEvents();
      setupHeroEvents();
      if (heroMovies.length > 1) startHeroSlideshow();
      finishLoading();
    }

    function renderNonHome(title, movies) {
      const deduped = dedupeParts(sortByYearDesc(movies));
      document.getElementById('mainContent').innerHTML = `<h1 style="text-align:center;padding:20px 10px 8px;font-size:1.3rem;font-weight:800">${title}</h1><section class="content-section"><div class="poster-grid cols2">${deduped.map(m => renderCard(m)).join('')}</div></section>`;
      attachCardEvents();
      finishLoading();
    }

    // ===== HERO =====
    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval);
      if (heroMovies.length <= 1) return;
      let cur = 0;
      heroInterval = setInterval(() => { cur = (cur + 1) % heroMovies.length; switchSlide(cur); }, 4000);
    }
    function switchSlide(idx) {
      document.querySelectorAll('.hero-slide').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.hero-dot').forEach(d => d.classList.remove('active'));
      const sl = document.querySelector(`.hero-slide[data-index="${idx}"]`);
      const dt = document.querySelector(`.hero-dot[data-index="${idx}"]`);
      if (sl) sl.classList.add('active');
      if (dt) dt.classList.add('active');
    }
    function setupHeroEvents() {
      const c = document.getElementById('heroContainer');
      if (!c) return;
      c.querySelectorAll('.hero-dot').forEach(dot => {
        dot.addEventListener('click', e => { e.stopPropagation(); switchSlide(parseInt(dot.dataset.index)); resetHeroTimer(); });
      });
      c.querySelectorAll('.btn-play').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const id = btn.dataset.id, s = btn.dataset.source;
          if (id) window.location.href = `see.html?id=${id}&source=${s}`;
        });
      });
      c.querySelectorAll('.btn-trailer').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const tr = btn.dataset.trailer;
          if (tr && tr.length > 5) openTrailerModal(tr);
        });
      });
    }
    function resetHeroTimer() {
      if (heroInterval) clearInterval(heroInterval);
      heroInterval = setInterval(() => {
        const cur = [...document.querySelectorAll('.hero-dot')].findIndex(d => d.classList.contains('active'));
        switchSlide((cur + 1) % heroMovies.length);
      }, 4000);
    }
    function openTrailerModal(url) {
      let vid = '';
      if (url.includes('youtube.com/watch?v=')) vid = url.split('v=')[1]?.split('&')[0];
      else if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split('?')[0];
      else if (url.includes('youtube.com/embed/')) vid = url.split('embed/')[1]?.split('?')[0];
      if (!vid) return;
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;cursor:pointer;';
      modal.innerHTML = `<div style="position:relative;width:95%;max-width:600px;aspect-ratio:16/9;" onclick="event.stopPropagation()"><button style="position:absolute;top:-30px;right:0;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;" onclick="this.closest('[style*=fixed]').remove()">✕</button><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="autoplay;encrypted-media" allowfullscreen style="border-radius:8px;"></iframe></div>`;
      modal.addEventListener('click', () => modal.remove());
      document.body.appendChild(modal);
    }

    // ===== NAVIGATION =====
    function navigateTo(page) {
      if (heroInterval) { clearInterval(heroInterval); heroInterval = null; }
      document.querySelectorAll('.bottom-nav-item').forEach(l => l.classList.remove('active'));
      startLoading();
      try {
        switch (page) {
          case 'home':
            document.querySelector('.bottom-nav-item[data-page="home"]')?.classList.add('active');
            renderHomeFast();
            break;
          case 'trending':
            document.querySelector('.bottom-nav-item[data-page="trending"]')?.classList.add('active');
            renderNonHome('Trending Now', [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0)));
            break;
          case 'latest':
            document.querySelector('.bottom-nav-item[data-page="latest"]')?.classList.add('active');
            renderNonHome('Latest', sortByYearDesc(validMovies.filter(m => m.type === 'movie')));
            break;
          case 'movies':
            document.querySelector('.bottom-nav-item[data-page="movies"]')?.classList.add('active');
            renderNonHome('Movies', validMovies.filter(m => m.type === 'movie'));
            break;
          case 'series':
            document.querySelector('.bottom-nav-item[data-page="series"]')?.classList.add('active');
            renderNonHome('Series', validMovies.filter(m => m.type === 'series'));
            break;
        }
      } catch (e) { console.error(e); showToast('Error', 'error'); finishLoading(); }
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    // ===== SEARCH =====
    function setupSearch() {
      const input = document.getElementById('searchInput'), clearBtn = document.getElementById('searchClear'), drop = document.getElementById('searchDrop');
      if (!input || !drop) return;
      let timeout;
      input.addEventListener('input', () => {
        const q = input.value.trim();
        q.length > 0 ? clearBtn.classList.add('show') : clearBtn.classList.remove('show');
        if (!q) { drop.classList.remove('open'); return; }
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          const query = q.toLowerCase();
          const results = dedupeParts(allForSearch.filter(m =>
            (m.title && m.title.toLowerCase().includes(query)) ||
            (m.genres && m.genres.some(g => g.toLowerCase().includes(query))) ||
            (m.umusobanuzi && m.umusobanuzi.toLowerCase().includes(query)) ||
            (m.year && String(m.year).includes(query))
          )).slice(0, 8);
          drop.innerHTML = results.length === 0 ? '<div class="search-item" style="justify-content:center;color:var(--text-secondary)">No results</div>' :
            results.map(m => `<div class="search-item" data-id="${m.id}" data-source="${m.source}">${m.poster ? `<img src="${m.poster}" class="search-thumb" onerror="this.style.display='none'">` : ''}<div class="search-info"><div class="search-title">${escHtml(m.title)}</div><div class="search-meta">${m.year || '—'} · ${m.type}</div></div></div>`).join('');
          drop.classList.add('open');
          drop.querySelectorAll('.search-item').forEach(item => {
            if (!item.dataset.id) return;
            item.addEventListener('click', () => {
              const id = item.dataset.id, s = item.dataset.source;
              drop.classList.remove('open');
              input.value = '';
              clearBtn.classList.remove('show');
              window.location.href = `see.html?id=${id}&source=${s}`;
            });
          });
        }, 200);
      });
      clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('show'); drop.classList.remove('open'); });
      document.addEventListener('click', e => { if (!document.getElementById('searchBox').contains(e.target)) drop.classList.remove('open'); });
    }

    function setupBottomNav() {
      document.querySelectorAll('.bottom-nav-item').forEach(item => {
        item.addEventListener('click', () => navigateTo(item.dataset.page));
      });
      document.getElementById('logoHome').addEventListener('click', e => { e.preventDefault(); navigateTo('home'); });
    }

    // ===== INIT - FAST =====
    async function init() {
      setupBottomNav();
      setupSearch();
      startLoading();

      // Try cache first
      const cached = sessionStorage.getItem('kflix_mob_v5');
      if (cached) {
        try {
          allMovies = JSON.parse(cached);
          if (allMovies.length > 0) {
            validMovies = allMovies.filter(m => !hasErrors(m));
            errorMovies = allMovies.filter(m => hasErrors(m));
            allForSearch = [...validMovies, ...errorMovies];
            validMovies = sortByYearDesc(validMovies);
            errorMovies = sortByYearDesc(errorMovies);
            if (validMovies.length > 0) {
              renderHomeFast();
            }
          }
        } catch (e) { }
      }

      // Fetch fresh data
      allMovies = await fetchAll();
      validMovies = allMovies.filter(m => !hasErrors(m));
      errorMovies = allMovies.filter(m => hasErrors(m));
      allForSearch = [...validMovies, ...errorMovies];
      validMovies = sortByYearDesc(validMovies);
      errorMovies = sortByYearDesc(errorMovies);

      // Save to cache
      try { sessionStorage.setItem('kflix_mob_v5', JSON.stringify(allMovies)); } catch (e) { }

      if (validMovies.length > 0) {
        renderHomeFast();
      } else {
        document.getElementById('mainContent').innerHTML = '<div style="text-align:center;padding:40px"><div style="font-size:3rem">🎬</div><h2>No Movies Found</h2><button onclick="location.reload()" style="margin-top:15px;background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:50px;cursor:pointer;font-weight:600;">Retry</button></div>';
        finishLoading();
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
