    // Update navigation button states for all grids in a section
    function updateNavButtons(section) {
      const grids = section.querySelectorAll('.movies-grid');
      const prevBtn = section.querySelector('.grid-nav-btn.prev');
      const nextBtn = section.querySelector('.grid-nav-btn.next');
      if (!prevBtn || !nextBtn || !grids.length) return;

      let allAtStart = true;
      let allAtEnd = true;

      grids.forEach(grid => {
        const maxScroll = grid.scrollWidth - grid.clientWidth;
        if (grid.scrollLeft > 0) allAtStart = false;
        if (grid.scrollLeft < maxScroll - 1) allAtEnd = false;
      });

      prevBtn.disabled = allAtStart;
      nextBtn.disabled = allAtEnd;
    }

    // Handle grid navigation for all grids in a section
    function handleGridNavigation(e) {
      const btn = e.target.closest('.grid-nav-btn');
      if (!btn) return;
      const section = btn.closest('.section');
      const grids = section.querySelectorAll('.movies-grid');
      if (!grids.length) return;

      const scrollAmount = window.innerWidth <= 576 ? 90 : 100; // Match movie-card width
      const direction = btn.classList.contains('prev') ? -scrollAmount : scrollAmount;

      requestAnimationFrame(() => {
        grids.forEach(grid => {
          grid.scrollBy({
            left: direction,
            behavior: 'smooth'
          });
        });
        updateNavButtons(section);
      });
    }

    // Scroll handling for header
    let lastScrollY = 0;
    let scrollTimeout = null;
    let isScrolling = false;

    function handleScroll() {
      const headerTop = document.querySelector('.header-top');
      const headerBottom = document.querySelector('.header-bottom');
      const currentScrollY = window.scrollY;

      isScrolling = true;
      clearTimeout(scrollTimeout);

      headerBottom.classList.add('hidden');
      headerTop.classList.add('hidden');

      scrollTimeout = setTimeout(() => {
        isScrolling = false;
        if (currentScrollY <= 50) {
          headerTop.classList.remove('hidden');
          headerBottom.classList.remove('hidden');
        }
        lastScrollY = currentScrollY;
      }, 300);
    }

    // Consolidated interaction handler
    function handleInteraction(e) {
      const link = e.target.closest('.nav-item, .footer-link, .genre-bar a');
      if (link) {
        if (link.classList.contains('genre-bar')) {
          const genre = link.textContent.trim();
          localStorage.setItem('selectedGenre', genre);
          window.location.href = 'genre.html';
          return;
        }
        e.preventDefault();
        const page = link.getAttribute('data-page');
        navigateTo(page);
        if (link.classList.contains('nav-item')) {
          document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
          link.classList.add('active');
        }
        return;
      }

      const target = e.target.closest('.movie-card, .watch-btn, .info-btn, .overlay-btn:not(.watchlist-btn), .watchlist-btn, .grid-nav-btn');
      if (!target) return;

      if (target.classList.contains('grid-nav-btn')) {
        handleGridNavigation(e);
        return;

            timestamp: data.createdAt?.toDate ? data.createdAt.toDate() : (data.dateAdded?.toDate ? data.dateAdded.toDate() : new Date()),
            seriesId: data.seriesId || null,

    async function fetchGenres() {
      const allGenres = new Set();

      try {
        const q = query(collection(db1, 'genres'), orderBy('name'));
        const querySnapshot = await getDocs(q);
        querySnapshot.docs.forEach(doc => {
          const genreName = doc.data().name;
          if (genreName) allGenres.add(genreName);
        });
      } catch (error) {
        console.error('Error fetching genres from Kinaflix:', error);
      }

      try {
        const moviesCollection = collection(db2, 'movies');
        const querySnapshot = await getDocs(moviesCollection);
        querySnapshot.docs.forEach(doc => {
          const data = doc.data();
          const genres = data.genre || data.genres || [];
          if (Array.isArray(genres)) {
            genres.forEach(genre => {
              if (genre && typeof genre === 'string') allGenres.add(genre);
            });
          } else if (typeof genres === 'string') {
            allGenres.add(genres);
          }
        });
      } catch (error) {
        console.error('Error fetching genres from CULLO Movies:', error);
      }

      return Array.from(allGenres).sort();
    }

    async function fetchFeaturedMovies(moviesData) {
      return moviesData.sort((a, b) => b.views - a.views).slice(0, 5);
    }

    async function fetchNewestMovies(moviesData) {
      const sortedByDate = [...moviesData].sort((a, b) => b.timestamp - a.timestamp);

      const seriesGroups = new Map();
      for (const movie of sortedByDate) {
        const seriesKey = movie.seriesId || getTitlePrefix(movie.title);
        if (!seriesGroups.has(seriesKey)) {
          seriesGroups.set(seriesKey, []);
        }
        seriesGroups.get(seriesKey).push(movie);
      }

      const uniqueMovies = [];
      for (const group of seriesGroups.values()) {
        const selectedMovies = [];
        for (let i = 0; i < Math.min(3, group.length); i++) {
          const randomIndex = Math.floor(Math.random() * group.length);
          selectedMovies.push(group[randomIndex]);
          group.splice(randomIndex, 1);
        }
        uniqueMovies.push(...selectedMovies);
        if (uniqueMovies.length >= 12) break;
      }

      return uniqueMovies.slice(0, 12);
    }

    function getTitlePrefix(title) {
      const words = title.split(' ').slice(0, Math.ceil(title.split(' ').length * 0.7));
      return words.join(' ').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startSlideshow() {
      if (!featuredMovies.length) return;
      let currentSlide = 0;

      function showSlide(index) {
        const slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });
        currentSlide = index;
      }

      function nextSlide() {
        requestAnimationFrame(() => {
          const nextIndex = (currentSlide + 1) % featuredMovies.length;
          showSlide(nextIndex);
        });
      }

      showSlide(0);
      slideInterval = setInterval(nextSlide, 15000);

      document.querySelectorAll('.hero-slide').forEach(slide => {
        slide.addEventListener('touchstart', () => clearInterval(slideInterval), { passive: true });
        slide.addEventListener('touchend', () => slideInterval = setInterval(nextSlide, 15000), { passive: true });
      });
    }

              <button class="grid-nav-btn next" aria-label="Scroll right"><i class="fas fa-chevron-right"></i></button>
            </div>
            ${allMoviesRows.slice(0, 5).map(row => `
              <div class="movies-grid">
                ${renderMovieGridWithAds(row)}
              </div>
            `).join('')}
          </section>
        `;
      }

      mainContent.innerHTML = html;
      attachMovieCardEvents();
      setupGridScrollObservers();
      document.querySelectorAll('.view-all').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const sort = link.getAttribute('data-sort');
          const genre = link.getAttribute('data-genre');
          if (genre) loadMoviesByGenre(genre);
          else if (sort) loadAllMovies(sort);
        }, { passive: true });
      });
    }

    function chunkArray(array, size) {
      const result = [];
      for (let i = 0; i < array.length; i += size) {
        result.push(array.slice(i, i + size));
      }
      return result;
    }

    async function loadMoviesByGenre(genre) {
      showLoading();
      try {
        let genreMovies = movies.filter(movie =>
          Array.isArray(movie.genres) && movie.genres.includes(genre)
        );
        genreMovies = shuffleArray(sortMovies(genreMovies, 'views', 'desc')).slice(0, 24);

        if (currentUser) {
          const userRef = doc(db1, 'users', currentUser.uid);
          const userSnap = await getDoc(userRef);
          if (userSnap.exists()) {
            const preferences = userSnap.data().displayPreferences || {};
            genreMovies = sortMovies(genreMovies, preferences.sortField || 'views', preferences.sortOrder || 'desc');
          }
        }
        renderMovieList(genreMovies, `${genre} Movies`);
        setupGridScrollObservers();
        hideLoading();
      } catch (error) {
        showToast('Error loading movies: ' + error.message, 'error');
        console.error('Load genre movies error:', error);
        hideLoading();
      }
    }

    async function loadAllMovies(sort = 'latest') {
      showLoading();
      try {
        let allMoviesList = [...movies];

        if (sort === 'popular') {
          allMoviesList = sortMovies(allMoviesList, 'views', 'desc');
        } else if (sort === 'newest') {
          allMoviesList = sortMovies(allMoviesList, 'timestamp', 'desc');

          const seriesGroups = new Map();
          for (const movie of allMoviesList) {
            const seriesKey = movie.seriesId || getTitlePrefix(movie.title);
            if (!seriesGroups.has(seriesKey)) {
              seriesGroups.set(seriesKey, []);
            }
            seriesGroups.get(seriesKey).push(movie);
          }
          const uniqueMovies = [];
          for (const group of seriesGroups.values()) {
            const selectedMovies = [];
            for (let i = 0; i < Math.min(3, group.length); i++) {
              const randomIndex = Math.floor(Math.random() * group.length);
              selectedMovies.push(group[randomIndex]);
              group.splice(randomIndex, 1);
            }
            uniqueMovies.push(...selectedMovies);
          }
          allMoviesList = uniqueMovies;
        } else {
          allMoviesList = sortMovies(allMoviesList, 'views', 'desc');
        }

        if (currentUser) {
          const userRef = doc(db1, 'users', currentUser.uid);
          const userSnap = await getDoc(userRef);
          if (userSnap.exists()) {
            const preferences = userSnap.data().displayPreferences || {};
            allMoviesList = sortMovies(allMoviesList, preferences.sortField || 'views', preferences.sortOrder || 'desc');
          }
        }
        renderMovieList(allMoviesList, sort === 'popular' ? 'Popular Movies' : sort === 'newest' ? 'Newest Releases' : 'Latest Movies');
        setupGridScrollObservers();
        hideLoading();
      } catch (error) {
        showToast('Error loading movies: ' + error.message, 'error');
        console.error('Load all movies error:', error);
        hideLoading();
      }
    }

    function renderMovieList(moviesList, title) {
      const withAds = injectNativeAds(moviesList);
      const rows = chunkArray(withAds, 12);
      const html = `
        <section class="section">
          <h2 class="section-title">${title}</h2>
          <div class="grid-nav">
            <button class="grid-nav-btn prev" aria-label="Scroll left"><i class="fas fa-chevron-left"></i></button>
            <button class="grid-nav-btn next" aria-label="Scroll right"><i class="fas fa-chevron-right"></i></button>
          </div>
          ${rows.length > 0 ? rows.map(row => `
            <div class="movies-grid">
              ${renderMovieGridWithAds(row)}
            </div>
          `).join('') : '<p>No movies found.</p>'}
        </section>
      `;
      mainContent.innerHTML = html;
      attachMovieCardEvents();
      setupGridScrollObservers();
    }

    function renderMovieCard(movie) {
      const inWatchlist = currentUser && watchlist.includes(movie.id);
      const timeSince = formatTimeSince(movie.timestamp);
      const umusobanuziText = movie.umusobanuzi || (movie.source === 'cullo' ? getRandomUmusobanuzi() : null);
      const sourceBadge = umusobanuziText ? `<span class="umusobanuzi">${umusobanuziText}</span>` : '';
      return `
        <div class="movie-card" data-movie-id="${movie.id}">
          ${sourceBadge}
          <img src="${movie.coverImageUrl || 'https://via.placeholder.com/100x150?text=No+Image'}" 
               alt="${movie.title}" class="movie-poster" loading="lazy">
          <div class="movie-info">
            <h3 class="movie-title">${movie.title} (${movie.releaseYear || 'N/A'})</h3>
            <div class="movie-meta">
              <span>${movie.releaseYear || 'N/A'}</span>
              ${movie.rating ? `<span class="movie-rating"><i class="fas fa-star"></i> ${movie.rating}</span>` : ''}
            </div>
            ${movie.views ? `<div class="view-count"><i class="fas fa-eye"></i> ${movie.views}</div>` : ''}
            <div class="time-indicator">${timeSince}</div>
          </div>
          <div class="movie-overlay">
            <h3 class="overlay-title">${movie.title}</h3>
            ${Array.isArray(movie.genres) && movie.genres.length ? `
              <div class="overlay-genres">
                ${movie.genres.map(genre => `<span class="genre-tag">${genre}</span>`).join('')}
              </div>
            ` : ''}
            <p>${movie.description?.substring(0, 50) || 'No description available'}...</p>
            <button class="overlay-btn" data-movie-id="${movie.id}"><i class="fas fa-play"></i> Watch</button>
            ${currentUser ? `
              <button class="overlay-btn watchlist-btn ${inWatchlist ? 'in-watchlist' : ''}" 
                      data-movie-id="${movie.id}">
                <i class="fas ${inWatchlist ? 'fa-check' : 'fa-plus'}"></i> 
                ${inWatchlist ? 'In Watchlist' : 'Add to Watchlist'}
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }

    function attachMovieCardEvents() {
      mainContent.removeEventListener('click', handleInteraction);
      mainContent.addEventListener('click', handleInteraction, { passive: true });
    }

    async function countView(movieId) {
      const now = Date.now();
      const lastViewTime = lastViewTimestamps[movieId] || 0;
      if (now - lastViewTime > 3600000) {
        try {
          const movieRef = doc(db1, 'movies', movieId);
          await updateDoc(movieRef, { views: increment(1) });
          lastViewTimestamps[movieId] = now;
          const movieIndex = movies.findIndex(m => m.id === movieId);
          if (movieIndex !== -1) {
            movies[movieIndex].views = (movies[movieIndex].views || 0) + 1;
          }
        } catch (error) {
          console.error('Error counting view:', error);
        }
      }
    }

    async function loadUserData(userId) {
      try {
        const userRef = doc(db1, 'users', userId);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
          const userData = userSnap.data();
          watchlist = userData.watchlist || [];
          const validMovieIds = movies.map(m => m.id);
          watchHistory = (userData.history || []).filter(id => validMovieIds.includes(id));
          await updateDoc(userRef, { history: watchHistory });
          saveWatchHistoryToCookies(watchHistory);
        }
      } catch (error) {
        console.error('Error loading user data:', error);
      }
    }

    function saveWatchHistoryToCookies(history) {
      document.cookie = `watchHistory=${JSON.stringify(history)}; path=/; max-age=${60 * 60 * 24 * 30}`;
    }

    function loadWatchHistoryFromCookies() {
      const cookies = document.cookie.split('; ');
      const watchHistoryCookie = cookies.find(cookie => cookie.startsWith('watchHistory='));
      if (watchHistoryCookie) {
        try {
          watchHistory = JSON.parse(watchHistoryCookie.split('=')[1]);
        } catch (error) {
          console.error('Error parsing watch history cookie:', error);
        }
      }
    }

    function checkInternetConnection() {
      noInternetOverlay.style.display = navigator.onLine ? 'none' : 'flex';
    }

    function setupIntersectionObserver() {
      const observerOptions = {
        root: null,
        rootMargin: '100px',
        threshold: 0.1
      };

      const observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src || img.src;
            observer.unobserve(img);
          }
        });
      }, observerOptions);

      document.querySelectorAll('img').forEach(img => observer.observe(img));
    }

    function setupGridScrollObservers() {
      const sections = document.querySelectorAll('.section');
      sections.forEach(section => {
        const grids = section.querySelectorAll('.movies-grid');
        grids.forEach(grid => {
          grid.addEventListener('scroll', () => updateNavButtons(section), { passive: true });
          updateNavButtons(section);
        });
      });
    }

    function sortMovies(movies, field, order) {
      const sorted = [...movies];
      const isAsc = order === 'asc';
      switch (field) {
        case 'title': sorted.sort((a, b) => isAsc ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title)); break;
        case 'rating': sorted.sort((a, b) => isAsc ? (a.rating || 0) - (b.rating || 0) : (b.rating || 0) - (a.rating || 0)); break;
        case 'releaseYear': sorted.sort((a, b) => isAsc ? (a.releaseYear || 0) - (b.releaseYear || 0) : (b.releaseYear || 0) - (a.releaseYear || 0)); break;
        case 'views': sorted.sort((a, b) => isAsc ? (a.views || 0) - (b.views || 0) : (b.views || 0) - (a.views || 0)); break;
        case 'dateAdded': sorted.sort((a, b) => isAsc ? a.timestamp - b.timestamp : b.timestamp - a.timestamp); break;
        default: sorted.sort((a, b) => isAsc ? (a.views || 0) - (b.views || 0) : (b.views || 0) - (a.views || 0));
      }
      return sorted;
    }

    function formatTimeSince(timestamp) {
      const now = new Date();
      const seconds = Math.floor((now - timestamp) / 1000);
      let interval = Math.floor(seconds / 31536000);
      if (interval >= 1) return `${interval} year${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 2592000);
      if (interval >= 1) return `${interval} month${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 86400);
      if (interval >= 1) return `${interval} day${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 3600);
      if (interval >= 1) return `${interval} hour${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 60);
      if (interval >= 1) return `${interval} minute${interval === 1 ? '' : 's'} ago`;
      return `${Math.floor(seconds)} second${seconds === 1 ? '' : 's'} ago`;
    }

    function showLoading() {
      loadingSpinner.classList.add('active');
    }

    function hideLoading() {
      loadingSpinner.classList.remove('active');
    }
  </script>
</body>
