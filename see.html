      storageBucket: "kinaflix.firebasestorage.app",
      messagingSenderId: "318239806217",
      appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8"
    };
    const firebaseConfig2 = {
      apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk",
      authDomain: "cullo-movies-6813f.firebaseapp.com",
      projectId: "cullo-movies-6813f",
      messagingSenderId: "12310118231",
      appId: "1:12310118231:web:34682f354027fd19758812"
    };

    const app1 = initializeApp(firebaseConfig1);
    const analytics = (() => { try { return getAnalytics(app1); } catch (e) { return { logEvent: () => { } }; } })();
    const auth = getAuth(app1);
    const db1 = getFirestore(app1);
    const app2 = initializeApp(firebaseConfig2, "culloMovies");
    const db2 = getFirestore(app2);

    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');
    const sourceParam = urlParams.get('source');

    function getDb(source) { return source === 'cullo' ? db2 : db1; }
    function getDownloadUrl(videoUrl) {
      if (!videoUrl) return null;
      if (videoUrl.includes('drive.google.com')) {
        const m = videoUrl.match(/\/d\/(.+?)\//) || videoUrl.match(/id=(.+?)(&|$)/);
        if (m) return `https://drive.google.com/uc?export=download&id=${m[1]}`;
      }
      if (videoUrl.includes('archive.org')) {
        const m = videoUrl.match(/\/details\/([^\/?#]+)/);
        if (m) return `https://archive.org/download/${m[1]}/${m[1]}.mp4`;
        return videoUrl;
      }
      return videoUrl;
    }
    function getStreamingUrl(videoUrl) {
      if (!videoUrl) return null;
      if (videoUrl.includes('rumble.com')) {
        const m = videoUrl.match(/rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/);
        return m ? `https://rumble.com/embed/${m[1]}/?pub=4` : videoUrl;
      }
      if (videoUrl.includes('drive.google.com')) {
        const m = videoUrl.match(/\/d\/(.+?)\//) || videoUrl.match(/id=(.+?)(&|$)/);
        if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
      }
      if (videoUrl.includes('archive.org')) {
        const m = videoUrl.match(/\/details\/([^\/?#]+)/);
        if (m) return `https://archive.org/embed/${m[1]}`;
      }
      return videoUrl;
    }
    function extractYouTubeId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^"&?\/\s]{11})/,
        /youtube\.com\/shorts\/([^"&?\/\s]{11})/
      ];
      for (const p of patterns) { const m = url.match(p); if (m && m[1] && m[1].length === 11) return m[1]; }
      return null;
    }
    function escapeHtml(text) {
      if (!text) return '';
      const d = document.createElement('div'); d.textContent = text; return d.innerHTML;
    }

    // DOM elements cached
    const playerImage = document.getElementById('player-image');
    const movieTitle = document.getElementById('movie-title');
    const movieMeta = document.getElementById('movie-meta');
    const movieDescription = document.getElementById('movie-description');
    const watchNowBtn = document.getElementById('watch-now-btn');
    const watchlistBtn = document.getElementById('watchlist-btn');
    const downloadBtn = document.getElementById('download-btn');
    const whatsappBtn = document.getElementById('whatsapp-btn');
    const shareBtn = document.getElementById('share-btn');
    const commentInput = document.getElementById('comment-input');
    const submitCommentBtn = document.getElementById('submit-comment');
    const commentsList = document.getElementById('comments-list');
    const seriesSection = document.getElementById('series-section');
    const seriesTitle = document.getElementById('series-title');
    const seasonTabs = document.getElementById('season-tabs');
    const episodesGrid = document.getElementById('episodes-grid');
    const trailerContainer = document.getElementById('trailer-container');
    const popularMoviesSection = document.getElementById('popular-movies-section');
    const popularMoviesGrid = document.getElementById('popular-movies-grid');
    const popularSlider = document.getElementById('popular-slider');
    const descriptionPopup = document.getElementById('description-popup');
    const commentsPopup = document.getElementById('comments-popup');
    const showAllComments = document.getElementById('show-all-comments');

    let currentMovie = null, currentUser = null, currentSource = sourceParam || 'kinaflix';
    let isSeries = false, allEpisodes = [], seasonsList = [], currentSeason = 1, currentEpisode = null;
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    // Toast
    const toast = document.createElement('div');
    toast.className = 'toast';
    document.body.appendChild(toast);
    function showToast(msg, type = 'info') {
      toast.textContent = msg; toast.className = 'toast';
      toast.classList.add(type, 'show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    function formatEmail(email) {
      return email && email.includes('@gmail.com') ? email.replace('@gmail.com', '') : (email || 'Anonymous');
    }

    // Helper: add passive event listener
    function addPassiveListener(el, event, handler) {
      if (el) el.addEventListener(event, handler, { passive: true });
    }

    // ========== ALL EVENT LISTENERS WITH PASSIVE: TRUE ==========
    addPassiveListener(watchNowBtn, 'click', () => {
      if (!currentMovie) return showToast('Not loaded.', 'error');
      let videoUrl = isSeries && currentEpisode ? currentEpisode.videoUrl : (currentMovie.googleDriveLink || currentMovie.videoUrl);
      if (!videoUrl) { showToast('No streaming link.', 'error'); return; }
      const streamUrl = getStreamingUrl(videoUrl);
      window.location.href = `watch.html?movieId=${movieId}&streamingLink=${encodeURIComponent(streamUrl)}&source=${currentSource}`;
      logEvent(analytics, 'watch_movie', { movie_id: movieId });
    });

    addPassiveListener(downloadBtn, 'click', () => {
      if (!currentMovie) return showToast('Not loaded.', 'error');
      let videoUrl = isSeries && currentEpisode ? currentEpisode.videoUrl : (currentMovie.googleDriveLink || currentMovie.videoUrl);
      const dl = getDownloadUrl(videoUrl);
      if (dl) { window.open(dl, '_blank'); showToast('Download started!', 'success'); }
      else if (videoUrl?.includes('rumble.com')) showToast('Stream only.', 'info');
      else showToast('Not available.', 'error');
    });

    addPassiveListener(whatsappBtn, 'click', () => window.open('https://chat.whatsapp.com/LE4EmPz8OZA0Pj5XejYv8c', '_blank'));

    addPassiveListener(shareBtn, 'click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => showToast('Link copied!', 'success')).catch(() => showToast('Failed', 'error'));
    });

    addPassiveListener(submitCommentBtn, 'click', async () => {
      const text = commentInput.value.trim();
      if (!text) return showToast('Enter a comment.', 'error');
      if (!auth.currentUser) return showToast('Log in to comment.', 'error');
      await addDoc(collection(db1, 'comments'), {
        movieId, userId: auth.currentUser.uid,
        userEmail: auth.currentUser.email || 'Anonymous',
        text, timestamp: serverTimestamp()
      });
      commentInput.value = '';
      showToast('Comment added!', 'success');
    });

    addPassiveListener(popularSlider, 'input', () => {
      const max = popularMoviesGrid.scrollWidth - popularMoviesGrid.clientWidth;
      if (max > 0) popularMoviesGrid.scrollLeft = (popularSlider.value / 100) * max;
    });

    // Mobile popups
    if (isMobile) {
      addPassiveListener(movieDescription, 'click', () => {
        if (currentMovie) { descriptionPopup.textContent = currentMovie.description; descriptionPopup.classList.add('show'); }
      });
      addPassiveListener(descriptionPopup, 'click', () => descriptionPopup.classList.remove('show'));
      if (showAllComments) showAllComments.style.display = 'block';
      addPassiveListener(showAllComments, 'click', () => {
        commentsPopup.innerHTML = '<div style="max-height:70vh;overflow-y:auto;">' + commentsList.innerHTML + '</div>';
        commentsPopup.classList.add('show');
      });
      addPassiveListener(commentsPopup, 'click', () => commentsPopup.classList.remove('show'));
    }

    // ========== LOAD MOVIE DATA ==========
    async function loadMovieData() {
      if (!movieId) { showToast('No movie ID.', 'error'); setTimeout(() => window.location.href = 'index.html', 1000); return; }
      startLoading();
      try {
        const db = getDb(currentSource);
        let movieSnap = null;
        isSeries = false;

        if (currentSource === 'cullo') {
          movieSnap = await getDoc(doc(db, 'movies', movieId));
          if (!movieSnap.exists()) {
            movieSnap = await getDoc(doc(db, 'series', movieId));
            if (movieSnap.exists()) isSeries = true;
          }
        } else {
          movieSnap = await getDoc(doc(db, 'movies', movieId));
        }

        if (!movieSnap.exists()) {
          const fallbackDb = currentSource === 'cullo' ? db1 : db2;
          const fallbackSnap = await getDoc(doc(fallbackDb, 'movies', movieId));
          if (fallbackSnap.exists()) {
            currentSource = currentSource === 'cullo' ? 'kinaflix' : 'cullo';
            movieSnap = fallbackSnap;
          } else {
            throw new Error('Movie not found');
          }
        }

        const data = movieSnap.data();

        // Check for Kinaflix series (seriesId)
        if (currentSource === 'kinaflix' && data.seriesId) {
          isSeries = true;
          const seriesQuery = query(collection(db1, 'movies'), where('seriesId', '==', data.seriesId), orderBy('releaseYear', 'asc'));
          const seriesSnap = await getDocs(seriesQuery);

          allEpisodes = []; seasonsList = [];
          let epNum = 1;

          seriesSnap.docs.forEach(doc => {
            const movieData = doc.data();
            const seasonYear = movieData.releaseYear || 1;
            if (!seasonsList.includes(seasonYear)) seasonsList.push(seasonYear);
            allEpisodes.push({
              id: doc.id, season: seasonYear, number: epNum,
              title: movieData.title || `Movie ${epNum}`,
              videoUrl: movieData.googleDriveLink || movieData.videoUrl || '',
              thumbnail: movieData.coverImageUrl || '',
              source: 'kinaflix', year: movieData.releaseYear
            });
            epNum++;
          });

          seasonsList.sort((a, b) => a - b);
          if (seasonsList.length > 0) { currentSeason = seasonsList[0]; const first = allEpisodes.filter(e => e.season === currentSeason); if (first.length) currentEpisode = first[0]; }

          let seriesName = '';
          try { const sd = await getDoc(doc(db1, 'series', data.seriesId)); if (sd.exists()) seriesName = sd.data().name; } catch (e) { }

          currentMovie = {
            id: movieSnap.id, title: seriesName || data.title || 'Series',
            description: data.description || '', coverImageUrl: data.coverImageUrl || '',
            genres: Array.isArray(data.genres) ? data.genres : [],
            country: data.country || 'International', releaseYear: data.releaseYear || 'N/A',
            rating: data.rating || 'N/A', googleDriveLink: data.googleDriveLink || '',
            videoUrl: data.videoUrl || '', youtubeTrailerUrl: data.youtubeTrailerUrl || ''
          };
        }
        // Check for Cullo series
        else if (currentSource === 'cullo' && (isSeries || (data.seasons && Array.isArray(data.seasons) && data.seasons.length > 0))) {
          isSeries = true;
          allEpisodes = []; seasonsList = [];
          if (data.seasons) {
            data.seasons.forEach((season, idx) => {
              const snum = season.number || idx + 1;
              if (!seasonsList.includes(snum)) seasonsList.push(snum);
              (season.episodes || []).forEach(ep => {
                allEpisodes.push({
                  id: ep.id || `${movieId}_s${snum}_e${ep.number}`,
                  season: snum, number: ep.number || '?', part: ep.part || null,
                  title: ep.title || `Ep ${ep.number}`, videoUrl: ep.videoUrl || '',
                  thumbnail: ep.thumbnail || data.thumbnailUrl, source: 'cullo'
                });
              });
            });
          }
          seasonsList.sort((a, b) => a - b);
          if (seasonsList.length > 0) { currentSeason = seasonsList[0]; const first = allEpisodes.filter(e => e.season === currentSeason); if (first.length) currentEpisode = first[0]; }

          currentMovie = {
            id: movieSnap.id, title: data.title || 'Series',
            description: data.description || '', coverImageUrl: data.thumbnailUrl || data.posterUrl || '',
            genres: Array.isArray(data.genre) ? data.genre : [],
            country: data.country || 'International', releaseYear: data.year || 'N/A',
            rating: data.rating || 'N/A', youtubeTrailerUrl: data.trailerUrl || data.youtubeTrailerUrl || ''
          };
        }
        // Regular movie
        else {
          isSeries = false;
          currentMovie = {
            id: movieSnap.id, title: data.title || 'Untitled',
            description: data.description || '',
            coverImageUrl: data.coverImageUrl || data.thumbnailUrl || data.posterUrl || '',
            genres: Array.isArray(data.genres) ? data.genres : (Array.isArray(data.genre) ? data.genre : []),
            country: data.country || 'International',
            releaseYear: data.releaseYear || data.year || 'N/A',
            rating: data.rating || 'N/A',
            googleDriveLink: data.googleDriveLink || data.videoUrl || '',
            videoUrl: data.videoUrl || '',
            youtubeTrailerUrl: data.youtubeTrailerUrl || data.trailerUrl || ''
          };
        }

        renderMovieDetails();
        loadComments();
        checkWatchlistStatus();
        await loadPopularMovies();
        finishLoading();
      } catch (error) {
        console.error('Error:', error);
        showToast('Error loading movie.', 'error');
        finishLoading();
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    }

    // ========== RENDER SERIES ==========
    function renderSeriesEpisodes() {
      if (!isSeries || allEpisodes.length === 0) {
        seriesSection.style.display = 'none';
        return;
      }
      seriesSection.style.display = 'block';
      seriesTitle.textContent = currentMovie.title || 'Series';

      const seasonEpisodes = allEpisodes.filter(e => e.season === currentSeason);
      seasonTabs.innerHTML = seasonsList.map(s => `<button class="season-tab ${s === currentSeason ? 'active' : ''}" data-season="${s}">${currentSource === 'kinaflix' ? s : 'Season ' + s}</button>`).join('');

      if (seasonEpisodes.length === 0) {
        episodesGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#666;">No episodes.</div>';
      } else {
        episodesGrid.innerHTML = seasonEpisodes.map(ep => {
          const isActive = currentEpisode && currentEpisode.id === ep.id;
          const hasVideo = ep.videoUrl && ep.videoUrl.trim() !== '';
          return `<div class="episode-card ${isActive ? 'active' : ''}" data-episode='${JSON.stringify(ep).replace(/'/g, "&#39;")}'>
            <div class="episode-number">${isActive ? '<div class="playing-bars"><span></span><span></span><span></span></div>' : (currentSource === 'kinaflix' ? ep.title.substring(0, 15) : 'Ep ' + ep.number + (ep.part || ''))}</div>
            <div class="episode-title">${escapeHtml(ep.title || '')}</div>
            ${!hasVideo ? '<div class="coming-soon-badge">Soon</div>' : ''}
          </div>`;
        }).join('');
      }

      // Season tabs
      document.querySelectorAll('.season-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentSeason = parseInt(tab.dataset.season);
          const se = allEpisodes.filter(e => e.season === currentSeason);
          if (se.length) currentEpisode = se[0]; else currentEpisode = null;
          renderSeriesEpisodes();
        }, { passive: true });
      });

      // Episode cards
      document.querySelectorAll('.episode-card').forEach(card => {
        card.addEventListener('click', () => {
          const ep = JSON.parse(card.dataset.episode);
          if (!ep.videoUrl || ep.videoUrl.trim() === '') { showToast('Coming soon!', 'info'); return; }
          currentEpisode = ep;
          document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          showToast(`Now playing: ${ep.title}`, 'success');
          const streamUrl = getStreamingUrl(ep.videoUrl);
          window.location.href = `watch.html?movieId=${ep.id}&streamingLink=${encodeURIComponent(streamUrl)}&source=${ep.source || currentSource}`;
        }, { passive: true });
      });
    }

    // ========== POPULAR MOVIES ==========
    async function loadPopularMovies() {
      try {
        const moviesSet = new Map();
        const q1 = query(collection(db1, 'movies'), orderBy('views', 'desc'), limit(30));
        const snap1 = await getDocs(q1);
        snap1.docs.forEach(d => { if (d.id !== movieId) moviesSet.set(d.id, { id: d.id, source: 'kinaflix', ...d.data() }); });
        try {
          const snap2 = await getDocs(collection(db2, 'movies'));
          snap2.docs.forEach(d => {
            if (d.id !== movieId) { const dat = d.data(); moviesSet.set(d.id, { id: d.id, source: 'cullo', title: dat.title, coverImageUrl: dat.thumbnailUrl || dat.posterUrl }); }
          });
        } catch (e) { }
        const movies = Array.from(moviesSet.values()).sort(() => Math.random() - 0.5).slice(0, 20);
        if (popularMoviesGrid && movies.length > 0) {
          popularMoviesGrid.innerHTML = '';
          movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'popular-movie-card';
            card.innerHTML = `<img src="${movie.coverImageUrl || ''}" alt="${escapeHtml(movie.title || '')}" class="popular-movie-poster" loading="lazy" onerror="this.style.display='none'" /><div class="popular-movie-title">${escapeHtml(movie.title || 'Untitled')}</div>`;
            card.addEventListener('click', () => { window.location.href = `see.html?id=${movie.id}&source=${movie.source || 'kinaflix'}`; }, { passive: true });
            popularMoviesGrid.appendChild(card);
          });
          popularMoviesSection.style.display = 'block';
        }
      } catch (e) { popularMoviesSection.style.display = 'none'; }
    }

    function renderMovieDetails() {
      if (playerImage) playerImage.src = currentMovie.coverImageUrl || '';
      if (movieTitle) movieTitle.textContent = currentMovie.title || 'N/A';
      if (movieMeta) movieMeta.innerHTML = `${currentMovie.genres?.[0] || 'N/A'} | ${currentMovie.country || 'N/A'} | ${currentMovie.releaseYear || 'N/A'} | ${currentMovie.rating ? '<span><i class="fas fa-star"></i> ' + currentMovie.rating + '</span>' : ''}`;
      if (movieDescription) movieDescription.textContent = currentMovie.description || 'No description.';
      if (isSeries) renderSeriesEpisodes(); else seriesSection.style.display = 'none';
      if (trailerContainer && currentMovie.youtubeTrailerUrl) {
        const vid = extractYouTubeId(currentMovie.youtubeTrailerUrl);
        trailerContainer.innerHTML = vid ? `<iframe src="https://www.youtube-nocookie.com/embed/${vid}?rel=0&modestbranding=1" allowfullscreen loading="lazy"></iframe>` : '<p>Invalid trailer URL.</p>';
      } else if (trailerContainer) trailerContainer.innerHTML = '<p>No trailer available.</p>';
    }

    // Watchlist - FIXED: using addEventListener instead of onclick
    function updateWatchlistButton(isInWatchlist) {
      if (!watchlistBtn) return;
      // Remove old listener by cloning (simple approach)
      const newBtn = watchlistBtn.cloneNode(true);
      watchlistBtn.parentNode.replaceChild(newBtn, watchlistBtn);
      // Update reference
      window._watchlistBtn = newBtn;

      if (isInWatchlist) {
        newBtn.classList.add('watchlist-added');
        newBtn.innerHTML = '<i class="fas fa-check"></i> Remove';
      } else {
        newBtn.classList.remove('watchlist-added');
        newBtn.innerHTML = '<i class="fas fa-plus"></i> NZAYIREBA UBUTAHA';
      }

      newBtn.addEventListener('click', toggleWatchlist, { passive: true });
    }

    async function checkWatchlistStatus() {
      const user = auth.currentUser;
      if (user) {
        currentUser = user;
        onSnapshot(doc(db1, 'watchlists', user.uid), snap => {
          const isInWatchlist = snap.exists() && snap.data().movies?.includes(movieId);
          updateWatchlistButton(isInWatchlist);
        });
      } else {
        updateWatchlistButton(false);
        // Override with login message
        if (window._watchlistBtn) {
          window._watchlistBtn.innerHTML = '<i class="fas fa-plus"></i> NZAYIREBA UBUTAHA';
          window._watchlistBtn.onclick = null;
          window._watchlistBtn.addEventListener('click', () => showToast('Log in.', 'error'), { passive: true });
        }
      }
    }

    async function toggleWatchlist() {
      if (!currentUser) return showToast('Log in first.', 'error');
      const ref = doc(db1, 'watchlists', currentUser.uid);
      const snap = await getDoc(ref);
      if (snap.exists() && snap.data().movies?.includes(movieId)) {
        await setDoc(ref, { movies: arrayRemove(movieId) }, { merge: true });
      } else {
        await setDoc(ref, { movies: arrayUnion(movieId) }, { merge: true });
      }
    }

    function loadComments() {
      if (!movieId) { commentsList.innerHTML = '<p>Invalid ID.</p>'; return; }
      const q = query(collection(db1, 'comments'), where('movieId', '==', movieId), orderBy('timestamp', 'desc'));
      onSnapshot(q, snap => {
        if (snap.empty) { commentsList.innerHTML = '<p>No comments yet.</p>'; return; }
        commentsList.innerHTML = '';
        snap.forEach(d => {
          const c = d.data();
          const el = document.createElement('div');
          el.className = 'comment';
          el.innerHTML = `<span class="user">${escapeHtml(formatEmail(c.userEmail))}</span><p class="text">${escapeHtml(c.text)}</p>`;
          commentsList.appendChild(el);
        });
      });
    }

    // Start
    loadMovieData();
  </script>
