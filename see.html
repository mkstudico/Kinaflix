<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="google-adsense-account" content="ca-pub-6280599021277554">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Details | KINAFLIX</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css" />

  <style>
    :root {
      --primary: #e50914;
      --dark: #000000;
      --light: #f5f5f5;
      --gray-text: #888;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dark);
      color: var(--light);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background-color: var(--primary);
      color: white;
      border: none;
      transition: all 0.3s ease;
    }

    .back-button:hover {
      background-color: #b2070f;
      color: white;
    }

    .movie-hero {
      position: relative;
      min-height: 70vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: flex-end;
      padding: 60px 40px;
    }

    .movie-hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(0deg, #000 0%, transparent 50%);
    }

    .movie-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    .movie-title {
      font-size: 3.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .movie-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 1rem;
      color: var(--gray-text);
    }

    .movie-description {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }

    .watch-button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1.2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .watch-button:hover {
      background-color: #b2070f;
      transform: scale(1.05);
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: bold;
      margin: 40px 0 20px 0;
      padding-left: 20px;
      border-left: 4px solid var(--primary);
    }

    .movie-card {
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
      border-radius: 8px;
      overflow: hidden;
    }

    .movie-card:hover {
      transform: scale(1.05);
      z-index: 10;
    }

    .movie-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 8px;
    }

    .movie-card-title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
      color: white;
      font-weight: bold;
      text-align: center;
    }

    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .error-message {
      text-align: center;
      padding: 50px;
      color: var(--primary);
    }

    .owl-nav button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50% !important;
      background: rgba(0, 0, 0, 0.7) !important;
      color: white !important;
      font-size: 20px !important;
    }

    .owl-prev {
      left: -20px;
    }

    .owl-next {
      right: -20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .social-bar-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 60;
      pointer-events: none;
    }

    .social-bar-container > * {
      pointer-events: auto;
    }

    /* SmartLink styles */
    .smartlink-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .smartlink-content {
      background: white;
      padding: 30px;
      border-radius: 8px;
      max-width: 400px;
      text-align: center;
    }
  </style>
</head>

<body>
  <a href="index.html" class="button back-button is-rounded">
    <span class="icon">
      <i class="fas fa-arrow-left"></i>
    </span>
    <span>BACK</span>
  </a>

  <!-- Social Bar -->
  <div class="social-bar-container" id="social-bar">
    <script src="https://pl29119196.profitablecpmratenetwork.com/b8/29/4d/b8294df1d7e2c4bdf1c663d5c0ec4f4b.js"></script>
  </div>

  <div id="movie-details-container">
    <div class="loading-spinner"></div>
  </div>

  <div class="container">
    <h2 class="section-title">Popular Movies</h2>
    <div class="owl-carousel owl-theme" id="popular-movies-carousel">
      <!-- Popular movies will be loaded here -->
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, getDoc, query, limit, orderBy } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore.js';

    // Firebase configurations
    const firebaseConfig1 = {
      apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k",
      authDomain: "kinaflix.firebaseapp.com",
      projectId: "kinaflix",
      storageBucket: "kinaflix.appspot.com",
      messagingSenderId: "318239806217",
      appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8"
    };

    const firebaseConfig2 = {
      apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk",
      authDomain: "cullo-movies-6813f.firebaseapp.com",
      projectId: "cullo-movies-6813f",
      messagingSenderId: "12310118231",
      appId: "1:12310118231:web:34682f354027fd19758812"
    };

    // Initialize Firebase apps
    const app1 = initializeApp(firebaseConfig1, "kinaflix");
    const db1 = getFirestore(app1);
    
    let app2, db2;
    try {
      app2 = initializeApp(firebaseConfig2, "cullo");
      db2 = getFirestore(app2);
    } catch (e) {
      console.log('Secondary database not available');
    }

    // SmartLink URL
    const SMARTLINK_URL = 'https://www.profitablecpmratenetwork.com/p4f0vdtub?key=48b231bfea0e962b42040882e5dd904d';

    // Function to apply SmartLink to watch buttons
    function applySmartLinkToWatchButton() {
      setTimeout(() => {
        const watchButton = document.querySelector('.watch-button');
        if (watchButton && !watchButton.hasAttribute('data-smartlink-applied')) {
          watchButton.setAttribute('data-smartlink-applied', 'true');
          
          const originalClick = watchButton.onclick;
          watchButton.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            // Open SmartLink
            window.open(SMARTLINK_URL, '_blank');
            
            // Execute original action after delay
            setTimeout(() => {
              if (originalClick) {
                originalClick.call(watchButton, e);
              } else {
                const href = watchButton.getAttribute('data-href');
                if (href) {
                  window.location.href = href;
                }
              }
            }, 100);
          }, true);
        }
      }, 1000);
    }

    // Render movie details
    function renderMovieDetails(movie) {
      const container = document.getElementById('movie-details-container');
      
      const backdropUrl = movie.backdrop || movie.poster || 'https://via.placeholder.com/1920x1080/000000/ffffff?text=No+Image';
      const posterUrl = movie.poster || movie.thumbnail || 'https://via.placeholder.com/500x750/000000/ffffff?text=No+Poster';
      const title = movie.title || 'Unknown Title';
      const description = movie.description || movie.overview || 'No description available.';
      const year = movie.year || movie.releaseDate?.split('-')[0] || 'N/A';
      const duration = movie.duration || 'N/A';
      const rating = movie.rating || 'N/A';
      const genre = movie.genre || (Array.isArray(movie.genres) ? movie.genres.join(', ') : 'N/A');
      
      const streamingLink = movie.streamingLink || movie.googleDriveLink || movie.videoUrl || '';
      
      container.innerHTML = `
        <div class="movie-hero" style="background-image: url('${backdropUrl}');">
          <div class="movie-content">
            <h1 class="movie-title">${title}</h1>
            <div class="movie-meta">
              <span><i class="fas fa-calendar"></i> ${year}</span>
              <span><i class="fas fa-clock"></i> ${duration}</span>
              <span><i class="fas fa-star" style="color: #ffd700;"></i> ${rating}</span>
              <span><i class="fas fa-tag"></i> ${genre}</span>
            </div>
            <p class="movie-description">${description}</p>
            <button class="watch-button" data-href="watch.html?movieId=${movie.id || ''}&streamingLink=${encodeURIComponent(streamingLink)}">
              <i class="fas fa-play"></i>
              <span>Watch Now</span>
            </button>
          </div>
        </div>
      `;
      
      // Add click handler for watch button
      const watchButton = container.querySelector('.watch-button');
      if (watchButton) {
        watchButton.addEventListener('click', () => {
          const href = watchButton.getAttribute('data-href');
          if (href) {
            window.location.href = href;
          }
        });
      }
      
      // Apply SmartLink
      applySmartLinkToWatchButton();
    }

    // Load movie data
    async function loadMovieData(movieId) {
      try {
        // Try primary database first
        let docSnap = await getDoc(doc(db1, 'movies', movieId));
        
        if (docSnap.exists()) {
          const data = docSnap.data();
          return {
            id: movieId,
            ...data
          };
        }
        
        // Try secondary database if available
        if (db2) {
          docSnap = await getDoc(doc(db2, 'movies', movieId));
          if (docSnap.exists()) {
            const data = docSnap.data();
            return {
              id: movieId,
              title: data.title,
              description: data.description || data.overview,
              poster: data.poster || data.thumbnail,
              backdrop: data.backdrop || data.poster,
              year: data.year || data.releaseDate,
              duration: data.duration,
              rating: data.rating,
              genre: data.genre,
              streamingLink: data.videoUrl || data.streamingLink || data.googleDriveLink
            };
          }
          
          // Try series collection
          docSnap = await getDoc(doc(db2, 'series', movieId));
          if (docSnap.exists()) {
            const data = docSnap.data();
            const firstSeason = data.seasons?.[0];
            const firstEpisode = firstSeason?.episodes?.[0];
            return {
              id: movieId,
              title: data.title,
              description: data.description || data.overview,
              poster: data.poster || data.thumbnail,
              backdrop: data.backdrop || data.poster,
              year: data.year || data.releaseDate,
              rating: data.rating,
              genre: data.genre,
              streamingLink: firstEpisode?.videoUrl || data.videoUrl
            };
          }
        }
        
        throw new Error('Movie not found');
      } catch (error) {
        console.error('Error loading movie:', error);
        throw error;
      }
    }

    // Load popular movies
    async function loadPopularMovies() {
      try {
        const movies = [];
        
        // Load from primary database
        const q = query(collection(db1, 'movies'), limit(20));
        const querySnapshot = await getDocs(q);
        
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          if (data.title && (data.poster || data.thumbnail)) {
            movies.push({
              id: doc.id,
              title: data.title,
              poster: data.poster || data.thumbnail
            });
          }
        });
        
        // Load from secondary database if available
        if (db2 && movies.length < 10) {
          const q2 = query(collection(db2, 'movies'), limit(20));
          const querySnapshot2 = await getDocs(q2);
          
          querySnapshot2.forEach((doc) => {
            const data = doc.data();
            if (data.title && (data.poster || data.thumbnail)) {
              // Avoid duplicates
              if (!movies.find(m => m.id === doc.id)) {
                movies.push({
                  id: doc.id,
                  title: data.title,
                  poster: data.poster || data.thumbnail
                });
              }
            }
          });
        }
        
        return movies;
      } catch (error) {
        console.error('Error loading popular movies:', error);
        return [];
      }
    }

    // Render popular movies carousel
    function renderPopularMovies(movies) {
      const carousel = $('#popular-movies-carousel');
      
      if (movies.length === 0) {
        carousel.html('<p class="has-text-centered">No movies available</p>');
        return;
      }
      
      movies.forEach(movie => {
        const card = `
          <div class="movie-card" data-movie-id="${movie.id}">
            <img src="${movie.poster}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/500x750/000000/ffffff?text=No+Image'">
            <div class="movie-card-title">${movie.title}</div>
          </div>
        `;
        carousel.append(card);
      });
      
      // Initialize carousel
      carousel.owlCarousel({
        loop: true,
        margin: 15,
        nav: true,
        dots: false,
        autoplay: true,
        autoplayTimeout: 3000,
        autoplayHoverPause: true,
        responsive: {
          0: { items: 2 },
          600: { items: 3 },
          1000: { items: 5 },
          1400: { items: 6 }
        }
      });
      
      // Add click handlers
      $('.movie-card').on('click', function() {
        const movieId = $(this).data('movie-id');
        if (movieId) {
          window.location.href = `see.html?id=${movieId}`;
        }
      });
    }

    // Initialize page
    async function initPage() {
      const urlParams = new URLSearchParams(window.location.search);
      const movieId = urlParams.get('id');
      
      if (!movieId) {
        document.getElementById('movie-details-container').innerHTML = `
          <div class="error-message">
            <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px;"></i>
            <h2>No Movie Selected</h2>
            <p>Please select a movie from the homepage.</p>
            <a href="index.html" class="button is-danger mt-4">Go to Homepage</a>
          </div>
        `;
      } else {
        try {
          const movie = await loadMovieData(movieId);
          renderMovieDetails(movie);
          document.title = `${movie.title} | KINAFLIX`;
        } catch (error) {
          document.getElementById('movie-details-container').innerHTML = `
            <div class="error-message">
              <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px;"></i>
              <h2>Movie Not Found</h2>
              <p>The movie you're looking for could not be loaded.</p>
              <a href="index.html" class="button is-danger mt-4">Go to Homepage</a>
            </div>
          `;
        }
      }
      
      // Load popular movies
      const popularMovies = await loadPopularMovies();
      renderPopularMovies(popularMovies);
    }

    // Start the page
    $(document).ready(() => {
      initPage();
    });
  </script>
</body>

</html>
