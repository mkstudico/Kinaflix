    function getDownloadUrl(videoUrl, title) {
      if (!videoUrl) return null;
      if (videoUrl.includes('drive.google.com') || videoUrl.includes('gdrive')) {
        const fileIdMatch = videoUrl.match(/\/d\/(.+?)\//) || videoUrl.match(/id=(.+?)(&|$)/);
        if (fileIdMatch && fileIdMatch[1]) {
          return `https://drive.google.com/uc?export=download&id=${fileIdMatch[1]}`;

      }
      if (videoUrl.includes('rumble.com')) return null;
      if (videoUrl.includes('archive.org')) {
        const identifierMatch = videoUrl.match(/\/details\/([^\/?#]+)/);
        if (identifierMatch && identifierMatch[1]) {
          return `https://archive.org/download/${identifierMatch[1]}/${identifierMatch[1]}.mp4`;
        }
        return videoUrl;
      }
      if (videoUrl.match(/\.(mp4|webm|mkv|avi|mov)$/i)) return videoUrl;
      return videoUrl;
    }

    function getStreamingUrl(videoUrl) {
      if (!videoUrl) return null;
      if (videoUrl.includes('rumble.com')) {
        const rumbleMatch = videoUrl.match(/rumble\.com\/(?:embed\/)?([a-zA-Z0-9_-]+)/);
        if (rumbleMatch && rumbleMatch[1]) {
          return `https://rumble.com/embed/${rumbleMatch[1]}/?pub=4`;

      if (videoUrl.includes('drive.google.com')) {

        if (fileIdMatch && fileIdMatch[1]) {

      if (videoUrl.includes('archive.org')) {

        if (identifierMatch && identifierMatch[1]) {
          return `https://archive.org/embed/${identifierMatch[1]}`;
        }
      }
      return videoUrl;
    }

    function extractYouTubeVideoId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([^"&?\/\s]{11})/,
        /youtube\.com\/shorts\/([^"&?\/\s]{11})/,
        /youtube\.com\/live\/([^"&?\/\s]{11})/,
        /youtube\.com\/watch\?.*v=([^&]+)/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1] && match[1].length === 11) return match[1];
      }
      const idMatch = url.match(/([a-zA-Z0-9_-]{11})/);
      if (idMatch && idMatch[1] && !idMatch[1].includes('youtube') && !idMatch[1].includes('youtu.be')) {
        return idMatch[1];
      }
      return null;
    }

    async function loadMovieData() {
      if (!movieId) {
        showToast('No movie ID provided.', 'error');
        setTimeout(() => window.location.href = 'index.html', 1000);
        return;
      }

      try {
        const db = getDb(currentSource);
        let movieSnap = null;
        isSeries = false;

        if (currentSource === 'cullo') {
          // First try movies collection
          const movieRef = doc(db, 'movies', movieId);
          movieSnap = await getDoc(movieRef);
          if (!movieSnap.exists()) {
            // Then try series collection
            const seriesRef = doc(db, 'series', movieId);
            movieSnap = await getDoc(seriesRef);
            if (movieSnap.exists()) isSeries = true;
          }
        } else {
          const movieRef = doc(db, 'movies', movieId);
          movieSnap = await getDoc(movieRef);
        }

        if (!movieSnap.exists()) {
          if (currentSource === 'cullo') {
            const fallbackRef = doc(db1, 'movies', movieId);
            const fallbackSnap = await getDoc(fallbackRef);
            if (fallbackSnap.exists()) {
              currentSource = 'kinaflix';
              movieSnap = fallbackSnap;
            }
          } else {
            const fallbackRef = doc(db2, 'movies', movieId);
            const fallbackSnap = await getDoc(fallbackRef);
            if (fallbackSnap.exists()) {
              currentSource = 'cullo';
              movieSnap = fallbackSnap;
            }
          }
          if (!movieSnap || !movieSnap.exists()) {
            throw new Error('Movie not found in any database');
          }
        }

        const data = movieSnap.data();

        if (currentSource === 'cullo') {
          // Check if this is a series (has seasons array OR isSeries flag)
          if (isSeries || (data.seasons && Array.isArray(data.seasons) && data.seasons.length > 0)) {
            isSeries = true;
            seriesData = data;
            allEpisodes = [];
            seasonsList = [];

            if (data.seasons && Array.isArray(data.seasons)) {
              data.seasons.forEach((season, idx) => {
                const seasonNum = season.number || idx + 1;
                if (!seasonsList.includes(seasonNum)) seasonsList.push(seasonNum);

                const episodesArray = season.episodes || [];
                if (episodesArray.length === 0) {
                  console.warn(`Season ${seasonNum} has no episodes`);
                }

                episodesArray.forEach(ep => {
                  allEpisodes.push({
                    id: ep.id || `${movieId}_s${seasonNum}_e${ep.number}`,
                    season: seasonNum,
                    number: ep.number || '?',
                    part: ep.part || null,
                    title: ep.title || `Episode ${ep.number}${ep.part ? ep.part : ''}`,
                    videoUrl: ep.videoUrl || '',  // May be empty
                    thumbnail: ep.thumbnail || data.thumbnailUrl,
                    isPremium: ep.isPremium || false,
                    duration: ep.duration || '45 min'
                  });
                });
              });
            }

            seasonsList.sort((a, b) => a - b);
            if (seasonsList.length > 0 && currentSeason === 1) {
              currentSeason = seasonsList[0];
              const firstEpisodes = allEpisodes.filter(ep => ep.season === currentSeason);
              if (firstEpisodes.length > 0) {
                currentEpisode = firstEpisodes[0];
                // If first episode has no videoUrl, log warning but don't break
                if (!currentEpisode.videoUrl) {
                  console.log(`First episode of ${data.title} has no streaming link`);
                }
              } else {
                // No episodes in first season
                console.warn(`Season ${currentSeason} has no episodes`);
                currentEpisode = null;
              }
            }

            currentMovie = {
              id: movieSnap.id,
              title: data.title || 'Untitled Series',
              description: data.description || 'No description available.',
              coverImageUrl: data.thumbnailUrl || data.posterUrl || 'https://images.unsplash.com/photo-1502920514313-52581002a659?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80',
              posterUrl: data.posterUrl || data.thumbnailUrl || '',
              genres: Array.isArray(data.genre) ? data.genre : (data.genres ? (Array.isArray(data.genres) ? data.genres : [data.genres]) : []),
              country: data.country || 'International',
              releaseYear: data.year || data.releaseYear || 'N/A',
              rating: data.rating || 'N/A',
              youtubeTrailerUrl: data.trailerUrl || data.youtubeTrailerUrl || ''
            };
          } else {
            // It's a movie
            isSeries = false;
            currentMovie = {
              id: movieSnap.id,
              title: data.title || 'Untitled',
              description: data.description || 'No description available.',
              coverImageUrl: data.thumbnailUrl || data.posterUrl || 'https://images.unsplash.com/photo-1502920514313-52581002a659?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80',
              posterUrl: data.posterUrl || data.thumbnailUrl || '',
              genres: Array.isArray(data.genre) ? data.genre : (data.genres ? (Array.isArray(data.genres) ? data.genres : [data.genres]) : []),
              country: data.country || 'International',
              releaseYear: data.year || data.releaseYear || 'N/A',
              rating: data.rating || 'N/A',
              googleDriveLink: data.videoUrl || data.googleDriveLink || '',
              streamingLink: data.videoUrl || data.streamingLink || '',
              videoUrl: data.videoUrl || '',
              youtubeTrailerUrl: data.trailerUrl || data.youtubeTrailerUrl || '',
              seriesId: data.seriesId || null,
              timestamp: data.createdAt?.toDate ? data.createdAt.toDate() : new Date()
            };
          }
        } else {
          currentMovie = {
            id: movieSnap.id,
            ...data,
            timestamp: data.dateAdded?.toDate() || new Date()
          };
        }

        renderMovieDetails();
        loadComments();
        checkWatchlistStatus();
        await loadPopularMovies();
      } catch (error) {
        console.error('Error loading movie:', error);
        showToast(`Error loading movie: ${error.message}`, 'error');
        setTimeout(() => window.location.href = 'index.html', 2000);
      }
    }

    // Improved series episode rendering with "Coming Soon" for missing video links
    function renderSeriesEpisodes() {
      if (!isSeries || allEpisodes.length === 0) {
        seriesSection.style.display = 'none';
        // If it's a series but no episodes, show a message in the series section
        if (isSeries && allEpisodes.length === 0 && seriesSection) {
          seriesSection.style.display = 'block';
          seriesTitle.textContent = currentMovie.title;
          episodesGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;">No episodes available for this series yet. Check back later!</div>';
          seasonTabs.innerHTML = '';
        }
        return;
      }

      seriesSection.style.display = 'block';
      seriesTitle.textContent = currentMovie.title;

      const seasonEpisodes = allEpisodes.filter(ep => ep.season === currentSeason);

      seasonTabs.innerHTML = seasonsList.map(season => `
        <button class="season-tab ${season === currentSeason ? 'active' : ''}" data-season="${season}">
          Season ${season}
        </button>
      `).join('');

      if (seasonEpisodes.length === 0) {
        episodesGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem;">No episodes in this season yet. Coming soon!</div>';
      } else {
        episodesGrid.innerHTML = seasonEpisodes.map(ep => {
          const isActive = currentEpisode && currentEpisode.number === ep.number && currentEpisode.part === ep.part;
          const hasVideo = ep.videoUrl && ep.videoUrl.trim() !== '';
          return `
            <div class="episode-card ${isActive ? 'active' : ''}" data-episode='${JSON.stringify(ep)}'>
              <div class="episode-number">
                ${isActive ? '<div class="playing-bars"><span></span><span></span><span></span></div>' : `Episode ${ep.number}${ep.part ? ep.part : ''}`}
              </div>
              <div class="episode-title">${escapeHtml(ep.title || `Episode ${ep.number}${ep.part ? ep.part : ''}`)}</div>
              ${ep.isPremium ? '<div class="premium-badge"><i class="fas fa-crown"></i></div>' : ''}
              ${!hasVideo ? '<div class="coming-soon-badge"><i class="fas fa-clock"></i> Soon</div>' : ''}
            </div>
          `;
        }).join('');
      }

      // Season tab event listeners
      document.querySelectorAll('.season-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const season = parseInt(tab.dataset.season);
          currentSeason = season;
          const seasonEpisodesList = allEpisodes.filter(ep => ep.season === currentSeason);
          if (seasonEpisodesList.length > 0) {
            currentEpisode = seasonEpisodesList[0];
          } else {
            currentEpisode = null;
          }
          renderSeriesEpisodes();
        });
      });

      // Episode card event listeners
      document.querySelectorAll('.episode-card').forEach(card => {
        card.addEventListener('click', () => {
          const episode = JSON.parse(card.dataset.episode);
          if (episode.isPremium) {
            showToast('This episode requires premium subscription', 'error');
            return;
          }
          if (!episode.videoUrl || episode.videoUrl.trim() === '') {
            showToast(`Episode ${episode.number}${episode.part ? episode.part : ''} - "${episode.title}" has no streaming link yet. Coming soon!`, 'info');
            return;
          }
          currentEpisode = episode;
          document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          showToast(`Now playing: Episode ${episode.number}${episode.part ? episode.part : ''} - ${episode.title}`, 'success');
          // Auto-play if watch button exists (user can also click watch button)
          if (watchNowBtn) {
            // Trigger watch handler directly
            const videoUrl = episode.videoUrl;
            if (videoUrl) {
              const streamingUrl = getStreamingUrl(videoUrl);
              const encodedLink = encodeURIComponent(streamingUrl);
              window.location.href = `watch.html?movieId=${movieId}&streamingLink=${encodedLink}&source=${currentSource}`;
              logEvent(analytics, 'watch_episode', { movie_id: movieId, episode: episode.number, title: episode.title });
            }
          }
        });
      });
    }

    async function loadPopularMovies() {
      try {
        let movies = [];

        const popularQuery = query(collection(db1, 'movies'), orderBy('views', 'desc'), limit(50));
        const popularSnap = await getDocs(popularQuery);
        movies = movies.concat(popularSnap.docs.map(doc => ({ id: doc.id, source: 'kinaflix', ...doc.data() })));

        try {
          const culloMoviesSnap = await getDocs(collection(db2, 'movies'));
          const culloMovies = culloMoviesSnap.docs.map(doc => ({
            id: doc.id, source: 'cullo', title: doc.data().title,
            coverImageUrl: doc.data().thumbnailUrl || doc.data().posterUrl,
            releaseYear: doc.data().year || doc.data().releaseYear
          }));
          movies = movies.concat(culloMovies);
        } catch (e) { console.warn('Could not load CULLO movies for popular list', e); }

        if (currentMovie?.genres?.length > 0) {
          const genresQuery = query(collection(db1, 'movies'), where('genres', 'array-contains-any', currentMovie.genres), limit(50));
          const genresSnap = await getDocs(genresQuery);
          movies = movies.concat(genresSnap.docs.map(doc => ({ id: doc.id, source: 'kinaflix', ...doc.data() })));
        }

        const randomQuery = query(collection(db1, 'movies'), limit(50));
        const randomSnap = await getDocs(randomQuery);
        movies = movies.concat(randomSnap.docs.map(doc => ({ id: doc.id, source: 'kinaflix', ...doc.data() })));

        const movieMap = new Map();
        movies.forEach(movie => { if (movie.id !== movieId) movieMap.set(movie.id, movie); });
        movies = Array.from(movieMap.values()).sort(() => Math.random() - 0.5).slice(0, 20);

        if (popularMoviesGrid) {
          popularMoviesGrid.innerHTML = '';
          if (movies.length === 0) {
            if (popularMoviesSection) popularMoviesSection.style.display = 'none';
            return;
          }

          movies.forEach(movie => {
            const movieCard = document.createElement('div');
            movieCard.className = 'popular-movie-card';
            movieCard.setAttribute('data-movie-id', movie.id);
            const posterUrl = movie.coverImageUrl || 'https://via.placeholder.com/150x200?text=No+Image';
            movieCard.innerHTML = `<img src="${posterUrl}" alt="${movie.title}" class="popular-movie-poster" /><div class="popular-movie-title">${escapeHtml(movie.title)}</div>`;
            popularMoviesGrid.appendChild(movieCard);
            movieCard.addEventListener('click', () => {
              window.location.href = `see.html?id=${movie.id}&source=${movie.source || 'kinaflix'}`;
              logEvent(analytics, 'view_popular_movie', { movie_id: movie.id, title: movie.title });
            });
            if (isMobile) {
              movieCard.addEventListener('touchstart', (e) => {
                e.preventDefault();
                window.location.href = `see.html?id=${movie.id}&source=${movie.source || 'kinaflix'}`;
                logEvent(analytics, 'view_popular_movie', { movie_id: movie.id, title: movie.title });
              });
            }
          });
          if (popularMoviesSection) popularMoviesSection.style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading popular movies:', error);
        if (popularMoviesSection) popularMoviesSection.style.display = 'none';
        showToast('Error loading recommended movies.', 'error');
      }
    }

    function renderMovieDetails() {
      if (playerImage) playerImage.src = currentMovie.coverImageUrl || 'https://images.unsplash.com/photo-1502920514313-52581002a659?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80';
      if (movieTitle) movieTitle.textContent = currentMovie.title || 'N/A';
      if (movieMeta) movieMeta.innerHTML = `
        ${currentMovie.genres?.[0] || 'N/A'} |
        ${currentMovie.country || 'N/A'} |
        ${currentMovie.releaseYear || 'N/A'} |
        ${currentMovie.rating ? `<span><i class="fas fa-star"></i> ${currentMovie.rating}</span>` : ''}
      `;
      if (movieDescription) movieDescription.textContent = currentMovie.description || 'No description available.';

      if (isSeries) {
        renderSeriesEpisodes();
      } else {
        seriesSection.style.display = 'none';
      }

      if (trailerContainer && currentMovie.youtubeTrailerUrl) {
        const videoId = extractYouTubeVideoId(currentMovie.youtubeTrailerUrl);
        if (videoId) {
          trailerContainer.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
          trailerContainer.innerHTML = '<p>Invalid YouTube trailer URL.</p>';
        }
      } else if (trailerContainer) {
        trailerContainer.innerHTML = '<p>No trailer available.</p>';
      }
    }

    async function checkWatchlistStatus() {
      const user = auth.currentUser;
      if (user) {
        currentUser = user;
        const watchlistRef = doc(db1, 'watchlists', currentUser.uid);
        onSnapshot(watchlistRef, (docSnap) => {
          if (watchlistBtn) {
            if (docSnap.exists() && docSnap.data().movies?.includes(movieId)) {
              watchlistBtn.classList.add('watchlist-added');
              watchlistBtn.innerHTML = '<i class="fas fa-check"></i> Remove from watchlist';
            } else {
              watchlistBtn.classList.remove('watchlist-added');
              watchlistBtn.innerHTML = '<i class="fas fa-plus"></i> NZAYIREBA UBUTAHA';
            }
            watchlistBtn.onclick = toggleWatchlist;
          }
        }, (error) => {
          console.error('Error checking watchlist:', error);
          showToast('Error checking watchlist.', 'error');
        });
      } else if (watchlistBtn) {
        watchlistBtn.classList.remove('watchlist-added');
        watchlistBtn.innerHTML = '<i class="fas fa-plus"></i> NZAYIREBA UBUTAHA (Log in to use)';
        watchlistBtn.onclick = () => showToast('Please log in to add to watchlist.', 'error');
      }
    }

    async function toggleWatchlist() {
      if (!currentUser) {
        showToast('Please log in to manage your watchlist.', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }

      const watchlistRef = doc(db1, 'watchlists', currentUser.uid);
      try {
        const docSnap = await getDoc(watchlistRef);
        if (docSnap.exists() && docSnap.data().movies?.includes(movieId)) {
          await setDoc(watchlistRef, { movies: arrayRemove(movieId) }, { merge: true });
          logEvent(analytics, 'remove_from_watchlist', { movie_id: movieId });
        } else {
          await setDoc(watchlistRef, { movies: arrayUnion(movieId) }, { merge: true });
          logEvent(analytics, 'add_to_watchlist', { movie_id: movieId });
        }
      } catch (error) {
        console.error('Error updating watchlist:', error);
        showToast('Error updating watchlist.', 'error');
      }
    }

    async function loadComments() {
      try {
        if (!movieId) {
          if (commentsList) commentsList.innerHTML = '<p>Error: Invalid movie ID.</p>';
          return;
        }

        const commentsRef = collection(db1, 'comments');
        const q = query(commentsRef, where('movieId', '==', movieId), orderBy('timestamp', 'desc'));

        onSnapshot(q, (snapshot) => {
          if (commentsList) {
            if (snapshot.empty) {
              commentsList.innerHTML = '<p>No comments yet. Be the first to comment!</p>';
              return;
            }
            commentsList.innerHTML = '';
            snapshot.forEach(doc => {
              const comment = doc.data();
              if (!comment.text || !comment.userEmail) return;
              const commentElement = document.createElement('div');
              commentElement.className = 'comment';
              commentElement.innerHTML = `<span class="user">${escapeHtml(formatEmail(comment.userEmail))}</span><p class="text">${escapeHtml(comment.text)}</p>`;
              commentsList.appendChild(commentElement);
            });
          }
        }, (error) => {
          console.error('Error in comments snapshot:', error);
          if (commentsList) commentsList.innerHTML = '<p>Error loading comments.</p>';
        });
      } catch (error) {
        console.error('Error setting up comments query:', error);
        if (commentsList) commentsList.innerHTML = '<p>Error setting up comments.</p>';
      }
    }

    async function addComment() {
      const text = commentInput ? commentInput.value.trim() : '';
      if (!text) {
        showToast('Please enter a comment.', 'error');
        return;
      }

      const user = auth.currentUser;
      if (!user) {
        showToast('Please log in to comment.', 'error');
        setTimeout(() => window.location.href = 'login.html', 1000);
        return;
      }

      if (!movieId) {
        showToast('Invalid movie ID. Cannot add comment.', 'error');
        return;
      }

      try {
        await addDoc(collection(db1, 'comments'), {
          movieId: movieId,
          userId: user.uid,
          userEmail: user.email || 'Anonymous',
          text: text,
          timestamp: serverTimestamp()
        });
        if (commentInput) commentInput.value = '';
        showToast('Comment added successfully!', 'success');
        logEvent(analytics, 'add_comment', { movie_id: movieId });
      } catch (error) {
        console.error('Error adding comment:', error);
        showToast('Error adding comment.', 'error');
      }
    }
  </script>
