  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DC1T9B6B9W"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-DC1T9B6B9W');
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.7.3/firebase-firestore.js";

    const topBar = document.getElementById('topLoadBar');
    function startLoading() { topBar.classList.add('active'); topBar.classList.remove('done'); }
    function finishLoading() { topBar.classList.add('done'); setTimeout(() => topBar.classList.remove('active', 'done'), 500); }

    const toast = document.getElementById('toast');
    let toastTimer;
    function showToast(msg, type = '') {
      clearTimeout(toastTimer);
      toast.textContent = msg; toast.className = 'toast show ' + type;
      toastTimer = setTimeout(() => toast.classList.remove('show', 'error', 'success'), 4000);
    }

    const fb1 = { apiKey: "AIzaSyCBrRTdhrRTRL9ZfZpb-m-1XBmbDIsXF9k", authDomain: "kinaflix.firebaseapp.com", projectId: "kinaflix", storageBucket: "kinaflix.appspot.com", messagingSenderId: "318239806217", appId: "1:318239806217:web:ee98bd97cd2a08ac3239d8" };
    const fb2 = { apiKey: "AIzaSyA2ba1jUA7L0H-3JbeRud0cLEWHHf4rpk", authDomain: "cullo-movies-6813f.firebaseapp.com", projectId: "cullo-movies-6813f", messagingSenderId: "12310118231", appId: "1:12310118231:web:34682f354027fd19758812" };

    let db1, db2, db2ok = true;
    try { const a1 = initializeApp(fb1); db1 = getFirestore(a1) } catch (e) { }
    try { const a2 = initializeApp(fb2, "culloMovies"); db2 = getFirestore(a2) } catch (e) { db2ok = false }

    let allMovies = [], validMovies = [], errorMovies = [], allForSearch = [];
    let currentPage = 'home', heroInterval = null, heroMovies = [];
    const GENRES = ['Action', 'Drama', 'Comedy', 'Horror', 'Thriller', 'Romance'];
    const umuNames = ['ROCKY', 'GITI', 'SANKARA', 'GAHEZA'];
    const rndUmu = () => umuNames[Math.floor(Math.random() * umuNames.length)];
    const CURRENT_YEAR = new Date().getFullYear();

    function shuffle(a) { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[r[i], r[j]] = [r[j], r[i]] } return r }
    function normTitle(t) {
      if (!t) return '';
      t = t.replace(/\s*[-–]\s*Part\s*[B-Z2-9]/gi, '').replace(/\s*Part\s*[B-Z2-9]/gi, '');
      t = t.replace(/\s+[A-Z]$/, '').trim();
      return t;
    }
    function titleBase(t) { return normTitle(t).toLowerCase().replace(/[^a-z0-9]/g, '') }
    function escHtml(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML }
    function hasErrors(m) { return !m.year || m.year === 0 || !m.poster || m.poster.length < 8 || !m.title || m.title === 'Untitled' }

    function sortByYearDesc(arr) {
      return [...arr].sort((a, b) => (b.year || 0) - (a.year || 0));
    }

    async function fetchAll() {
      const list = [];
      try {
        const q1 = query(collection(db1, 'movies'), orderBy('releaseYear', 'desc'));
        const s1 = await getDocs(q1);
        s1.docs.forEach(doc => {
          const d = doc.data();
          list.push({
            id: doc.id, source: 'kinaflix', title: d.title || 'Untitled',
            description: d.description || '', poster: d.coverImageUrl || '',
            genres: (Array.isArray(d.genres) ? d.genres : []).filter(g => GENRES.includes(g)),
            year: typeof d.releaseYear === 'number' ? d.releaseYear : 0,
            rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
            umusobanuzi: d.umusobanuzi || null,
            youtubeTrailerUrl: d.youtubeTrailerUrl || null,
            googleDriveLink: d.googleDriveLink || null,
            timestamp: d.dateAdded?.toDate?.() || new Date(), type: 'movie'
          });
        });
      } catch (e) { showToast('Failed to load Kinaflix DB', 'error') }
      if (db2ok) try {
        const s2 = await getDocs(collection(db2, 'movies'));
        s2.docs.forEach(doc => {
          const d = doc.data();
          let g = []; if (Array.isArray(d.genre)) g = d.genre; else if (typeof d.genre === 'string' && d.genre.trim()) g = [d.genre.trim()];
          g = g.filter(x => GENRES.includes(x));
          list.push({
            id: doc.id, source: 'cullo', title: d.title || 'Untitled',
            description: d.description || '', poster: d.posterUrl || d.thumbnailUrl || '',
            genres: g, year: d.year || d.releaseYear || 0,
            rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
            umusobanuzi: rndUmu(), youtubeTrailerUrl: null,
            googleDriveLink: d.videoUrl || null,
            timestamp: d.createdAt?.toDate?.() || new Date(), type: 'movie'
          });
        });
      } catch (e) { db2ok = false; showToast('Cullo movies unavailable', 'error') }
      if (db2ok) try {
        const s3 = await getDocs(collection(db2, 'series'));
        s3.docs.forEach(doc => {
          const d = doc.data();
          let g = []; if (Array.isArray(d.genre)) g = d.genre; else if (typeof d.genre === 'string' && d.genre.trim()) g = [d.genre.trim()];
          g = g.filter(x => GENRES.includes(x));
          list.push({
            id: doc.id, source: 'cullo', title: d.title || 'Untitled Series',
            description: d.description || '', poster: d.posterUrl || d.thumbnailUrl || '',
            genres: g, year: d.year || d.releaseYear || 0,
            rating: d.rating || 0, views: typeof d.views === 'number' ? d.views : 0,
            umusobanuzi: rndUmu(), youtubeTrailerUrl: null,
            googleDriveLink: null, timestamp: d.createdAt?.toDate?.() || new Date(),
            type: 'series', seasons: d.seasons || []
          });
        });
      } catch (e) { }
      const seen = new Map(), u = [];
      for (const m of list) { if (!seen.has(m.id)) { seen.set(m.id, m); u.push(m) } }
      return u;
    }

    function dedupeParts(movies) {
      const seen = new Map(), r = [];
      for (const m of movies) { const b = titleBase(m.title); if (!seen.has(b)) { seen.set(b, m); r.push(m) } }
      return r;
    }

    function dedupeForFeatured(movies) {
      const map = new Map();
      for (const m of movies) { const base = titleBase(m.title); if (!map.has(base)) map.set(base, m); }
      return Array.from(map.values());
    }

    function getGridCols() {
      const w = window.innerWidth;
      if (w <= 420) return 2; if (w <= 768) return 3; if (w <= 1200) return 4; return 6;
    }

    function renderCard(m) {
      const poster = m.poster || '', year = m.year || '—';
      const tl = m.type === 'series' ? 'Series' : 'Movie', tc = m.type === 'series' ? 'series' : '';
      const st = escHtml(m.title), su = m.umusobanuzi ? escHtml(m.umusobanuzi) : '';
      return `<div class="poster-card" data-id="${m.id}" data-source="${m.source}" data-type="${m.type}" tabindex="0">
                <div class="poster-img-wrap">
                    ${poster ? `<img src="${poster}" alt="${st}" class="poster-img" loading="lazy" onload="this.classList.add('loaded')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : `<img src="" alt="" class="poster-img" style="display:none">`}
                    <div class="poster-img-fallback" style="${poster ? 'display:none' : 'display:flex'}">${st.substring(0, 28)}</div>
                    <span class="poster-badge ${tc}">${tl}</span>
                    ${su ? `<span class="poster-umu">${su}</span>` : ''}
                    <div class="play-circle"><div class="play-triangle"></div></div>
                    <div class="poster-overlay"><div class="overlay-title">${st}</div><div class="overlay-year">${year}${m.rating ? ' · ★ ' + parseFloat(m.rating).toFixed(1) : ''}</div></div>
                </div>
                <div class="poster-name" title="${st}">${st}</div>
            </div>`;
    }

    function renderGrid(container, movies) {
      if (!movies || movies.length === 0) {
        container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary)">No movies found</div>';
        return;
      }
      container.innerHTML = movies.map(m => renderCard(m)).join('');
      container.querySelectorAll('.poster-card').forEach(card => {
        const go = () => {
          const id = card.dataset.id, s = card.dataset.source;
          if (!id) { showToast('Missing movie ID', 'error'); return }
          window.location.href = `see.html?id=${id}&source=${s}`;
        };
        card.addEventListener('click', go);
        card.addEventListener('keydown', e => { if (e.key === 'Enter') go() });
      });
    }

    function buildSection(title, icon, movies, maxRows, cols) {
      if (!movies || movies.length === 0) return '';
      const maxItems = maxRows * cols;
      const deduped = dedupeParts(movies);
      const sorted = sortByYearDesc(deduped);
      const display = sorted.slice(0, maxItems);
      return `<section class="content-section">
                <div class="section-header"><h2 class="section-title-text"><span class="s-icon">${icon}</span> ${title}</h2></div>
                <div class="poster-grid">${display.map(m => renderCard(m)).join('')}</div>
            </section>`;
    }

    // Updated buildTrailers: uses the latest movies (same as the "Latest" section) and no title
    function buildTrailers(latestMovies) {
      // latestMovies is the array used for the "Latest" section (already sorted and deduped)
      const withTrailer = latestMovies.filter(m => m.youtubeTrailerUrl && m.youtubeTrailerUrl.length > 10);
      if (withTrailer.length === 0) return '';
      const display = withTrailer.slice(0, 10);
      let html = '<section class="content-section"><div class="trailer-scroll">';
      for (const m of display) {
        let vid = ''; const u = m.youtubeTrailerUrl;
        if (u.includes('youtube.com/watch?v=')) vid = u.split('v=')[1]?.split('&')[0];
        else if (u.includes('youtu.be/')) vid = u.split('youtu.be/')[1]?.split('?')[0];
        else if (u.includes('youtube.com/embed/')) vid = u.split('embed/')[1]?.split('?')[0];
        if (!vid) continue;
        html += `<div class="trailer-card"><div class="trailer-video-wrap"><iframe src="https://www.youtube.com/embed/${vid}?rel=0&modestbranding=1" allowfullscreen loading="lazy" sandbox="allow-scripts allow-same-origin allow-presentation"></iframe></div><div class="trailer-label">${escHtml(m.title)} <span>· ${m.year || '—'}</span></div></div>`;
      }
      html += '</div></section>';
      return html;
    }

    function buildHero(movies) {
      const candidates = movies.filter(m => m.poster && m.type === 'movie');
      const dedupedFeatured = dedupeForFeatured(candidates);
      heroMovies = sortByYearDesc(dedupedFeatured).slice(0, 10);
      if (heroMovies.length === 0) return '<div class="hero-container" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e,#16213e);"><div style="text-align:center;opacity:.4;"><span class="iconify" data-icon="mdi:filmstrip" style="font-size:3rem"></span><h2>No Featured Movies</h2></div></div>';
      let slides = '', dots = '';
      heroMovies.forEach((m, i) => {
        const st = escHtml(m.title), sd = escHtml((m.description || 'Watch on KINAFLIX.').substring(0, 200));
        const sg = (m.genres && m.genres.length > 0) ? escHtml(m.genres[0]) : '—';
        const rt = m.rating ? parseFloat(m.rating).toFixed(1) : '—';
        slides += `<div class="hero-slide${i === 0 ? ' active' : ''}" data-index="${i}"><div class="hero-bg" style="${m.poster ? `background-image:url('${m.poster}')` : ''}"></div><div class="hero-gradient"></div><div class="hero-gradient-side"></div><div class="hero-info${i === 0 ? ' anim' : ''}" data-info="${i}"><div class="hero-badge">▶ Featured #${i + 1}</div><h1 class="hero-title">${st}</h1><div class="hero-meta-row"><span><span class="star-icon">★</span> ${rt}</span><span>📅 ${m.year || '—'}</span><span>🏷 ${sg}</span></div><p class="hero-desc">${sd}...</p><div class="hero-btns"><button class="btn-hero btn-play" data-id="${m.id}" data-source="${m.source}">▶ Watch Now</button><button class="btn-hero btn-trailer" data-trailer="${m.youtubeTrailerUrl || ''}">🎬 Trailer</button></div></div></div>`;
        dots += `<button class="hero-dot${i === 0 ? ' active' : ''}" data-index="${i}"></button>`;
      });
      return `<div class="hero-container" id="heroContainer">${slides}<div class="hero-dots">${dots}</div></div>`;
    }

    function startHeroSlideshow() {
      if (heroInterval) clearInterval(heroInterval);
      if (heroMovies.length <= 1) return;
      let cur = 0;
      heroInterval = setInterval(() => { cur = (cur + 1) % heroMovies.length; switchSlide(cur) }, 6000);
    }
    function switchSlide(idx) {
      document.querySelectorAll('.hero-slide').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.hero-dot').forEach(d => d.classList.remove('active'));
      document.querySelectorAll('.hero-info').forEach(i => i.classList.remove('anim'));
      const sl = document.querySelector(`.hero-slide[data-index="${idx}"]`);
      const dt = document.querySelector(`.hero-dot[data-index="${idx}"]`);
      const inf = document.querySelector(`.hero-info[data-info="${idx}"]`);
      if (sl) sl.classList.add('active'); if (dt) dt.classList.add('active');
      if (inf) setTimeout(() => inf.classList.add('anim'), 50);
    }
    function setupHeroEvents() {
      const c = document.getElementById('heroContainer'); if (!c) return;
      c.querySelectorAll('.hero-dot').forEach(dot => { dot.addEventListener('click', e => { e.stopPropagation(); switchSlide(parseInt(dot.dataset.index)); resetHeroTimer() }) });
      c.querySelectorAll('.btn-play').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const id = btn.dataset.id, s = btn.dataset.source; if (!id) { showToast('Missing movie ID', 'error'); return } window.location.href = `see.html?id=${id}&source=${s}` }) });
      c.querySelectorAll('.btn-trailer').forEach(btn => { btn.addEventListener('click', e => { e.stopPropagation(); const tr = btn.dataset.trailer; if (tr && tr.length > 5) openTrailerModal(tr); }) });
      c.addEventListener('click', e => { if (e.target.closest('button')) return; const sl = c.querySelector('.hero-slide.active'); if (sl) { const btn = sl.querySelector('.btn-play'); if (btn) btn.click() } });
    }
    function resetHeroTimer() { if (heroInterval) { clearInterval(heroInterval) } heroInterval = setInterval(() => { const cur = [...document.querySelectorAll('.hero-dot')].findIndex(d => d.classList.contains('active')); switchSlide((cur + 1) % heroMovies.length) }, 6000); }
    function openTrailerModal(url) {
      let vid = '';
      if (url.includes('youtube.com/watch?v=')) vid = url.split('v=')[1]?.split('&')[0];
      else if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split('?')[0];
      else if (url.includes('youtube.com/embed/')) vid = url.split('embed/')[1]?.split('?')[0];
      if (!vid) return;
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;cursor:pointer;';
      modal.innerHTML = `<div style="position:relative;width:92%;max-width:880px;aspect-ratio:16/9;cursor:default;" onclick="event.stopPropagation()"><button style="position:absolute;top:-36px;right:0;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;" onclick="this.closest('[style*=fixed]').remove()">✕</button><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="border-radius:12px;"></iframe></div>`;
      modal.addEventListener('click', () => modal.remove());
      document.body.appendChild(modal);
    }

    // ===== VERTICAL YEAR PICKER for YEARS page =====
    function buildYearsPage() {
      startLoading();
      const years = [...new Set(validMovies.map(m => m.year).filter(y => y > 0))].sort((a, b) => b - a);
      if (years.length === 0) {
        document.getElementById('mainContent').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary)">No movies found.</div>';
        finishLoading(); return;
      }
      const initialYear = years.includes(CURRENT_YEAR) ? CURRENT_YEAR : years[0];
      let html = `<div class="years-page-container">
                <div class="year-picker-column">
                    <div class="year-picker" id="yearPicker"></div>
                </div>
                <div style="flex:1" id="yearMoviesContainer"></div>
            </div>`;
      document.getElementById('mainContent').innerHTML = html;
      const yearPicker = document.getElementById('yearPicker');
      const yearMoviesContainer = document.getElementById('yearMoviesContainer');
      let selectedYear = initialYear;
      function renderPicker() {
        const idx = years.indexOf(selectedYear);
        const prev = idx > 0 ? years[idx - 1] : null;
        const next = idx < years.length - 1 ? years[idx + 1] : null;
        yearPicker.innerHTML = '';
        if (next !== null) {
          const top = document.createElement('div');
          top.className = 'year-slot dim'; top.dataset.year = next; top.textContent = next;
          yearPicker.appendChild(top);
        } else {
          const top = document.createElement('div');
          top.className = 'year-slot placeholder'; top.dataset.year = 'null'; top.textContent = '';
          yearPicker.appendChild(top);
        }
        const mid = document.createElement('div');
        mid.className = 'year-slot selected'; mid.dataset.year = selectedYear; mid.textContent = selectedYear;
        yearPicker.appendChild(mid);
        if (prev !== null) {
          const bot = document.createElement('div');
          bot.className = 'year-slot dim'; bot.dataset.year = prev; bot.textContent = prev;
          yearPicker.appendChild(bot);
        } else {
          const bot = document.createElement('div');
          bot.className = 'year-slot placeholder'; bot.dataset.year = 'null'; bot.textContent = '';
          yearPicker.appendChild(bot);
        }
      }
      function loadMovies(year) {
        const yearMovies = sortByYearDesc(validMovies.filter(m => m.year === year));
        const deduped = dedupeParts(yearMovies);
        const shuffled = shuffle(deduped);
        yearMoviesContainer.innerHTML = `<section class="content-section"><div class="poster-grid"></div></section>`;
        const grid = yearMoviesContainer.querySelector('.poster-grid');
        if (grid) renderGrid(grid, shuffled);
      }
      function setYear(y) {
        if (y === selectedYear) return;
        selectedYear = y;
        renderPicker();
        loadMovies(y);
      }
      // wheel event with passive: false because we need preventDefault
      yearPicker.addEventListener('wheel', e => {
        e.preventDefault();
        const idx = years.indexOf(selectedYear);
        if (e.deltaY > 0) {
          if (idx > 0) setYear(years[idx - 1]);
        } else {
          if (idx < years.length - 1) setYear(years[idx + 1]);
        }
      }, { passive: false });
      yearPicker.addEventListener('click', e => {
        const slot = e.target.closest('.year-slot');
        if (!slot) return;
        const y = slot.dataset.year;
        if (y === 'null' || !y) return;
        setYear(parseInt(y));
      });
      yearPicker.addEventListener('dragstart', e => e.preventDefault());
      renderPicker();
      loadMovies(selectedYear);
      finishLoading();
    }

    function buildHomePage() {
      startLoading();
      const cols = getGridCols();
      const onlyMovies = validMovies.filter(m => m.type === 'movie');
      const seriesList = validMovies.filter(m => m.type === 'series');
      const trending = [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0));
      const latestRaw = [...onlyMovies].sort((a, b) => b.timestamp - a.timestamp);
      const latest = sortByYearDesc(latestRaw);
      const recent = latest;

      let html = buildHero(validMovies);
      // Pass the "latest" array (which is used for the Latest section) to buildTrailers
      html += buildTrailers(latest);
      html += buildSection('Latest', '🆕', latest, 2, cols);
      html += buildSection('Trending Now', '🔥', trending, 2, cols);
      html += buildSection('Recent', '🕐', recent, 3, cols);
      html += buildSection('Series', '📺', seriesList, 3, cols);
      GENRES.forEach(genre => {
        const gm = validMovies.filter(m => m.genres && m.genres.includes(genre));
        if (gm.length > 0) html += buildSection(`${genre} Agasobanuye`, '🏷', gm, 3, cols);
      });
      html += buildSection('Others Agasobanuye', '📋', validMovies, 999, cols);
      document.getElementById('mainContent').innerHTML = html;

      // Attach event listeners to all poster cards
      document.querySelectorAll('.poster-card').forEach(card => {
        const go = () => {
          const id = card.dataset.id, s = card.dataset.source;
          if (!id) { showToast('Missing movie ID', 'error'); return }
          window.location.href = `see.html?id=${id}&source=${s}`;
        };
        card.addEventListener('click', go);
        card.addEventListener('keydown', e => { if (e.key === 'Enter') go() });
      });

      startHeroSlideshow(); setupHeroEvents();
      finishLoading();
    }

    function buildNonHome(title, movies) {
      startLoading();
      const sorted = sortByYearDesc(movies);
      const deduped = dedupeParts(sorted);
      const shuffled = shuffle(deduped);
      let html = `<h1 class="page-title-center" style="padding:30px 20px 10px;font-size:1.7rem;font-weight:800">${title}</h1><section class="content-section"><div class="poster-grid"></div></section>`;
      document.getElementById('mainContent').innerHTML = html;
      const grid = document.querySelector('.poster-grid'); if (grid) renderGrid(grid, shuffled);
      finishLoading();
    }

    function navigateTo(page, extra = null) {
      if (heroInterval) { clearInterval(heroInterval); heroInterval = null }
      currentPage = page;
      document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
      try {
        switch (page) {
          case 'home': document.querySelector('.sidebar-link[data-page="home"]')?.classList.add('active'); buildHomePage(); break;
          case 'trending': document.querySelector('.sidebar-link[data-page="trending"]')?.classList.add('active'); buildNonHome('Trending Now', [...validMovies].sort((a, b) => (b.views || 0) - (a.views || 0))); break;
          case 'latest': document.querySelector('.sidebar-link[data-page="latest"]')?.classList.add('active'); buildNonHome('Latest Releases', sortByYearDesc(validMovies.filter(m => m.type === 'movie').sort((a, b) => b.timestamp - a.timestamp))); break;
          case 'movies': document.querySelector('.sidebar-link[data-page="movies"]')?.classList.add('active'); buildNonHome('Movies', validMovies.filter(m => m.type === 'movie')); break;
          case 'series': document.querySelector('.sidebar-link[data-page="series"]')?.classList.add('active'); buildNonHome('Series', validMovies.filter(m => m.type === 'series')); break;
          case 'random': document.querySelector('.sidebar-link[data-page="random"]')?.classList.add('active'); buildNonHome('Shyuha shyuha!', errorMovies); break;
          case 'yearsPage': document.querySelector('.sidebar-link[data-page="yearsPage"]')?.classList.add('active'); buildYearsPage(); break;
          case 'genre':
            const gm = validMovies.filter(m => m.genres && m.genres.includes(extra));
            document.querySelector(`.sidebar-link[data-genre="${extra}"]`)?.classList.add('active');
            buildNonHome(`${extra} Movies`, gm); break;
        }
      } catch (e) { console.error(e); showToast('Error loading page', 'error'); finishLoading() }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setupSearch() {
      const input = document.getElementById('searchInput'), clearBtn = document.getElementById('searchClear'), drop = document.getElementById('searchDrop');
      if (!input || !drop) return; let timeout;
      input.addEventListener('input', () => {
        const q = input.value.trim(); q.length > 0 ? clearBtn.classList.add('show') : clearBtn.classList.remove('show');
        if (!q) { drop.classList.remove('open'); return }
        clearTimeout(timeout); timeout = setTimeout(() => {
          const query = q.toLowerCase();
          const results = dedupeParts(allForSearch.filter(m => (m.title && m.title.toLowerCase().includes(query)) || (m.genres && m.genres.some(g => g.toLowerCase().includes(query))) || (m.umusobanuzi && m.umusobanuzi.toLowerCase().includes(query)) || (m.year && String(m.year).includes(query)))).slice(0, 8);
          drop.innerHTML = results.length === 0 ? '<div class="search-empty">No results</div>' : results.map(m => `<div class="search-item" data-id="${m.id}" data-source="${m.source}">${m.poster ? `<img src="${m.poster}" class="search-thumb" onerror="this.style.display='none'">` : ''}<div class="search-info"><div class="search-title">${escHtml(m.title)}</div><div class="search-meta">${m.year || '—'} · ${m.type} · ★ ${m.rating ? parseFloat(m.rating).toFixed(1) : '—'}</div></div></div>`).join('');
          drop.classList.add('open');
          drop.querySelectorAll('.search-item').forEach(item => { item.addEventListener('click', () => { const id = item.dataset.id, s = item.dataset.source; drop.classList.remove('open'); input.value = ''; clearBtn.classList.remove('show'); window.location.href = `see.html?id=${id}&source=${s}` }) });
        }, 250);
      });
      clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('show'); drop.classList.remove('open'); input.focus() });
      document.addEventListener('click', e => { if (!document.getElementById('searchBox').contains(e.target)) drop.classList.remove('open') }, { passive: true });
      input.addEventListener('keydown', e => { if (e.key === 'Escape') { drop.classList.remove('open'); input.blur() } });
    }

    function setupSidebar() {
      document.querySelectorAll('.sidebar-link').forEach(link => {
        link.addEventListener('click', () => {
          const page = link.dataset.page, genre = link.dataset.genre;
          if (page === 'genre' && genre) navigateTo('genre', genre);
          else navigateTo(page)
        }, { passive: true })
      });
      document.getElementById('logoHome').addEventListener('click', e => { e.preventDefault(); navigateTo('home') });
    }

    // Make footer clickable to open PIReactive
    document.getElementById('sidebarFooter').addEventListener('click', () => {
      window.open('https://pireactive.vercel.app/', '_blank');
    });

    document.addEventListener('keydown', function (e) { if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && (e.key === 'u' || e.key === 'U' || e.key === 's' || e.key === 'S'))) { e.preventDefault(); return false } });

    async function init() {
      try {
        const cached = sessionStorage.getItem('kflix_v12'), cacheTime = sessionStorage.getItem('kflix_time_v12');
        if (cached && cacheTime && (Date.now() - parseInt(cacheTime)) < 5 * 60 * 1000) {
          allMovies = JSON.parse(cached);
        } else {
          allMovies = await fetchAll();
          try { sessionStorage.setItem('kflix_v12', JSON.stringify(allMovies)); sessionStorage.setItem('kflix_time_v12', Date.now().toString()) } catch (e) { }
        }
        validMovies = allMovies.filter(m => !hasErrors(m));
        errorMovies = allMovies.filter(m => hasErrors(m));
        allForSearch = [...validMovies, ...errorMovies];
        validMovies = sortByYearDesc(validMovies);
        errorMovies = sortByYearDesc(errorMovies);

        if (validMovies.length === 0 && errorMovies.length === 0) {
          document.getElementById('mainContent').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center"><div style="font-size:4rem">🎬</div><h2>No Movies Found</h2><button onclick="location.reload()" style="margin-top:20px;background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:50px;cursor:pointer;font-weight:600">Retry</button></div>';
          finishLoading(); return;
        }
        setupSidebar(); setupSearch();
        navigateTo('home');
      } catch (e) { console.error(e); showToast('Failed to load', 'error'); }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
