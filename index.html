    // ===== UPDATED: Fetch movies from BOTH databases =====
    async function fetchMoviesFromBothDatabases() {
      const allMoviesList = [];

      try {
        // Fetch from Kinaflix database (db1)
        const q1 = query(collection(db1, 'movies'), orderBy('releaseYear', 'desc'));
        const querySnapshot1 = await getDocs(q1);
        const kinaflixMovies = querySnapshot1.docs.map(doc => ({
          id: doc.id,
          source: 'kinaflix',
          ...doc.data(),
          genres: Array.isArray(doc.data().genres) ? doc.data().genres : [],
          releaseYear: typeof doc.data().releaseYear === 'number' ? doc.data().releaseYear : 0,
          views: typeof doc.data().views === 'number' ? doc.data().views : 0,
          timestamp: doc.data().dateAdded?.toDate() || new Date(),
          seriesId: doc.data().seriesId || null,
          umusobanuzi: doc.data().umusobanuzi || null
        }));
        allMoviesList.push(...kinaflixMovies);
      } catch (error) {
        console.error('Error fetching from Kinaflix database:', error);
      }

      try {
        // Fetch from CULLO Movies database (db2)
        const moviesCollection2 = collection(db2, 'movies');
        const querySnapshot2 = await getDocs(moviesCollection2);
        const culloMovies = querySnapshot2.docs.map(doc => {
          const data = doc.data();
          return {
            id: doc.id,
            source: 'cullo',
            title: data.title || 'Untitled',
            description: data.description || '',
            coverImageUrl: data.thumbnailUrl || data.posterUrl || 'https://via.placeholder.com/300x450?text=No+Image',
            posterUrl: data.posterUrl || data.thumbnailUrl || '',
            thumbnailUrl: data.thumbnailUrl || data.posterUrl || '',
            genres: Array.isArray(data.genre) ? data.genre : (data.genres ? (Array.isArray(data.genres) ? data.genres : []) : []),
            releaseYear: data.year || data.releaseYear || 2024,
            rating: data.rating || 7.0,
            views: data.views || 0,
            duration: data.duration || '120 min',
            isPremium: false,
            videoUrl: data.videoUrl || '',
            timestamp: data.createdAt?.toDate ? data.createdAt.toDate() : (data.dateAdded?.toDate ? data.dateAdded.toDate() : new Date()),
            seriesId: data.seriesId || null,
            umusobanuzi: getRandomUmusobanuzi() // Assign random umusobanuzi for CULLO movies
          };
        });
        allMoviesList.push(...culloMovies);
      } catch (error) {
        console.error('Error fetching from CULLO Movies database:', error);
      }

      // Remove duplicates based on title similarity
      const uniqueMovies = [];
      const titleMap = new Map();
      for (const movie of allMoviesList) {
        const normalizedTitle = movie.title?.toLowerCase().trim().replace(/[^\w\s]/g, '');
        if (!titleMap.has(normalizedTitle)) {
          titleMap.set(normalizedTitle, movie);
          uniqueMovies.push(movie);
        }
      }

      // Silent console log - only show total
      console.log(`✓ All movies loaded (Total: ${uniqueMovies.length})`);
      return uniqueMovies;
    }

    // ===== UPDATED: Fetch genres from BOTH databases =====
    async function fetchGenresFromBothDatabases() {
      const allGenres = new Set();

      try {
        // From Kinaflix
        const q = query(collection(db1, 'genres'), orderBy('name'));
        const querySnapshot = await getDocs(q);
        querySnapshot.docs.forEach(doc => {
          const genreName = doc.data().name;
          if (genreName) allGenres.add(genreName);
        });
      } catch (error) {
        console.error('Error fetching genres from Kinaflix:', error);
      }

      try {
        // From CULLO Movies - extract genres from movies
        const moviesCollection = collection(db2, 'movies');
        const querySnapshot = await getDocs(moviesCollection);
        querySnapshot.docs.forEach(doc => {
          const data = doc.data();
          const genres = data.genre || data.genres || [];
          if (Array.isArray(genres)) {
            genres.forEach(genre => {
              if (genre && typeof genre === 'string') allGenres.add(genre);
            });
          } else if (typeof genres === 'string') {
            allGenres.add(genres);
          }
        });
      } catch (error) {
        console.error('Error fetching genres from CULLO Movies:', error);
      }

      return Array.from(allGenres).sort();
    }

    // ===== UPDATED: Fetch newest movies from BOTH databases =====
    async function fetchNewestMoviesFromBothDatabases() {
      const allMoviesList = await fetchMoviesFromBothDatabases();
      const sortedByDate = [...allMoviesList].sort((a, b) => b.timestamp - a.timestamp);

      // Apply series grouping logic to avoid duplicates from same series
      const seriesGroups = new Map();
      for (const movie of sortedByDate) {
        const seriesKey = movie.seriesId || getTitlePrefix(movie.title);
        if (!seriesGroups.has(seriesKey)) {
          seriesGroups.set(seriesKey, []);
        }
        seriesGroups.get(seriesKey).push(movie);
      }

      const uniqueMovies = [];
      for (const group of seriesGroups.values()) {
        const selectedMovies = [];
        for (let i = 0; i < Math.min(3, group.length); i++) {
          const randomIndex = Math.floor(Math.random() * group.length);
          selectedMovies.push(group[randomIndex]);
          group.splice(randomIndex, 1);
        }
        uniqueMovies.push(...selectedMovies);
        if (uniqueMovies.length >= 10) break;
      }

      return uniqueMovies.slice(0, 10);
    }

        let recs = movies.filter(movie =>

        return popular.slice(0, 10);
      }
    }

    function getTitlePrefix(title) {
      if (!title) return '';
      const words = title.split(' ').slice(0, Math.ceil(title.split(' ').length * 0.7));
      return words.join(' ').toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function startSlideshow() {
      if (!featuredMovies.length) return;
      let currentSlide = 0;

      function showSlide(index) {
        const slides = document.querySelectorAll('.hero-slide');
        if (!slides.length) return;
        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });
        currentSlide = index;
      }

      function nextSlide() {
        requestAnimationFrame(() => {
          const nextIndex = (currentSlide + 1) % featuredMovies.length;
          showSlide(nextIndex);
        });
      }

      showSlide(0);
      if (slideInterval) clearInterval(slideInterval);
      slideInterval = setInterval(nextSlide, 15000);

      document.querySelectorAll('.hero-slide').forEach(slide => {
        slide.addEventListener('mouseenter', () => clearInterval(slideInterval));
        slide.addEventListener('mouseleave', () => slideInterval = setInterval(nextSlide, 15000));
      });
    }

    function sortMovies(moviesArray, field, order) {
      const sorted = [...moviesArray];
      const isAsc = order === 'asc';
      switch (field) {
        case 'title': sorted.sort((a, b) => isAsc ? (a.title || '').localeCompare(b.title || '') : (b.title || '').localeCompare(a.title || '')); break;
        case 'rating': sorted.sort((a, b) => isAsc ? (a.rating || 0) - (b.rating || 0) : (b.rating || 0) - (a.rating || 0)); break;
        case 'releaseYear': sorted.sort((a, b) => isAsc ? (a.releaseYear || 0) - (b.releaseYear || 0) : (b.releaseYear || 0) - (a.releaseYear || 0)); break;
        case 'views': sorted.sort((a, b) => isAsc ? (a.views || 0) - (b.views || 0) : (b.views || 0) - (a.views || 0)); break;
        case 'dateAdded': sorted.sort((a, b) => isAsc ? a.timestamp - b.timestamp : b.timestamp - a.timestamp); break;
        default: sorted.sort((a, b) => isAsc ? (a.releaseYear || 0) - (b.releaseYear || 0) : (b.releaseYear || 0) - (a.releaseYear || 0));
      }
      return sorted;
    }

    function formatTimeSince(timestamp) {
      const now = new Date();
      const seconds = Math.floor((now - timestamp) / 1000);
      let interval = Math.floor(seconds / 31536000);
      if (interval >= 1) return `${interval} year${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 2592000);
      if (interval >= 1) return `${interval} month${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 86400);
      if (interval >= 1) return `${interval} day${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 3600);
      if (interval >= 1) return `${interval} hour${interval === 1 ? '' : 's'} ago`;
      interval = Math.floor(seconds / 60);
      if (interval >= 1) return `${interval} minute${interval === 1 ? '' : 's'} ago`;
      return `${Math.floor(seconds)} second${seconds === 1 ? '' : 's'} ago`;
    }

    function getFavoriteGenre() {
      const genreCounts = {};
      let maxCount = 0;
      let favoriteGenre = genres[0] || 'Action';
      watchHistory.forEach(movieId => {
        const movie = movies.find(m => m.id === movieId);
        if (movie && Array.isArray(movie.genres)) {
          movie.genres.forEach(genre => {
            genreCounts[genre] = (genreCounts[genre] || 0) + 1;
            if (genreCounts[genre] > maxCount) {
              maxCount = genreCounts[genre];
              favoriteGenre = genre;
            }
          });
        }
      });
      return favoriteGenre;
    }

    async function countView(movieId) {
      const now = Date.now();
      const lastViewTime = lastViewTimestamps[movieId] || 0;
      if (now - lastViewTime > 3600000) {
        try {
          const movieRef = doc(db1, 'movies', movieId);
          await updateDoc(movieRef, { views: increment(1) });
          lastViewTimestamps[movieId] = now;
          const movieIndex = movies.findIndex(m => m.id === movieId);
          if (movieIndex !== -1) {
            movies[movieIndex].views = (movies[movieIndex].views || 0) + 1;
          }
        } catch (error) {
          console.error('Error counting view:', error);
        }
      }
    }

            <p>You haven't watched any movies yet.</p>
          </section>
        `;
          hideLoading();
          return;
        }
        const moviePromises = watchHistory.map(movieId =>
          getDoc(doc(db1, 'movies', movieId)).then(docSnap =>
            docSnap.exists() ? {
              id: docSnap.id,
              ...docSnap.data(),
              genres: Array.isArray(docSnap.data().genres) ? docSnap.data().genres : [],
              releaseYear: typeof docSnap.data().releaseYear === 'number' ? docSnap.data().releaseYear : 0,
              timestamp: docSnap.data().dateAdded?.toDate() || new Date()
            } : null
          )
        );
        let historyMovies = (await Promise.all(moviePromises)).filter(Boolean);
        if (currentUser) {
          const userRef = doc(db1, 'users', currentUser.uid);
          const userSnap = await getDoc(userRef);
          if (userSnap.exists()) {
            const preferences = userSnap.data().displayPreferences || {};
            historyMovies = sortMovies(historyMovies, preferences.sortField || 'releaseYear', preferences.sortOrder || 'desc');
          }
        }
        renderMovieList(historyMovies, 'Your Watch History');
        hideLoading();
      } catch (error) {
        showToast('Error loading history: ' + error.message, 'error');
        hideLoading();
      }
    }

    function showLoading() {
      loadingSpinner.classList.add('active');
    }

    function hideLoading() {
      loadingSpinner.classList.remove('active');
    }

    function loadWatchHistoryFromCookies() {
      const historyCookie = document.cookie.split('; ').find(row => row.startsWith('watchHistory='));
      if (historyCookie) {
        watchHistory = JSON.parse(decodeURIComponent(historyCookie.split('=')[1])) || [];
      }
    }

    function saveWatchHistoryToCookies(history) {
      const expires = new Date();
      expires.setFullYear(expires.getFullYear() + 1);
      document.cookie = `watchHistory=${encodeURIComponent(JSON.stringify(history))}; expires=${expires.toUTCString()}; path=/`;
    }

    function setupIntersectionObserver() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const movieCard = entry.target;
            const img = movieCard.querySelector('.movie-poster');
            if (img && img.getAttribute('data-src')) {
              img.src = img.getAttribute('data-src');
              img.removeAttribute('data-src');
            }
            observer.unobserve(movieCard);
          }
        });
      }, { rootMargin: '50px' });

      const checkAndObserve = () => {
        document.querySelectorAll('.movie-card').forEach(card => {
          const img = card.querySelector('.movie-poster');
          if (img && img.src && !img.src.includes('via.placeholder.com') && !img.getAttribute('data-src')) {
            img.setAttribute('data-src', img.src);
            img.src = 'https://via.placeholder.com/300x450?text=Loading...';
            observer.observe(card);
          }
        });
      };

      setTimeout(checkAndObserve, 500);
    }

    function checkInternetConnection() {
      if (navigator.onLine) {
        noInternetOverlay.style.display = 'none';
        document.body.style.overflow = 'auto';
      } else {
        noInternetOverlay.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
